function renderSimInitialMetrics(state) {
  // v8.6.2 (2026-04-24) — render compound state values (arrays of objects,
  // nested dicts) as human-readable summaries instead of "[object Object]".
  // Non-tech beginner review 2026-04-24 caught `inbox: [{...12 messages...}]`
  // rendering as "[object Object],[object Object],..." — makes the whole
  // dashboard unreadable. Generic: any simulator_loop whose initial_state
  // includes list/dict values gets coerced to a {N items}/{K fields} summary.
  let html = '';
  for (const [k, v] of Object.entries(state)) {
    const rendered = formatSimValue(v);
    html += `<div class="sim-metric"><label>${esc(k)}</label><div class="sim-metric-value" data-metric="${esc(k)}">${esc(rendered)}</div></div>`;
  }
  return html;
}

function formatSimValue(v) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'number') {
    if (Math.abs(v) >= 1000) return v.toLocaleString();
    if (!Number.isInteger(v)) return v.toFixed(2);
    return String(v);
  }
  if (typeof v === 'boolean') return v ? 'yes' : 'no';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) {
    // Collapsed array summary — no `[object Object]`.
    if (v.length === 0) return 'empty';
    return `${v.length} item${v.length === 1 ? '' : 's'}`;
  }
  if (typeof v === 'object') {
    const keys = Object.keys(v);
    if (keys.length === 0) return '{}';
    // Try to find a single primitive value to surface (e.g. {count: 5})
    if (keys.length === 1 && ['number', 'string', 'boolean'].includes(typeof v[keys[0]])) {
      return `${keys[0]}: ${formatSimValue(v[keys[0]])}`;
    }
    return `${keys.length} field${keys.length === 1 ? '' : 's'}`;
  }
  return String(v);
}

// v8.6.2 (2026-04-24) — module-scoped simulator session state.
// Captured at setupSimulatorLoop time so navigation-race doesn't break
// things. Expert + beginner reviews 2026-04-24 both flagged that
// "Begin Simulation" navigated to M5 instead of starting the sim —
// root cause was simloopStart(index) using `getSteps()[index]` after
// an unrelated navigation mutation moved the current module. Fix:
// capture step.id + demo_data at render time; never touch `getSteps()`
// inside the sim action/advance paths.
let _simSession = null;
window._simSession = null;  // also expose globally so formatSimEventHuman can read

function setupSimulatorLoop(step, index) {
  // Capture everything we need at render time — any later mutation
  // of `state` won't leak into the sim. `step.demo_data` is the
  // full Creator payload; we cache the learner-facing bits on the
  // session so event/metric renderers don't have to re-traverse
  // the catalog. `window._simSession = _simSession` keeps the
  // reference alive so formatSimEventHuman can reach it.
  _simSession = {
    stepId: step.id,
    sessionId: null,
    uiConfig: (step.demo_data && step.demo_data.ui_config) || {},
    tickMs: (step.demo_data && step.demo_data.tick_ms) || 0,
    maxTicks: (step.demo_data && step.demo_data.max_ticks) || 300,
  };
  window._simSession = _simSession;
}

async function simloopStart(index) {
  const btn = document.getElementById('simStartBtn');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  // v8.6.2 — use the stepId captured at setup, NOT getSteps()[index].
  // getSteps() reads `state.currentModuleData.steps` which can shift
  // when the router updates — causing simloopStart to POST with a
  // different step's id (M5's capstone step) → the simloop engine
  // either 400s or starts a session against the WRONG step's data.
  const stepId = (_simSession && _simSession.stepId) || null;
  if (!stepId) {
    btn.disabled = false;
    btn.textContent = 'Retry — not ready';
    return;
  }
  try {
    const res = await fetch(`${API}/simloop/start`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({step_id: stepId}),
    });
    if (!res.ok) throw new Error(`Start failed: ${res.status}`);
    const data = await res.json();
    _simSession.sessionId = data.session_id;
    // Also snapshot ui_config / tick_ms from the server response
    // (authoritative over the demo_data in case a regen updated it).
    if (data.ui_config) _simSession.uiConfig = data.ui_config;
    if (data.tick_ms) _simSession.tickMs = data.tick_ms;
    if (data.max_ticks) _simSession.maxTicks = data.max_ticks;
    window._simSession = _simSession;
    renderSimActions(data.actions || [], index);
    updateSimMetrics(data.initial_state || {});
    document.getElementById('simAdvanceBtn').style.display = 'inline-block';
    btn.style.display = 'none';
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Retry — ' + e.message;
  }
}

function renderSimActions(actions, index) {
  const el = document.getElementById('simActions');
  if (!actions.length) { el.innerHTML = '<div style="padding:10px; color:var(--text-muted);">No actions available.</div>'; return; }
  el.innerHTML = actions.map(a => `
    <button class="sim-action-btn" onclick="simloopAction('${esc(a.id)}', ${index})">
      <div class="label">${esc(a.label)}</div>
      ${a.description ? `<div class="desc">${esc(a.description)}</div>` : ''}
      <div class="cost">cost: ${a.cost_ticks || 1} tick${a.cost_ticks === 1 ? '' : 's'}</div>
    </button>
  `).join('');
}

async function simloopAction(actionId, index) {
  if (!_simSession || !_simSession.sessionId) return;
  try {
    const res = await fetch(`${API}/simloop/action`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: _simSession.sessionId, action_id: actionId}),
    });
    const data = await res.json();
    applySimUpdate(data, index);
  } catch (e) {
    /* no-op */
  }
}

async function simloopAdvance(index, ticks) {
  if (!_simSession || !_simSession.sessionId) return;
  try {
    const res = await fetch(`${API}/simloop/advance`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: _simSession.sessionId, ticks: ticks || 1}),
    });
    const data = await res.json();
    applySimUpdate(data, index);
  } catch (e) {
    /* no-op */
  }
}

function applySimUpdate(data, index) {
  if (data.state) updateSimMetrics(data.state);
  if (data.tick != null) document.getElementById('simTick').textContent = data.tick;
  (data.new_events || []).forEach(ev => appendSimEvent(ev, data.tick));
  if (data.resolved) {
    document.querySelectorAll('.sim-action-btn').forEach(b => b.disabled = true);
    document.getElementById('simAdvanceBtn').disabled = true;
    showSimDebrief(data.outcome, index);
  }
}

function updateSimMetrics(state) {
  const container = document.getElementById('simMetrics');
  for (const [k, v] of Object.entries(state || {})) {
    let el = container.querySelector(`.sim-metric-value[data-metric="${CSS.escape(k)}"]`);
    if (!el) {
      const metric = document.createElement('div');
      metric.className = 'sim-metric';
      metric.innerHTML = `<label>${esc(k)}</label><div class="sim-metric-value" data-metric="${esc(k)}">${esc(formatSimValue(v))}</div>`;
      container.appendChild(metric);
    } else {
      const prev = el.textContent;
      const next = formatSimValue(v);
      if (prev !== next) {
        el.textContent = next;
        el.classList.add('changed');
        setTimeout(() => el.classList.remove('changed'), 500);
      }
    }
  }
}

function appendSimEvent(ev, tick) {
  const el = document.getElementById('simEvents');
  const empty = el.querySelector('.sim-events-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'sim-event';
  const {timeStr, text} = formatSimEventHuman(ev, tick);
  div.innerHTML = `<div class="tick">${esc(timeStr)}</div><div class="text">${esc(text)}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// v8.6.2 (2026-04-24) — render a simulation event as human-readable text.
// Expert review 2026-04-24 flagged Event Stream showing raw JSON like
// `{"id":"ping_1","t_offset_ms":300000,"effect":{"focus_tokens":"- 1"}}`
// to a non-coder PM audience. Root cause: appendSimEvent fell through to
// JSON.stringify(ev) when ev.text / ev.type were absent. Fix: resolve ev.id
// against demo_data.ui_config.{interruptions,ceo_email,events} lookup tables
// populated by the Creator for inbox-style sims; fall back to a readable
// placeholder based on ev.id. Generic across any simulator_loop course.
function formatSimEventHuman(ev, tick) {
  if (!ev || typeof ev !== 'object') {
    return {timeStr: `tick ${tick || '?'}`, text: String(ev || 'event')};
  }

  // Resolve against the current simloop session's ui_config if present.
  // _simSession is the module-scoped state object set by simloopStart().
  const uiConfig = (window._simSession && window._simSession.uiConfig) || {};
  const inbox = uiConfig.inbox || [];
  const interruptions = uiConfig.interruptions || [];
  const ceoEmail = uiConfig.ceo_email || null;
  const uiEvents = uiConfig.events || [];

  // 1. Prefer explicit `text` if the Creator provided one.
  let text = ev.text || ev.label || ev.description || '';

  // 2. Lookup by ID in all known Creator-populated event tables.
  if (!text && ev.id) {
    const match =
      interruptions.find(i => i.id === ev.id) ||
      uiEvents.find(i => i.id === ev.id) ||
      (ceoEmail && ceoEmail.id === ev.id ? ceoEmail : null);
    if (match) {
      const who = match.from || match.sender || '';
      const body = match.text || match.subject || match.content || '';
      text = who ? `${who}: ${body}` : body;
    }
  }

  // 3. Fallback — humanize the id. "ping_2" → "Ping 2", "ceo_email_arrives" → "Ceo Email Arrives".
  if (!text && ev.id) {
    text = String(ev.id)
      .replace(/[_\-]+/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }
  if (!text) text = 'Event';

  // 4. Friendly time label: if the sim uses minute-scale ticks (tick_ms=60000),
  // turn tick N into "9:0N AM" on a Monday-morning starting at 9:00. Else
  // show "tick N". No raw t_offset_ms numbers.
  const tickMs = (window._simSession && window._simSession.tickMs) || 0;
  let timeStr;
  if (tickMs === 60000 && typeof tick === 'number') {
    const totalMin = tick;
    const hh = 9 + Math.floor(totalMin / 60);
    const mm = String(totalMin % 60).padStart(2, '0');
    const period = hh >= 12 ? 'PM' : 'AM';
    const hh12 = ((hh + 11) % 12) + 1;
    timeStr = `${hh12}:${mm} ${period}`;
  } else {
    timeStr = `tick ${tick || 0}`;
  }

  return {timeStr, text};
}

function showSimDebrief(outcome, index) {
  const el = document.getElementById('simDebrief');
  el.className = 'sim-debrief ' + (outcome === 'won' ? 'win' : 'lose');
  const labels = {won: 'Simulation Won', lost: 'Simulation Lost', timeout: 'Time Budget Exhausted'};
  el.innerHTML = `<h3 class="outcome ${esc(outcome)}">${esc(labels[outcome] || outcome)}</h3>`;
  el.style.display = 'block';
  if (outcome === 'won' && state.currentCourse) {
    markStepComplete(state.currentCourse.id, state.currentModule, index, 100);
  } else if (state.currentCourse) {
    markStepComplete(state.currentCourse.id, state.currentModule, index, 50);
  }
}

function setupDragDrop(type, step, index) {
  let draggedEl = null;

  function getContainers() {

        };
      case 'categorization':
        return {
          sources: [document.getElementById('catSource')],
          targets: Array.from(document.querySelectorAll('.cat-bucket-items'))
        };
      case 'sjt':
        return {
          sources: [document.getElementById('sjtSource')],
          targets: Array.from(document.querySelectorAll('.sjt-drop'))
        };
      default:
        return { sources: [], targets: [] };
    }
  }

  // Attach drag events to all drag-items
  document.querySelectorAll('.drag-item').forEach(item => {
    item.addEventListener('dragstart', (e) => {
      draggedEl = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
      // F20 fix 2026-04-21: when bins are full, already-placed .drag-item
      // children occlude the drop target's hit area — the browser fires drop
      // on the child (which has no drop listener) and the item lands at
      // `(unplaced)`. Setting pointer-events:none on all placed items during
      // the active drag lets the parent bin's drop handler receive the event.
      document.querySelectorAll('.drag-item').forEach(el => {
        if (el !== item) el.classList.add('drag-pass-through');
      });
    });

    item.addEventListener('dragend', () => {
      if (draggedEl) draggedEl.classList.remove('dragging');
      draggedEl = null;
      // Remove all dragover classes
      document.querySelectorAll('.dragover').forEach(el => el.classList.remove('dragover'));
      // Clear the F20 pass-through class so clicks work again
      document.querySelectorAll('.drag-item.drag-pass-through').forEach(el => {
        el.classList.remove('drag-pass-through');
      });
    });
  });

  const { sources, targets } = getContainers();

  // Allow items to be dragged back to source
  sources.forEach(source => {
    if (!source) return;
    source.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    source.addEventListener('drop', (e) => {
      e.preventDefault();
      if (draggedEl) {
        source.appendChild(draggedEl);
        draggedEl.classList.remove('dragging');
        // For single-item slots, update the slot state
        if (type !== 'categorization') {
          const parentSlot = draggedEl.closest('.parsons-drop-slot, .ordering-drop, .sjt-drop');
          if (parentSlot) {
            parentSlot.classList.remove('has-item');
          }
        }
      }
    });
  });

  targets.forEach(target => {
    target.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      target.classList.add('dragover');
    });

    target.addEventListener('dragleave', () => {
      target.classList.remove('dragover');
    });

    target.addEventListener('drop', (e) => {
      e.preventDefault();
      target.classList.remove('dragover');

      if (!draggedEl) return;

      if (type === 'categorization') {
        // Multiple items per bucket
        target.appendChild(draggedEl);
        draggedEl.classList.remove('dragging');
      } else {
        // Single item per slot (parsons, ordering, sjt)
        const existing = target.querySelector('.drag-item');
        if (existing && existing !== draggedEl) {
          // Swap: move existing back to source or to draggedEl's previous container
          const draggedParent = draggedEl.parentElement;
          if (draggedParent && (draggedParent.classList.contains('parsons-drop-slot') || draggedParent.classList.contains('ordering-drop') || draggedParent.classList.contains('sjt-drop'))) {
            draggedParent.appendChild(existing);
            draggedParent.classList.add('has-item');
          } else {
            const src = sources[0];
            if (src) src.appendChild(existing);
          }
        }
        // Clear inner text placeholders
        const placeholder = target.querySelector('span');
        if (placeholder) placeholder.style.display = 'none';

        target.appendChild(draggedEl);
        target.classList.add('has-item');
        draggedEl.classList.remove('dragging');
      }
    });
  });
}

async function checkParsons(index) {
  const step = getSteps()[index];
  const correctLines = (step.correct_order || step.solution || []);
  const distractors = new Set(step.distractors || []);
  const slots = document.querySelectorAll('#parsonsTarget .parsons-drop-slot');
  const userOrder = [];

  slots.forEach(slot => {
    const item = slot.querySelector('.drag-item');
    userOrder.push(item ? item.dataset.text : null);
    // F5 fix 2026-04-21: clear stale correct/incorrect classes from prior
    // submit so re-submits reflect the latest state (user report
    // /#created-d08b7691ff00/41/2 — button felt dead because outline
    // colors didn't update).
    if (item) item.classList.remove('correct', 'incorrect');
  });

  const btn = document.getElementById('parsonsCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    const result = await validateExercise(step.id, 'parsons', { order: userOrder });
    displayParsonsResults(result, slots, index);
  } catch (e) {
    // Fallback local check
    let correct = 0;
    slots.forEach((slot, i) => {
      const item = slot.querySelector('.drag-item');
      if (!item) return;
      const isCorrect = correctLines[i] && item.dataset.text === correctLines[i];
      item.classList.add(isCorrect ? 'correct' : 'incorrect');
      if (isCorrect) correct++;
    });
    const total = correctLines.filter(l => !distractors.has(l)).length;
    const pct = total > 0 ? correct / total : 0;
    const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
    document.getElementById('parsonsResult').innerHTML = `<div class="score-display ${cls}" style="margin-top:12px;">${correct}/${total} correct &middot; ${Math.round(pct*100)}%</div>`;
    if (pct === 1) {
      markStepComplete(state.currentCourse.id, state.currentModule, index);
      showCelebration();
    }
  }

  btn.disabled = false;
  btn.innerHTML = 'Check Order';
}

function displayParsonsResults(result, slots, index) {
  const lineResults = result.results || result.line_results || [];
  let correct = 0;
  slots.forEach((slot, i) => {
    const item = slot.querySelector('.drag-item');
    if (!item) return;
    const isCorrect = lineResults[i]?.correct ?? false;
    item.classList.add(isCorrect ? 'correct' : 'incorrect');
    if (isCorrect) correct++;
  });
  const total = slots.length;
  // Prefer server score when available; show as X/Y · NN% rather than raw 0.67 decimal
  // (F5 fix 2026-04-21 — user confused by "0.67 correct" on /41/2).
  const serverPct = (typeof result.score === 'number') ? Math.round(result.score * 100) : null;
  const pct = serverPct != null ? serverPct / 100 : (total > 0 ? correct / total : 0);
  const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
  const pctDisplay = serverPct != null ? serverPct : Math.round(pct * 100);
  document.getElementById('parsonsResult').innerHTML = `<div class="score-display ${cls}" style="margin-top:12px;"><strong>${correct} / ${total}</strong> in correct position &middot; ${pctDisplay}%</div>`;
  if (pct === 1) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    showCelebration();
  }
}

async function checkOrdering(index) {
  const step = getSteps()[index];
  const slots = document.querySelectorAll('.ordering-drop');
  const userOrderIds = [];

  slots.forEach(slot => {
    const item = slot.querySelector('.drag-item');
    userOrderIds.push(item ? (item.dataset.orderingId || item.dataset.text) : null);
    // F5 fix 2026-04-21: clear stale correct/incorrect classes before resubmit
    if (item) item.classList.remove('correct', 'incorrect');
  });

  const btn = document.getElementById('orderingCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    // Send ids (server-side sanitization removed the correct_position leak; grading is entirely server-side)
    const result = await validateExercise(step.id, 'ordering', { ordering: userOrderIds });
    try {
      displayOrderingResults(result, slots, index);
    } catch (renderErr) {
      console.error('displayOrderingResults threw:', renderErr);
      const pctTxt = result.score != null ? `${Math.round(result.score * 100)}%` : '—';
      document.getElementById('orderingResult').innerHTML =
        `<div class="score-display partial" style="margin-top:12px;">${esc(pctTxt)}
         ${result.feedback ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.88rem;">${esc((result.feedback || '').split('\n')[0])}</span>` : ''}
         </div>`;
    }
  } catch (e) {
    document.getElementById('orderingResult').innerHTML = `<div class="score-display low" style="margin-top:12px;">Grading service unavailable. Please try again.</div>`;
  } finally {
    // ALWAYS reset (bulletproof-finally pattern, 2026-04-21)
    btn.disabled = false;
    btn.innerHTML = 'Check Order';
  }
}

function displayOrderingResults(result, slots, index) {
  // Teaching feedback comes from the server's response (item_results + correct_answer).
  // This is the new pattern (2026-04-19): per-item correctness is NOT available pre-submission.
  const lineResults = result.item_results || result.results || [];
  let correct = 0;
  slots.forEach((slot, i) => {
    const item = slot.querySelector('.drag-item');
    if (!item) return;
    const r = lineResults[i] || {};
    const isCorrect = r.correct === true;
    item.classList.add(isCorrect ? 'correct' : 'incorrect');
    if (isCorrect) correct++;
  });
  const total = slots.length;
  const pct = total > 0 ? correct / total : 0;
  const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';

  // Score header — include % (F5 fix 2026-04-21: match parsons header format)
  const serverPct = (typeof result.score === 'number') ? Math.round(result.score * 100) : Math.round(pct * 100);
  let html = `<div class="score-display ${cls}" style="margin-top:12px;"><strong>${correct} / ${total}</strong> in correct position &middot; ${serverPct}%</div>`;

  // REVEAL-GATE AWARENESS (2026-04-20): on attempts 1-2 the server strips
  // correct_position so learners don't see the answer. If nothing has
  // correct_position, skip per-item reveal and show the server's retry hint.
  const anyHasCorrectPos = lineResults.some(r => r.correct_position != null);
  const hintText = (result.feedback || '').split('\n')[0] || '';

  if (lineResults.length && anyHasCorrectPos) {
    // Full-reveal path
    html += `<div class="ordering-feedback" style="margin-top:14px; display:flex; flex-direction:column; gap:8px;">`;
    lineResults.forEach(r => {
      const okCls = r.correct ? 'ok' : 'miss';
      const _up = (r.user_position === null || r.user_position === undefined) ? '(not placed)' : r.user_position;
      const _cp = (r.correct_position === null || r.correct_position === undefined) ? '(not in order)' : r.correct_position;
      const arrow = r.correct
        ? `<span style="color:var(--success); font-weight:600;">✓ Position ${_up}</span>`
        : `<span style="color:var(--error); font-weight:600;">✗ You put at ${_up}, correct is ${_cp}</span>`;
      html += `<div class="order-fb-row ${okCls}" style="background:var(--bg-tertiary); border:1px solid var(--border); border-left:3px solid ${r.correct?'var(--success)':'var(--error)'}; border-radius:6px; padding:10px 12px; font-size:0.88rem; line-height:1.5;">
        <div style="color:var(--text-primary); margin-bottom:4px;">${esc(r.text || '')}</div>
        <div>${arrow}</div>
      </div>`;
    });
    html += `</div>`;
  } else if (lineResults.length === 0 || !anyHasCorrectPos) {
    // Reveal-gated: show server's retry hint instead of empty per-item block
    if (hintText) {
      html += `<div style="margin-top:14px; padding:12px 14px; background:var(--bg-tertiary); border:1px solid var(--border); border-left:3px solid #fbbf24; border-radius:6px; font-size:0.88rem; color:var(--text-secondary); line-height:1.5;">${esc(hintText)}</div>`;
    }
  }

  // Correct full order — shown only if learner missed at least one AND the
  // server returned the full answer key (attempt 3+ or correct).
  if (pct < 1 && result.correct_answer && Array.isArray(result.correct_answer)) {
    // Build byId from BOTH the server's line_results AND the step's full items list,
    // so IDs the learner didn't place still show their text (Ravi-learner review
    // 2026-04-20: partial submission → byId missing IDs → "Correct Order" list
    // rendered `s1, s2, s3` placeholder labels instead of the actual step text).
    const byId = {};
    const _steps = getSteps();
    const _step = _steps[index] || {};
    const _items = (_step.items && _step.items.length)
      ? _step.items
      : ((_step.demo_data && _step.demo_data.items) || []);
    _items.forEach(it => { if (it && it.id) byId[it.id] = it.text || it.label || String(it.id); });
    lineResults.forEach(r => { if (r.id) byId[r.id] = r.text || byId[r.id]; });
    html += `<div style="margin-top:14px; padding:10px 12px; background:var(--bg-tertiary); border:1px solid var(--accent); border-radius:6px; font-size:0.88rem;">
      <div style="color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; font-size:0.72rem; margin-bottom:6px;">Correct Order</div>
      <ol style="margin:0 0 0 18px; padding:0; color:var(--text-primary);">`;
    result.correct_answer.forEach(id => {
      html += `<li style="margin:2px 0;">${esc(byId[id] || id)}</li>`;
    });
    html += `</ol></div>`;
  }

  document.getElementById('orderingResult').innerHTML = html;
  if (pct === 1) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    showCelebration();
  }
}

async function checkCategorization(index) {
  const step = getSteps()[index];
  const categories = step.categories || [];
  const buckets = document.querySelectorAll('.cat-bucket');

  const placement = {};
  buckets.forEach(bucket => {
    const catName = bucket.dataset.category;
    const items = bucket.querySelectorAll('.drag-item');
    items.forEach(item => {
      placement[item.dataset.catId] = catName;
    });
  });

  const btn = document.getElementById('catCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    const result = await validateExercise(step.id, 'categorization', { placement });
    // Wrap the renderer so a render-time throw can't leave the button stuck.
    try {
      displayCatResults(result, index);
    } catch (renderErr) {
      console.error('displayCatResults threw:', renderErr);
      const pctTxt = result.score != null ? `${Math.round(result.score * 100)}%` : '—';
      document.getElementById('catResult').innerHTML =
        `<div class="score-display partial" style="margin-top:12px;">${esc(pctTxt)}
         ${result.feedback ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.88rem;">${esc((result.feedback || '').split('\n')[0])}</span>` : ''}
         </div>`;
    }
  } catch (e) {
    document.getElementById('catResult').innerHTML = `<div class="score-display low" style="margin-top:12px;">Grading service unavailable. Please try again.</div>`;
  } finally {
    // ALWAYS reset — user-screenshot-level bug 2026-04-21: button stuck on Checking
    btn.disabled = false;
    btn.innerHTML = 'Check';
  }
}

function displayCatResults(result, index) {
  // Server-side teaching feedback: item_results each shape {id, text, user_category, correct_category, correct, explanation?}
  const itemResults = result.item_results || result.results || [];
  let correct = 0;
  const total = itemResults.length;

  // Match IDs as strings (Creator generates "i1","i2"; frontend IDs are strings too)
  document.querySelectorAll('.drag-item[data-cat-id]').forEach(item => {
    const id = String(item.dataset.catId);
    const r = itemResults.find(ir => String(ir.id) === id) || {};
    if (r.correct === true) {
      item.classList.add('correct');
      correct++;
    } else if (r.correct === false) {
      item.classList.add('incorrect');
    }
  });

  const pct = total > 0 ? correct / total : 0;
  const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
  let html = `<div class="score-display ${cls}" style="margin-top:12px;">${correct}/${total} correctly categorized</div>`;

  // REVEAL-GATE AWARENESS (2026-04-20): the server strips `correct_category`
  // on attempts 1-2 so learners don't see the answer key on first wrong
  // submission. If no item has it, skip the per-item reveal entirely and show
  // only the score + retry hint. Full per-item breakdown returns on attempt
  // 3+ OR a correct submission.
  const anyHasCorrectCat = itemResults.some(r => r.correct_category != null && r.correct_category !== '');
  const hintText = (result.feedback || '').split('\n')[0] || '';

  if (itemResults.length && anyHasCorrectCat) {
    // Full-reveal path
    html += `<div class="cat-feedback" style="margin-top:14px; display:flex; flex-direction:column; gap:8px;">`;
    itemResults.forEach(r => {
      const borderColor = r.correct ? 'var(--success)' : 'var(--error)';
      const verdict = r.correct
        ? `<span style="color:var(--success); font-weight:600;">✓ ${esc(r.user_category || r.correct_category || '')}</span>`
        : `<span style="color:var(--error); font-weight:600;">✗ You put in <em>${esc(r.user_category || '(unplaced)')}</em>, correct is <em>${esc(r.correct_category || '(no category)')}</em></span>`;
      const expl = r.explanation ? `<div style="font-size:0.82rem; color:var(--text-secondary); margin-top:4px;">${esc(r.explanation)}</div>` : '';
      html += `<div style="background:var(--bg-tertiary); border:1px solid var(--border); border-left:3px solid ${borderColor}; border-radius:6px; padding:10px 12px; font-size:0.88rem; line-height:1.5;">
        <div style="color:var(--text-primary); margin-bottom:4px;">${esc(r.text || '')}</div>
        <div>${verdict}</div>${expl}
      </div>`;
    });
    html += `</div>`;
  } else if (hintText) {
    // Reveal-gated path — show the server's retry hint, not empty cells
    html += `<div style="margin-top:14px; padding:12px 14px; background:var(--bg-tertiary); border:1px solid var(--border); border-left:3px solid #fbbf24; border-radius:6px; font-size:0.88rem; color:var(--text-secondary); line-height:1.5;">${esc(hintText)}</div>`;
  }

  document.getElementById('catResult').innerHTML = html;
  if (pct === 1) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    showCelebration();
  }
}

function showCelebration() {
  const container = document.createElement('div');

  const colors = ['#4a7cff', '#34d399', '#fbbf24', '#f87171', '#a855f7', '#2dd4bf'];
  for (let i = 0; i < 50; i++) {

    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.top = -10 + 'px';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDelay = Math.random() * 0.5 + 's';
    confetti.style.animationDuration = (1.5 + Math.random()) + 's';
    confetti.style.width = (4 + Math.random() * 6) + 'px';
    confetti.style.height = (4 + Math.random() * 6) + 'px';

  setTimeout(() => container.remove(), 3000);

  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('visible');
}

function esc(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function escAttr(str) {
  return esc(str).replace(/"/g, '&quot;');
}

function simpleMarkdown(text) {
  if (!text) return '';
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-tertiary);padding:1px 4px;border-radius:3px;font-size:0.9em;">$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n• /g, '<br>• ')
    .replace(/\n- /g, '<br>- ')
    .replace(/\n(\d+)\. /g, '<br>$1. ')
    .replace(/\n/g, '<br>');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getExpertiseLevel(courseId) {
  try {
    const levels = JSON.parse(localStorage.getItem('expertiseLevels') || '{}');
    return levels[courseId] || null;
  } catch { return null; }
}

function saveExpertiseLevel(courseId, level) {
  try {
    const levels = JSON.parse(localStorage.getItem('expertiseLevels') || '{}');
    levels[courseId] = level;
    localStorage.setItem('expertiseLevels', JSON.stringify(levels));
  } catch {}
  // Keep a per-course key in sync for the adaptive renderer
  try { localStorage.setItem('expertise-' + courseId, level); } catch {}
}

// Adaptive renderer helpers — read per-course expertise directly from localStorage.
function getExpertise(courseId) {
  // Returns the course's Creator-chosen complexity (state.currentCourse.level),
  // normalized to the legacy 'explorer/builder/deployer' key for internal code paths
  // that still branch on it (progressive content depth, adaptive rendering variants).
  // Falls back to 'builder' only if no course is loaded.
  const courseLevel = state.currentCourse && state.currentCourse.level;
  if (courseLevel) {
    const s = String(courseLevel).toLowerCase();
    if (s.includes('beginner') || s.includes('explorer') || s.includes('basic')) return 'explorer';
    if (s.includes('advanced') || s.includes('deployer') || s.includes('expert')) return 'deployer';
    if (s.includes('intermediate') || s.includes('builder')) return 'builder';
    // Legacy 'all' or unknown — don't render variant-specific branches
    return 'builder';
  }
  return 'builder';
}

function renderExpertiseHint(courseId) {
  // If the course has no meaningful level, render nothing (was: always showed 'Builder mode').
  const courseLevel = state.currentCourse && state.currentCourse.level;
  if (!courseLevel || String(courseLevel).toLowerCase() === 'all') return '';
  const level = getExpertise(courseId);
  const labels = {explorer: 'Beginner', builder: 'Intermediate', deployer: 'Advanced'};
  const colors = {explorer: 'var(--success)', builder: 'var(--accent)', deployer: 'var(--warning)'};
  return `<span class="expertise-inline-badge" style="background: ${colors[level]}20; color: ${colors[level]}; border: 1px solid ${colors[level]}; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-left: 8px;">${labels[level]}</span>`;
}

let clickyMessages = [];

function toggleClicky() {
  const panel = document.getElementById('clickyPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('clickyInput').focus();
  }
}

async function sendClickyMessage() {
  const input = document.getElementById('clickyInput');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  clickyMessages.push({ role: 'user', content: msg });
  renderClickyMessages();

  const sendBtn = document.getElementById('clickySend');
  sendBtn.disabled = true;

  try {
    const currentStep = getSteps()?.[state.currentStepIndex];
    // Resolve module_id (DB id) from state.modules if possible
    let moduleId = null;
    if (state.modules && state.currentModule !== undefined) {
      const mod = state.modules[state.currentModule];
      moduleId = mod?.id || state.currentModule;
    }
    // Send recent chat history (last 6 messages) for conversational continuity
    const history = clickyMessages.slice(-6, -1).map(m => ({ role: m.role, content: m.content }));
    const body = {
      message: msg,
      course_id: state.currentCourse?.id || null,
      module_id: moduleId,
      step_index: state.currentStepIndex || 0,
      step_type: currentStep?.exercise_type || currentStep?.step_type || 'concept',
      history,
    };
    const res = await fetch(`${API}/clicky/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`Clicky error: ${res.status}`);
    const data = await res.json();
    clickyMessages.push({ role: 'assistant', content: data.reply || data.response || 'Sorry, I could not process that.' });
  } catch (e) {
    clickyMessages.push({ role: 'assistant', content: 'Sorry, something went wrong. Please try again.' });
  }

  sendBtn.disabled = false;
  renderClickyMessages();
}

function renderClickyMessages() {
  const container = document.getElementById('clickyMessages');
  container.innerHTML = clickyMessages.map(m => {
    if (m.role === 'user') {
      return `<div class="clicky-msg user">${esc(m.content)}</div>`;
    } else {
      return `<div class="clicky-msg assistant"><div class="msg-avatar">&#129302; Clicky</div>${simpleMarkdown(m.content)}</div>`;
    }
  }).join('');
  container.scrollTop = container.scrollHeight;
}

  sessionId: null,

  initialOutline: null,
  refinedOutline: null,
  followUpQuestions: null,

// ----- Creator draft persistence (2026-04-21) -----
// User report: "creator form does not persist data. If I press back, it is gone."
// Fix: snapshot the entire wizard state to localStorage on every input + step
// advance, restore on openCreatorWizard(), clear only on successful /generate.
// Files can't be serialized so we persist only title/desc/urls/choices + the
// server-side sessionId (which already holds extracted file text server-side).
const CREATOR_DRAFT_KEY = 'creatorDraft_v1';
const CREATOR_DRAFT_TTL_MS = 1000 * 60 * 60 * 24 * 7;  // 7 days

function _saveCreatorDraft() {
  try {
    const titleEl = document.getElementById('creatorTitle');
    const descEl = document.getElementById('creatorDesc');
    const urlsEl = document.getElementById('creatorUrls');
    const typeEl = document.getElementById('creatorType');
    const levelEl = document.getElementById('creatorLevel');
    const modeEl = document.getElementById('creatorMode');
    const archEl = document.getElementById('creatorArchetype');
    // Only snapshot if at least one field has real user content — prevents the
    // "Resume your draft?" banner from firing on an empty wizard open.
    const title = titleEl?.value || '';
    const desc = descEl?.value || '';
    const hasContent = title.trim() || desc.trim() || creatorState.sessionId;
    if (!hasContent) return;
    const draft = {
      savedAt: Date.now(),
      fields: {
        title,
        desc,
        urls: urlsEl?.value || '',
        courseType: typeEl?.value || '',
        level: levelEl?.value || '',
        courseMode: modeEl?.value || '',
        archetype: archEl?.value || '',
      },
      state: { ...creatorState },
      urlsFetchedMaterial: state._urlsFetchedMaterial || '',
      // Step-2 in-progress answers (text inputs the learner is typing into the
      // clarifying-question textareas). Serialize live DOM values so a back-nav
      // from step 3 doesn't lose them.
      step2Answers: _snapshotStep2Answers(),
    };
    localStorage.setItem(CREATOR_DRAFT_KEY, JSON.stringify(draft));
  } catch (e) { /* quota / private-mode — fall through silently */ }
}

function _snapshotStep2Answers() {
  const out = {};
  // The step-2 questions render as combo inputs with data-qid (see renderCreatorStep2).
  document.querySelectorAll('.creator-answer[data-qid]').forEach(el => {
    const qid = el.getAttribute('data-qid');
    if (!qid) return;
    out[qid] = el.value || '';
  });
  // Framing pills (step 1)
  const framings = [];
  document.querySelectorAll('.framing-pill.active').forEach(p => {
    framings.push(`${p.dataset.dim}:${p.dataset.opt}`);
  });
  if (framings.length) out.__framings = framings;
  return out;
}

function _loadCreatorDraft() {
  try {
    const raw = localStorage.getItem(CREATOR_DRAFT_KEY);
    if (!raw) return null;
    const draft = JSON.parse(raw);
    if (!draft || !draft.savedAt) return null;
    if (Date.now() - draft.savedAt > CREATOR_DRAFT_TTL_MS) {
      localStorage.removeItem(CREATOR_DRAFT_KEY);
      return null;
    }
    return draft;
  } catch (e) { return null; }
}

function _clearCreatorDraft() {
  try { localStorage.removeItem(CREATOR_DRAFT_KEY); } catch (e) {}
}

// Install a single delegated listener that snapshots the draft whenever any
// input inside the Creator overlay changes. Covers all current + future fields
// without having to wire oninput= on every element.
(function _installCreatorDraftListener() {
  function handler(e) {
    const overlay = document.getElementById('creatorOverlay');
    if (!overlay || !overlay.contains(e.target)) return;
    // Debounce bursts of keystrokes to one save per ~300ms.
    clearTimeout(_installCreatorDraftListener._t);
    _installCreatorDraftListener._t = setTimeout(_saveCreatorDraft, 300);
  }
  if (document.readyState !== 'loading') {
    document.addEventListener('input', handler, true);
    document.addEventListener('change', handler, true);
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      document.addEventListener('input', handler, true);
      document.addEventListener('change', handler, true);
    });
  }
})();

function openCreatorWizard() {
  // First-visit flag (2026-04-21): remember that the user has discovered the
  // button so the attention-pulse doesn't keep nagging on subsequent loads.
  try { localStorage.setItem('creatorFabOpened', '1'); } catch (e) {}
  const fab = document.getElementById('creatorFab');
  if (fab) fab.classList.remove('pulse');

  // 2026-04-21 draft-persistence: if a draft exists, restore creatorState
  // BEFORE rendering so the wizard lands on the same step the user left on.
  // Title/desc/URLs land back into the DOM after renderCreatorStep1() writes
  // the inputs (handled in _applyCreatorDraftToDOM called post-render).
  const draft = _loadCreatorDraft();
  if (draft && draft.state) {
    creatorState = { ...creatorState, ...draft.state };
    if (draft.urlsFetchedMaterial) {
      state._urlsFetchedMaterial = draft.urlsFetchedMaterial;
    }
  } else {
    creatorState = {
      step: 1,
      sessionId: null,
      questions: [],
      initialOutline: null,
      refinedOutline: null,
      followUpQuestions: null,
      generatedCourseId: null,
      generatedCourse: null,
    };
  }
  const overlay = document.getElementById('creatorOverlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('visible'));
  renderCreatorWizard();
  // Post-render: push saved field values back into the DOM inputs.
  if (draft && draft.fields) _applyCreatorDraftToDOM(draft);
}

function _applyCreatorDraftToDOM(draft) {
  if (!draft || !draft.fields) return;
  const f = draft.fields;
  const set = (id, v) => { const el = document.getElementById(id); if (el && v != null) el.value = v; };
  set('creatorTitle', f.title);
  set('creatorDesc', f.desc);
  set('creatorUrls', f.urls);
  set('creatorType', f.courseType);
  set('creatorLevel', f.level);
  set('creatorMode', f.courseMode);
  set('creatorArchetype', f.archetype);
  // Step-2 combo-input answers + depth + framing pills — only meaningful if we
  // rendered step 2 (for step 2) or step 1 (framing pills).
  if (draft.step2Answers) {
    Object.entries(draft.step2Answers).forEach(([qid, val]) => {
      if (qid === '__framings') return;
      const el = document.querySelector(`.creator-answer[data-qid="${CSS.escape(qid)}"]`);
      if (el) el.value = val || '';
    });
    if (Array.isArray(draft.step2Answers.__framings)) {
      draft.step2Answers.__framings.forEach(key => {
        const [dim, opt] = String(key).split(':');
        if (!dim || !opt) return;
        const pill = document.querySelector(
          `.framing-pill[data-dim="${CSS.escape(dim)}"][data-opt="${CSS.escape(opt)}"]`);
        if (pill) pill.classList.add('active');
      });
    }
  }
  // Recompute the combined-chars meter (F19-era) since we just rehydrated inputs.
  if (typeof updateCreatorContentMeter === 'function') updateCreatorContentMeter();
  // One-shot subtle banner so the user knows the draft was restored.
  _showCreatorDraftRestoredBanner(draft.savedAt);
}

function _showCreatorDraftRestoredBanner(savedAt) {
  const body = document.getElementById('creatorBody');
  if (!body) return;
  // Don't double-render on subsequent re-renders.
  if (document.getElementById('creatorDraftBanner')) return;
  const when = savedAt ? new Date(savedAt).toLocaleString() : '';
  const banner = document.createElement('div');
  banner.id = 'creatorDraftBanner';
  banner.style.cssText = 'margin:0 0 14px; padding:10px 14px; background:#1e2a44; border:1px solid #3b4a70; border-radius:6px; display:flex; align-items:center; gap:12px; font-size:0.85rem; color:#c9d1df;';
  banner.innerHTML = `
    <span style="color:#4a7cff;">&#8635;</span>
    <span style="flex:1;">Restored your in-progress draft ${when ? `(saved ${esc(when)})` : ''}. Keep editing, or</span>
    <button onclick="_discardCreatorDraft()"
      style="background:transparent; border:1px solid #3b4a70; color:#c9d1df; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:0.78rem;">Start fresh</button>
    <button onclick="(function(){document.getElementById('creatorDraftBanner')?.remove();})()"
      style="background:transparent; border:none; color:#8892a8; cursor:pointer; font-size:1.1rem; line-height:1;">&times;</button>`;
  body.insertBefore(banner, body.firstChild);
}

function _discardCreatorDraft() {
  _clearCreatorDraft();
  creatorState = {
    step: 1, sessionId: null, questions: [], initialOutline: null,
    refinedOutline: null, followUpQuestions: null,
    generatedCourseId: null, generatedCourse: null,
  };
  state._urlsFetchedMaterial = '';
  renderCreatorWizard();
}

// Fire the first-visit attention pulse on FAB if user hasn't opened it yet.
// Runs 3 pulses (≈ 5s total) then auto-stops.
(function _creatorFabFirstVisitPulse() {
  function arm() {
    try {
      if (localStorage.getItem('creatorFabOpened')) return;
      const fab = document.getElementById('creatorFab');
      if (!fab) return;
      fab.classList.add('pulse');
      setTimeout(() => fab.classList.remove('pulse'), 6000);
    } catch (e) {}
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(arm, 600);
  } else {
    document.addEventListener('DOMContentLoaded', () => setTimeout(arm, 600));
  }
})();

function closeCreatorWizard() {
  const overlay = document.getElementById('creatorOverlay');
  overlay.classList.remove('visible');
  setTimeout(() => { overlay.style.display = 'none'; }, 250);
}

function renderCreatorStepsBar() {
  const bar = document.getElementById('creatorStepsBar');
  let html = '';
  CREATOR_STEPS.forEach((s, i) => {
    const cls = creatorState.step === s.num ? 'active' : (creatorState.step > s.num ? 'done' : '');
    html += `<div class="creator-step-indicator ${cls}">
      <div class="creator-step-num">${creatorState.step > s.num ? '&#10003;' : s.num}</div>
      <div class="creator-step-label">${s.label}</div>
    </div>`;
    if (i < CREATOR_STEPS.length - 1) {
      html += `<div class="creator-step-line ${creatorState.step > s.num ? 'done' : ''}"></div>`;
    }
  });
  bar.innerHTML = html;
}

function renderCreatorWizard() {
  renderCreatorStepsBar();
  const body = document.getElementById('creatorBody');

  if (creatorState.step === 1) {
    body.innerHTML = renderCreatorStep1();
  } else if (creatorState.step === 2) {
    body.innerHTML = renderCreatorStep2();
  } else if (creatorState.step === 3) {
    body.innerHTML = renderCreatorStep3();
  } else if (creatorState.step === 4) {
    body.innerHTML = renderCreatorStep4();
  }
}

// Autocomplete: filter CREATOR_STARTERS by the title input's value.
function showTemplateAutocomplete() {
  const inp = document.getElementById('creatorTitle');
  const box = document.getElementById('templateAutocomplete');
  if (!inp || !box) return;
  const q = (inp.value || '').toLowerCase().trim();
  // Filter: match title, role, or archetype label
  const archMeta = _archMeta();
  // Search blob includes emoji (D3 chaos finding) + archetype code for broader matching.
  // Headline AI templates are pinned to the top regardless of query ordering.
  const matches = CREATOR_STARTERS.filter(s => {
    if (!q) return true;
    const blob = `${s.emoji || ''} ${s.title} ${s.role} ${s.desc} ${s.archetype || ''} ${(archMeta[s.archetype] || {}).label || ''}`.toLowerCase();
    return blob.includes(q);
  }).sort((a, b) => {
    // Pin headline_ai templates to the top
    if (a.headline_ai && !b.headline_ai) return -1;
    if (!a.headline_ai && b.headline_ai) return 1;
    return 0;
  }).slice(0, 8);
  let html = '';
  if (matches.length) {
    matches.forEach((s, i) => {
      const idx = CREATOR_STARTERS.indexOf(s);
      const m = archMeta[s.archetype] || { label: s.archetype, color: '#6b7280' };
      html += `<div class="tmpl-row" data-idx="${idx}" onmousedown="applyCreatorStarter(${idx}); hideTemplateAutocomplete();">
        <div class="tmpl-title">${s.emoji} ${esc(s.title)}</div>
        <div class="tmpl-meta"><span style="color:${m.color};">${esc(m.label)}</span> · ${esc(s.role)}</div>
      </div>`;
    });
  }
  // Escape hatch — always available
  const blankText = q
    ? `Keep "<strong>${esc(inp.value)}</strong>" as title, start blank`
    : `Start blank — write from scratch`;
  html += `<div class="tmpl-hint" style="cursor:pointer;" onmousedown="hideTemplateAutocomplete();">${blankText}</div>`;
  box.innerHTML = html;
  box.style.display = 'block';
}

let _acHideTimer = null;
function hideTemplateAutocompleteSoon() {
  // small delay so click handlers can fire on the dropdown
  clearTimeout(_acHideTimer);
  _acHideTimer = setTimeout(hideTemplateAutocomplete, 180);
}
function hideTemplateAutocomplete() {
  const box = document.getElementById('templateAutocomplete');
  if (box) { box.style.display = 'none'; }
  const inp = document.getElementById('creatorTitle');
  if (inp) inp.setAttribute('aria-expanded', 'false');
}

// Arrow-key nav for the title autocomplete (Chaos D1 fix — keyboard-only users couldn't enter the dropdown)
function onTitleAutocompleteKey(e) {
  const box = document.getElementById('templateAutocomplete');
  if (!box) return;
  const inp = document.getElementById('creatorTitle');
  const rows = box.querySelectorAll('.tmpl-row');
  let idx = parseInt(box.dataset.kbIdx || '-1', 10);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (box.style.display === 'none') { showTemplateAutocomplete(); inp.setAttribute('aria-expanded','true'); return; }
    idx = Math.min(idx + 1, rows.length - 1);
    box.dataset.kbIdx = String(idx);
    _titleAcStyleRows(box, rows);
    if (rows[idx]) rows[idx].scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, -1);
    box.dataset.kbIdx = String(idx);
    _titleAcStyleRows(box, rows);
  } else if (e.key === 'Enter' && idx >= 0 && rows[idx]) {
    e.preventDefault();
    const templateIdx = parseInt(rows[idx].dataset.idx || '-1', 10);
    if (!isNaN(templateIdx) && templateIdx >= 0) {
      applyCreatorStarter(templateIdx);
      hideTemplateAutocomplete();
    }
  } else if (e.key === 'Escape') {
    hideTemplateAutocomplete();
  }
}
function _titleAcStyleRows(box, rows) {
  const idx = parseInt(box.dataset.kbIdx || '-1', 10);
  rows.forEach((r, i) => {
    r.style.background = (i === idx) ? 'rgba(124,58,237,0.12)' : 'transparent';
    r.setAttribute('aria-selected', i === idx ? 'true' : 'false');
  });
}
