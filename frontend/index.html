    <div class="creator-steps-bar" id="creatorStepsBar"></div>
    <div class="creator-body" id="creatorBody"></div>
  </div>
</div>

<script>
// ===================================================================
// API
// ===================================================================
const API = window.location.origin + '/api';

async function fetchCourses() {
  const res = await fetch(`${API}/courses`);
  if (!res.ok) throw new Error(`Failed to load courses: ${res.status}`);
  return res.json();
}

async function fetchModule(courseId, moduleId) {
  const res = await fetch(`${API}/courses/${courseId}/modules/${moduleId}`);
  if (!res.ok) throw new Error(`Failed to load module: ${res.status}`);
  return res.json();
}

async function executeCode(code, language, extras) {
  const payload = { code, language: language || 'python' };
  // D.2 (2026-04-21): pass language-specific fixtures when available.
  // SQL: schema_setup (DDL) + seed_rows ([{table, rows}]).
  // YAML: schema (JSON Schema dict).
  // The grader pulls these from step.demo_data at submit time; executeCode
  // passes them for the "Run" button previews.
  if (extras && typeof extras === 'object') {
    if (extras.schema_setup) payload.schema_setup = extras.schema_setup;
    if (extras.seed_rows) payload.seed_rows = extras.seed_rows;
    if (extras.yaml_schema) payload.yaml_schema = extras.yaml_schema;
  }
  const res = await fetch(`${API}/execute`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error(`Execution failed: ${res.status}`);
  return res.json();
}

// ===================================================================
// Phase-cycler (user directive 2026-04-20): during long Creator LLM calls
// (/start ~15s, /refine ~30-60s, /generate ~4-8 min) the button previously
// showed a bare spinner — learner felt stuck. This utility rotates status
// labels on a timer while a fetch is in flight, stops on resolve.
//
// Usage:
//   const stop = startPhaseCycle(
//     (msg) => { statusEl.textContent = msg; btn.textContent = msg; },
//     [
//       { delay: 0, text: 'Analyzing topic name\u2026' },
//       { delay: 3500, text: 'Drafting initial outline\u2026' },
//       { delay: 8000, text: 'Generating clarifying questions\u2026' },
//     ],
//   );
//   try { await doFetch(); } finally { stop(); }
// ===================================================================
function startPhaseCycle(setter, phases) {
  const timers = [];
  (phases || []).forEach((p) => {
    timers.push(setTimeout(() => {
      try { setter(p.text); } catch (_) {}
    }, p.delay || 0));
  });
  return () => timers.forEach(clearTimeout);
}

// Per-step attempt counter — sessionStorage-backed so it survives template
// re-mounts, drag-drop reset clicks, and re-renders within the same tab.
// The backend gates the answer-key reveal behind attempt_number >= 3 for
// wrong submissions, so we tick the counter on every submit and pass it
// through. See reveal-gate in main.py / validate_exercise for the
// server-side half.
//
// 2026-04-22 fix (beginner-agent walkthrough, M4.S4 categorization): the
// previous in-memory Map worked for the legacy validateExercise path but
// the NEW template path (createTemplateHandlers.judgeFn) used a separate
// state._attempts[step.id] tracker that didn't share state and appeared
// to reset. Agent saw "2 more retries" three attempts in a row — frontend
// was sending attempt_number=1 every POST, so the reveal never fired.
// Unifying BOTH paths onto sessionStorage fixes this.
const _SLL_ATTEMPT_KEY = (stepId) => `sllAttempt:${String(stepId)}`;
function _sllRecordAttempt(stepId) {
  try {
    const k = _SLL_ATTEMPT_KEY(stepId);
    const n = (parseInt(sessionStorage.getItem(k) || '0', 10) || 0) + 1;
    sessionStorage.setItem(k, String(n));
    return n;
  } catch (_) {
    if (!window._sllAttemptFallback) window._sllAttemptFallback = new Map();
    const n = (window._sllAttemptFallback.get(String(stepId)) || 0) + 1;
    window._sllAttemptFallback.set(String(stepId), n);
    return n;
  }
}
function _sllGetAttempt(stepId) {
  try {
    const k = _SLL_ATTEMPT_KEY(stepId);
    return parseInt(sessionStorage.getItem(k) || '0', 10) || 0;
  } catch (_) {
    return (window._sllAttemptFallback || new Map()).get(String(stepId)) || 0;
  }
}
// Legacy aliases — some older renderers still call _recordAttempt/_getAttempt.
// Keep the names working so nothing breaks, route through the unified store.
const _recordAttempt = _sllRecordAttempt;
const _getAttempt = _sllGetAttempt;

async function validateExercise(stepId, exerciseType, response) {
  // Backend schema expects `response_data`, not `response`. Keep both for back-compat.
  const attemptNumber = _recordAttempt(stepId);
  const res = await fetch(`${API}/exercises/validate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      step_id: stepId,
      exercise_type: exerciseType,
      response_data: response,
      attempt_number: attemptNumber,
    })
  });
  if (!res.ok) throw new Error(`Validation failed: ${res.status}`);
  return res.json();
}

// ===================================================================
// Progress (localStorage)
// ===================================================================
function getProgress() {
  try {
    return JSON.parse(localStorage.getItem('learnSkillsProgress') || '{}');
  } catch { return {}; }
}

function saveProgress(p) {
  localStorage.setItem('learnSkillsProgress', JSON.stringify(p));
}

function stepKey(courseId, moduleId, stepIndex) {
  return `${courseId}-${moduleId}-${stepIndex}`;
}

function isStepComplete(courseId, moduleId, stepIndex) {
  return !!getProgress()[stepKey(courseId, moduleId, stepIndex)];
}

function markStepComplete(courseId, moduleId, stepIndex, score) {
  const p = getProgress();
  const key = stepKey(courseId, moduleId, stepIndex);
  if (p[key]) return; // Already complete
  p[key] = true;
  saveProgress(p);
  renderStepDots();
  renderModuleList();

  // Persist to backend (fire and forget)
  const steps = state.modules?.[moduleId]?.steps;
  const stepObj = steps?.[stepIndex];
  if (stepObj && stepObj.id) {
    fetch('/api/progress/complete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({step_id: stepObj.id, score: score || null}),
    })
    .then(r => r.json())
    .then(data => {
      if (data.certificate_issued) {
        showCertificateCelebration(courseId, data.certificate);
      }
    })
    .catch(() => {}); // Silently fail
  }

  // Check local completion for course (only for exercise steps, not concept auto-completes)
  const stepType = stepObj?.exercise_type || stepObj?.step_type || 'concept';
  if (stepType !== 'concept') {
    checkCourseCompletion(courseId);
  }
}

function checkCourseCompletion(courseId) {
  if (!state.currentCourse || !state.modules) return;
  const p = getProgress();
  for (const [mIdx, mod] of Object.entries(state.modules)) {
    if (!mod.steps) continue;
    for (let s = 0; s < mod.steps.length; s++) {
      if (!p[stepKey(courseId, mIdx, s)]) return; // Not complete
    }
  }
  // All complete! Show celebration if not already shown
  const celebKey = `celebrated-${courseId}`;
  if (!localStorage.getItem(celebKey)) {
    localStorage.setItem(celebKey, 'true');
    showCertificateCelebration(courseId, null);
  }
}

function isModuleComplete(courseId, moduleId, steps) {
  if (!steps || !steps.length) return false;
  for (let i = 0; i < steps.length; i++) {
    if (!isStepComplete(courseId, moduleId, i)) return false;
  }
  return true;
}

function getModuleCompletion(courseId, moduleId, stepCount) {
  if (!stepCount) return 0;
  let done = 0;
  for (let i = 0; i < stepCount; i++) {
    if (isStepComplete(courseId, moduleId, i)) done++;
  }
  return done;
}

// ===================================================================
// URL Routing
// ===================================================================
function updateHash() {
  const target = (state.view === 'catalog')
    ? '#'
    : `#${state.currentCourse.id}/${state.currentModule}/${state.currentStepIndex}`;
  // Use pushState so Browser Back/Forward navigates through steps naturally.
  // Guard: don't push duplicates (prevents infinite history spam on refresh).
  if (location.hash !== target && location.hash.replace('#', '') !== target.replace('#', '')) {
    history.pushState({view: state.view, courseId: state.currentCourse?.id, moduleId: state.currentModule, stepIndex: state.currentStepIndex}, '', target);
  }
}

function parseHash() {
  const h = location.hash.replace('#', '');
  if (!h) return null;
  const parts = h.split('/').filter(s => s.length > 0);
  if (parts.length >= 1) {
    // Pre-2026-04-19 bug: parseHash required length>=2, so `#<courseId>` alone
    // (the common share-URL shape) fell through to goToCatalog() — the deep-link was broken.
    // Fix: treat bare courseId as "open course at first module / first step".
    return {
      courseId: parts[0],
      moduleId: parts.length >= 2 ? parts[1] : null,
      step: parts.length >= 3 ? parseInt(parts[2] || '0', 10) : 0,
    };
  }
  return null;
}

window.addEventListener('popstate', () => {
  const r = parseHash();
  if (!r) {
    goToCatalog();
  } else {
    restoreFromHash(r);
  }
});

async function restoreFromHash(r) {
  if (!state.courses.length) {
    await loadCatalog();
  }
  let course = state.courses.find(c => c.id === r.courseId);
  if (!course) {
    // Not in the cached catalog (e.g., generated after page load, or catalog stale).
    // Try fetching the specific course directly before giving up.
    try {
      const res = await fetch(`${API}/courses/${r.courseId}`);
      if (res.ok) {
        course = await res.json();
        // Seed state.courses with this course so the catalog sidebar is consistent
        if (course && !state.courses.some(c => c.id === course.id)) {
          state.courses.push(course);
        }
      }
    } catch (_e) { /* fall through */ }
  }
  if (course) {
    // moduleId=null means "user pasted bare #courseId" — enterCourse resolves to first module.
    await enterCourse(course, r.moduleId || null, r.step || 0);
  } else {
    showCatalog();
  }
}

async function init() {
  // v8 (2026-04-23): hydrate auth state before catalog so the auth bar
  // renders in its final form immediately (no flash from signed-out →
  // signed-in).
  try { await hydrateAuth(); } catch (_) {}
  const r = parseHash();
  if (r) {
    await loadCatalog();
    await restoreFromHash(r);
  } else {
    await loadCatalog();
    showCatalog();
  }
}

// ===================================================================
// v8 AUTH (2026-04-23) — client-side session management
// ===================================================================
//
// Backend: backend/auth.py. Cookie: sll_session (httpOnly, SameSite=Lax).
// We don't touch the cookie from JS — it's automatic on every fetch().
// State lives on window._auth = {user, enrollments}. renderAuthBar()
// redraws whenever state changes. Callers: init(), doLogin(), doRegister(),
// doLogout(), renderAuthBar() (self-refresh).

window._auth = { user: null, enrollments: [] };

async function hydrateAuth() {
  try {
    const r = await fetch(`${API}/auth/me`, { credentials: 'same-origin' });
    if (r.ok) {
      const body = await r.json();
      window._auth.user = body;  // null if not logged in
    }
  } catch (_) { window._auth.user = null; }
  if (window._auth.user) {
    try {
      const r = await fetch(`${API}/auth/my-courses`, { credentials: 'same-origin' });
      if (r.ok) {
        const body = await r.json();
        window._auth.enrollments = body.courses || [];
      }
    } catch (_) {}
  }
  renderAuthBar();
}

function renderAuthBar() {
  const bar = document.getElementById('authBar');
  if (!bar) return;
  const u = window._auth.user;
  if (!u) {
    bar.innerHTML = `
      <button onclick="showAuthModal('login')" style="padding:6px 14px; background:transparent; color:var(--text-primary); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:0.85rem;">Log in</button>
      <button onclick="showAuthModal('register')" style="padding:6px 14px; background:var(--accent); color:#fff; border:0; border-radius:6px; cursor:pointer; font-size:0.85rem;">Sign up</button>
    `;
  } else {
    const displayName = u.display_name || u.email.split('@')[0];
    const roleBadge = u.role === 'creator'
      ? '<span style="background:rgba(74,124,255,0.15); color:var(--accent); padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600;">CREATOR</span>'
      : (u.role === 'admin'
          ? '<span style="background:rgba(251,191,36,0.15); color:#fbbf24; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600;">ADMIN</span>'
          : '');
    // 2026-04-25 — surface "My Courses" + (creator-only) "Learners" links
    const myCoursesBtn = `<button onclick="showMyCourses()" style="padding:6px 12px; background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:0.82rem;">📚 My Courses</button>`;
    const learnersBtn = (u.role === 'creator' || u.role === 'admin')
      ? `<button onclick="showCreatorLearners()" style="padding:6px 12px; background:transparent; color:var(--accent); border:1px solid rgba(74,124,255,0.4); border-radius:6px; cursor:pointer; font-size:0.82rem;">📊 Learners</button>`
      : '';
    bar.innerHTML = `
      ${roleBadge}
      ${myCoursesBtn}
      ${learnersBtn}
      <span style="color:var(--text-primary);">${esc(displayName)}</span>
      <button onclick="doLogout()" style="padding:6px 12px; background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:0.82rem;">Log out</button>
    `;
  }
}

async function loadCreatorLearnersForCourse(courseId) {
  const detail = document.getElementById('creatorLearnersDetail');
  if (!detail) return;
  detail.innerHTML = `<div style="color:#8892a8; padding:16px;">Loading learners…</div>`;
  try {
    const r = await fetch(`${API}/auth/creator/courses/${encodeURIComponent(courseId)}/enrolled-learners`,
      {credentials: 'same-origin'});
    if (!r.ok) throw new Error(`learners ${r.status}`);
    const data = await r.json();
    renderCreatorLearnersTable(data, detail);
  } catch (e) {
    detail.innerHTML = `<div style="color:#fca5a5; padding:16px;">Failed to load learners: ${esc(e.message)}</div>`;
  }

function renderCreatorLearnersTable(data, container) {
  const learners = data.learners || [];
  const totalSteps = data.total_steps || 0;
  const enrolled = learners.length;
  const completed = learners.filter(l => l.completed_at).length;
  let html = `<div style="background:#161b26; border:1px solid #2a3352; border-radius:10px; padding:18px 22px;">
    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:14px;">
      <div>
        <div style="color:#e8ecf4; font-weight:600; font-size:1.05rem;">${esc(data.course_title || data.course_id)}</div>
        <div style="color:#8892a8; font-size:0.82rem; margin-top:3px;">${totalSteps} steps · ${enrolled} enrolled · ${completed} completed</div>
      </div>
    </div>`;
  if (!enrolled) {
    html += `<div style="color:#8892a8; padding:16px; text-align:center; background:#0e1218; border-radius:6px;">No one has enrolled in this course yet.</div>`;
    html += `</div>`;
    container.innerHTML = html;
    return;
  }
  // Table header
  html += `<table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
    <thead>
      <tr style="color:#8892a8; text-align:left; border-bottom:1px solid #2a3352;">
        <th style="padding:8px 10px; font-weight:500;">Learner</th>
        <th style="padding:8px 10px; font-weight:500;">Progress</th>
        <th style="padding:8px 10px; font-weight:500;">Per-module</th>
        <th style="padding:8px 10px; font-weight:500;">Last active</th>
        <th style="padding:8px 10px; font-weight:500;">Status</th>
      </tr>
    </thead>
    <tbody>`;
  learners.forEach(l => {
    const pct = Math.max(0, Math.min(100, Number(l.computed_progress_percent || l.progress_percent || 0)));
    const completedFlag = !!l.completed_at;
    const last = l.last_active_at ? new Date(l.last_active_at).toLocaleString() : '—';
    const statusChip = completedFlag
      ? '<span style="background:rgba(45,212,191,0.16); color:#2dd4bf; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:600;">Completed</span>'
      : (pct === 0
          ? '<span style="background:rgba(251,191,36,0.14); color:#fbbf24; padding:2px 8px; border-radius:10px; font-size:0.72rem;">Not started</span>'
          : '<span style="background:rgba(74,124,255,0.16); color:#4a7cff; padding:2px 8px; border-radius:10px; font-size:0.72rem;">In progress</span>');
    const perModule = (l.per_module || []).map(m => {
      const mPct = m.total ? Math.round(100 * m.completed / m.total) : 0;
      const color = mPct === 100 ? '#2dd4bf' : (mPct > 0 ? '#4a7cff' : '#3a4258');
      return `<span title="${esc(m.title)}" style="display:inline-block; width:32px; height:6px; background:${color}; border-radius:2px; margin-right:3px; opacity:${mPct === 0 ? 0.45 : 1};"></span>`;
    }).join('');
    const perModuleText = (l.per_module || []).map(m => `M${m.position - 1}:${m.completed}/${m.total}`).join(' · ');
    html += `<tr style="border-bottom:1px solid #1a2030;">
      <td style="padding:10px;">
        <div style="color:#e8ecf4; font-weight:500;">${esc(l.display_name || l.email || 'unknown')}</div>
        <div style="color:#8892a8; font-size:0.74rem;">${esc(l.email || '')}</div>
      </td>
      <td style="padding:10px; min-width:160px;">
        <div style="background:#0e1218; height:6px; border-radius:3px; overflow:hidden; margin-bottom:4px;">
          <div style="width:${pct}%; height:100%; background:${completedFlag ? '#2dd4bf' : '#4a7cff'};"></div>
        </div>
        <div style="color:#8892a8; font-size:0.74rem; font-family:ui-monospace,Menlo,monospace;">${pct}% · ${l.completed_steps || 0}/${l.total_steps || 0} steps</div>
      </td>
      <td style="padding:10px; min-width:200px;">
        <div>${perModule}</div>
        <div style="color:#8892a8; font-size:0.7rem; margin-top:4px; font-family:ui-monospace,Menlo,monospace;">${perModuleText}</div>
      </td>
      <td style="padding:10px; color:#c9d1df; font-size:0.78rem;">${esc(last)}</td>
      <td style="padding:10px;">${statusChip}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  html += `</div>`;
  container.innerHTML = html;
}

function showAuthModal(mode) {
  window._authMode = mode || 'login';
  const title = document.getElementById('authModalTitle');
  const btn = document.getElementById('authSubmitBtn');
  const link = document.getElementById('authToggleLink');
  const regFields = document.getElementById('authRegisterFields');
  const err = document.getElementById('authModalError');
  err.style.display = 'none';
  err.textContent = '';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  if (window._authMode === 'register') {
    title.textContent = 'Create your account';
    btn.textContent = 'Sign up';
    link.textContent = 'Already have an account? Sign in';
    regFields.style.display = 'block';
  } else {
    title.textContent = 'Sign in';
    btn.textContent = 'Sign in';
    link.textContent = 'New here? Create an account';
    regFields.style.display = 'none';
  }
  const modal = document.getElementById('authModal');
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('authEmail').focus(), 50);
}

function hideAuthModal() {
  document.getElementById('authModal').style.display = 'none';
}

function toggleAuthMode(ev) {
  ev.preventDefault();
  showAuthModal(window._authMode === 'register' ? 'login' : 'register');
}

async function doAuthSubmit(ev) {
  ev.preventDefault();
  const err = document.getElementById('authModalError');
  err.style.display = 'none';
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = 'Working…';
  try {
    let resp;
    if (window._authMode === 'register') {
      const body = {
        email, password,
        display_name: document.getElementById('authDisplayName').value.trim() || null,
        role: document.getElementById('authRole').value,
      };
      resp = await fetch(`${API}/auth/register`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin', body: JSON.stringify(body),
      });
    } else {
      resp = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin', body: JSON.stringify({email, password}),
      });
    }
    if (!resp.ok) {
      const body = await resp.json().catch(() => ({detail: 'Request failed'}));
      throw new Error(body.detail || `HTTP ${resp.status}`);
    }
    hideAuthModal();
    await hydrateAuth();
  } catch (e) {
    err.textContent = e.message || 'Authentication failed';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
}

async function doLogout() {
  try {
    await fetch(`${API}/auth/logout`, {method: 'POST', credentials: 'same-origin'});
  } catch (_) {}
  window._auth.user = null;
  window._auth.enrollments = [];
  renderAuthBar();
}

async function enrollInCourse(courseId) {
  if (!window._auth.user) { showAuthModal('login'); return; }
  try {
    const r = await fetch(`${API}/auth/enroll/${encodeURIComponent(courseId)}`, {
      method: 'POST', credentials: 'same-origin',
    });
    if (!r.ok) {
      const body = await r.json().catch(() => ({detail: 'enroll failed'}));
      alert('Enroll failed: ' + (body.detail || r.status));
      return;
    }
    await hydrateAuth();
    // Opportunistic visual cue — let catalog refresh reflect enrollment.
    try { loadCatalog().then(showCatalog); } catch (_) {}
  } catch (e) {
    alert('Enroll error: ' + e.message);
  }
}

async function loadCatalog() {
  try {
    showLoading();
    state.courses = await fetchCourses();
  } catch (e) {
    showError('Failed to load courses. Please check your connection.', loadCatalog);
    return;
  }
}

// View: Catalog
// ===================================================================

// 3 hard-coded "featured" headline courses — the canonical AI-power-skills
// references that anchor the catalog. These pin to the top of the grid and
// get the featured gradient treatment. IDs set when the 3 seed courses were
// generated via /api/creator/generate (2026-04-19).
const FEATURED_COURSE_IDS = new Set([
  'created-c91d468e3d13', // AI Power Skills for Developers (v6 — clean engineering capstone: Terraform/CI-CD/Docker/FastAPI/Redis checklist, zero biz drift)
  'created-983a2057a822', // Master AI Skills for Product Managers (v7 — cast roster + flat-key validator)
  'created-4e85194d12f1', // Master AI Skills for Operations Leaders (v5 — APPROVED by learner agent)
]);

// Infer archetype from course metadata. `archetype` and `course_mode` are NOT
// stored in the DB (Creator accepts them as transient hints to shape generation,
// not persisted). So we reconstruct a best-guess archetype from title + tags
// using keyword heuristics. Precision > recall here — an unknown course falls
// into "generalist" rather than mis-tagging into a wrong discipline.
function _inferArchetype(course) {
  const blob = `${course.title || ''} ${course.subtitle || ''} ${(course.tags || []).join(' ')} ${course.description || ''}`.toLowerCase();
  const tests = [
    ['engineering',     /\b(developer|engineer|coding|code|software|claude code|copilot|cursor|react|python|javascript|api design|testing|refactor|code review)\b/],
    ['ops_infra',       /\b(sre|devops|incident|outage|kubernetes|k8s|terraform|pagerduty|runbook|on.?call|reliability|platform eng|infra|site reliability)\b/],
    ['data_analytics',  /\b(data anal|data eng|analytics|sql|dbt|looker|snowflake|bi |business intelligence|metrics|dashboard|data scien|experiment)\b/],
    ['security_soc',    /\b(security|soc|siem|splunk|threat|phishing|incident response|detection|pentest|vulnerab|appsec|compliance.{0,10}audit)\b/],
    ['legal_contract',  /\b(legal|contract|gdpr|dsar|privacy|counsel|compliance|redline|msa|nda|liability|regulatory|sec filing)\b/],
    ['pm_strategy',     /\b(product manager|product management|prd|roadmap|launch|discovery|pm skills|staff pm|cpo|go.?to.?market|product strategy)\b/],
    ['design_ux',       /\b(design|ux|ui designer|figma|user research|wireframe|prototype|design system|information architect)\b/],
    ['sales_revops',    /\b(sales|revops|pipeline|crm|salesforce|account exec|bdr|sdr|upsell|cross.?sell|pitch|quota|discovery call)\b/],
    ['finance_ledger',  /\b(finance|accounting|ledger|fp&a|forecast|budget|close|audit|tax|treasury|cfo)\b/],
    ['people_hr',       /\b(hr |hrbp|recruit|hiring|people ops|talent|comp|diversity|pip|onboarding|culture)\b/],
    ['business_ops',    /\b(operations|biz.?ops|ops manager|workflow|process|triage|queue|ticket)\b/],
    ['executive',       /\b(executive|ceo|coo|gm |vp |board|investor relations|c.?suite|chief of staff)\b/],
  ];
  for (const [key, rx] of tests) {
    if (rx.test(blob)) return key;
  }
  return 'generalist';
}

function _levelKey(level) {
  const v = (level || '').toLowerCase().trim();
  if (!v) return '';
  if (v.startsWith('beginn')) return 'beginner';
  if (v.startsWith('inter')) return 'intermediate';
  if (v.startsWith('adv')) return 'advanced';
  // "all", "all levels", etc. → treat as unset (no badge shown)
  if (v === 'all' || v === 'all levels') return '';
  return v;
}

// Dedup courses with identical titles — keep only the most recent (by created_at).
// The catalog accumulates chaos-test artifacts and Creator-retry duplicates; hiding
// them is a UX fix rather than deleting data. Featured courses always pass through.
function _dedupCourses(courses) {
  const byTitle = new Map();
  for (const c of courses) {
    const key = (c.title || '').trim().toLowerCase();
    if (!key || FEATURED_COURSE_IDS.has(c.id)) { byTitle.set(c.id, c); continue; }
    const existing = byTitle.get(key);
    if (!existing) { byTitle.set(key, c); continue; }
    // Keep the newer one (ties broken by id)
    const a = new Date(existing.created_at || 0).getTime();
    const b = new Date(c.created_at || 0).getTime();
    if (b > a) byTitle.set(key, c);
  }
  return Array.from(byTitle.values());
}

// Apply the catalog filter state to the full course list.
function _filterCourses(courses) {
  const f = state.catalogFilter;
  const q = (f.search || '').trim().toLowerCase();
  return courses.filter(c => {
    if (f.discipline && _inferArchetype(c) !== f.discipline) return false;
    if (f.level && _levelKey(c.level) !== f.level) return false;
    if (f.courseType && (c.course_type || 'technical') !== f.courseType) return false;
    if (q) {
      const hay = `${c.title || ''} ${c.subtitle || ''} ${c.description || ''} ${(c.tags || []).join(' ')}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function showCatalog() {
  state.view = 'catalog';
  state.currentCourse = null;
  state.currentModule = null;
  state.currentModuleData = null;
  state.expertiseLevel = null;

  // (2026-04-21 user fix: banner was floating across all views).
  if (typeof refreshAutoReviewBannerVisibility === 'function') refreshAutoReviewBannerVisibility();

  // Body class → CSS collapses sidebar + expands content-scroll to full width
  document.body.classList.add('catalog-mode');

  document.getElementById('sidebarCourseInfo').style.display = 'none';
  document.getElementById('sidebarFooter').style.display = 'none';
