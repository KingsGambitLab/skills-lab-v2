    <div style="width:min(520px, 90vw); height:100vh; background:var(--bg-primary); border-left:1px solid var(--border); padding:20px 22px; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <h3 style="margin:0; font-size:1.05rem;">All ${CREATOR_STARTERS.length} templates</h3>
        <button onclick="document.getElementById('templateBrowserOverlay').remove();" style="background:none; border:0; color:var(--text-secondary); font-size:1.3rem; cursor:pointer;">×</button>
      </div>
      <p style="font-size:0.82rem; color:var(--text-muted); margin-bottom:14px;">Click any template to pre-fill. You can edit everything after.</p>
      ${cards}
    </div>
  `;
  document.body.appendChild(overlay);
}

function toggleFramingPill(btn) {
  // Single-select within a dimension row (used on step 2 framing band)
  const dim = btn.dataset.dim;
  document.querySelectorAll(`.framing-pill[data-dim="${dim}"]`).forEach(p => { if (p !== btn) p.classList.remove('active'); });
  btn.classList.toggle('active');
}

// ===================================================================
// Creator step 2 combobox — typeahead input that also accepts free text
// ===================================================================
function _comboGetSuggestions(inputEl) {
  try { return JSON.parse(inputEl.dataset.suggestions || '[]'); } catch { return []; }
}

function onComboInput(id) {
  const inp = document.getElementById(id);
  if (!inp) return;
  _renderComboDropdown(id, inp.value);
}

function showComboDropdown(id) {
  const inp = document.getElementById(id);
  if (!inp) return;
  _renderComboDropdown(id, inp.value);
}

let _comboHideTimer = {};
function hideComboDropdownSoon(id) {
  clearTimeout(_comboHideTimer[id]);
  _comboHideTimer[id] = setTimeout(() => {
    const dd = document.getElementById(id + '_dd');
    if (dd) dd.style.display = 'none';
  }, 180);
}

function _renderComboDropdown(id, query) {
  const inp = document.getElementById(id);
  const dd = document.getElementById(id + '_dd');
  if (!inp || !dd) return;
  const allSugs = _comboGetSuggestions(inp);
  const q = (query || '').toLowerCase().trim();
  const matches = q
    ? allSugs.filter(s => String(s).toLowerCase().includes(q))
    : allSugs.slice(0);

  if (allSugs.length === 0 && !q) {
    // No suggestions to offer AND nothing typed — don't show an empty dropdown
    dd.style.display = 'none';
    return;
  }

  let html = '';
  matches.slice(0, 10).forEach((s, i) => {
    html += `<div class="combo-row"
               data-value="${escAttr(String(s))}"
               onmousedown="_comboPick('${id}', this.dataset.value); return false;"
               style="padding:9px 12px; border-bottom:1px solid var(--border); cursor:pointer; font-size:0.88rem; color:var(--text-primary);">
             ${esc(String(s))}
           </div>`;
  });
  // Always-present "use what I typed" hint
  if (q && !allSugs.map(s => String(s).toLowerCase()).includes(q)) {
    html += `<div class="combo-hint-row" style="padding:9px 12px; font-size:0.78rem; color:var(--text-muted); font-style:italic;">
      Press Enter to use: <span style="color:var(--accent);">${esc(inp.value)}</span>
    </div>`;
  } else if (!matches.length) {
    html += `<div class="combo-hint-row" style="padding:9px 12px; font-size:0.78rem; color:var(--text-muted); font-style:italic;">
      No suggestions match — keep typing your own answer.
    </div>`;
  }
  dd.innerHTML = html;
  dd.style.display = 'block';
  // Reset keyboard focus
  dd.dataset.kbIdx = '-1';
  _comboStyleRows(dd);
}

function _comboStyleRows(dd) {
  const rows = dd.querySelectorAll('.combo-row');
  const idx = parseInt(dd.dataset.kbIdx || '-1', 10);
  rows.forEach((r, i) => {
    r.style.background = (i === idx) ? 'rgba(124,58,237,0.12)' : 'transparent';
  });
}

function _comboPick(id, value) {
  const inp = document.getElementById(id);
  const dd = document.getElementById(id + '_dd');
  if (!inp) return;
  inp.value = value;
  if (dd) dd.style.display = 'none';
  inp.focus();
}

function onComboKey(e, id) {
  const dd = document.getElementById(id + '_dd');
  if (!dd) return;
  const rows = dd.querySelectorAll('.combo-row');
  let idx = parseInt(dd.dataset.kbIdx || '-1', 10);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (dd.style.display === 'none') { showComboDropdown(id); return; }
    idx = Math.min(idx + 1, rows.length - 1);
    dd.dataset.kbIdx = String(idx);
    _comboStyleRows(dd);
    if (rows[idx]) rows[idx].scrollIntoView({block: 'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, -1);
    dd.dataset.kbIdx = String(idx);
    _comboStyleRows(dd);
  } else if (e.key === 'Enter') {
    // If a suggestion is keyboard-focused, pick it; otherwise keep the typed value
    if (idx >= 0 && rows[idx]) {
      e.preventDefault();
      _comboPick(id, rows[idx].dataset.value);
    } else {
      // Accept free text — just close dropdown
      dd.style.display = 'none';
    }
  } else if (e.key === 'Escape') {
    dd.style.display = 'none';
  }
}

function applyCreatorStarter(idx) {
  const s = CREATOR_STARTERS[idx];
  if (!s) return;
  document.getElementById('creatorTitle').value = s.title;
  document.getElementById('creatorDesc').value = s.desc;
  document.getElementById('creatorType').value = s.course_type || 'case_study';
  document.getElementById('creatorLevel').value = s.level || '';
  document.getElementById('creatorMode').value = s.course_mode || '';
  const arch = document.getElementById('creatorArchetype');
  if (arch) arch.value = s.archetype || '';
  // Visual feedback: briefly pulse the "Start" button so the user knows things loaded
  const btn = document.getElementById('creatorStartBtn');
  if (btn) {
    btn.style.boxShadow = '0 0 0 3px rgba(124, 58, 237, 0.35)';
    setTimeout(() => { btn.style.boxShadow = ''; }, 800);
  }
  // Scroll to the title field so the user sees it got filled
  document.getElementById('creatorTitle').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Explicit URL-fetch button — crawls pages now and stashes the extracted text on
// `state._urlsFetchedMaterial` so `creatorStart()` just folds it in. Gives the
// creator confidence that the crawl worked before they hit Continue.
async function creatorFetchUrls() {
  const input = document.getElementById('creatorUrls');
  const statusEl = document.getElementById('creatorUploadStatus');
  const btn = document.getElementById('creatorFetchUrlBtn');
  const raw = (input?.value || '').trim();
  if (!raw) { if (statusEl) statusEl.textContent = 'Paste at least one URL first.'; return; }
  const urls = raw.split(/[\s,]+/).filter(Boolean).slice(0, 5);
  if (!urls.length) return;

  const origLabel = btn.textContent;
  btn.disabled = true; btn.textContent = 'Fetching...';
  if (statusEl) statusEl.textContent = `Fetching ${urls.length} URL(s)...`;

  try {
    const r = await fetch(`${API}/creator/fetch_url`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'fetch failed');
    state._urlsFetchedMaterial = data.combined_source_material || '';
    const okPages = (data.pages || []).filter(p => p.status === 'ok');
    const failPages = (data.pages || []).filter(p => p.status !== 'ok');
    const okSummary = okPages.map(p => `✓ ${p.title || p.url} (${p.chars.toLocaleString()} chars)`).join(' · ');
    const failSummary = failPages.length
      ? ` · ${failPages.length} failed: ${failPages.map(p => `${p.url} [${p.status}]`).join(', ').slice(0, 200)}`
      : '';
    if (statusEl) statusEl.textContent = okSummary + failSummary || 'No pages extracted.';
    // URL fetch just populated real char count — recompute the content meter
    try { updateCreatorContentMeter(); } catch (_) {}
  } catch (e) {
    if (statusEl) statusEl.textContent = `URL fetch failed: ${e.message}`;
  } finally {
    btn.disabled = false; btn.textContent = origLabel;
  }
}

// Combined content-size meter (2026-04-20 user directive): rolls up course-objective +
// uploaded-file char estimate + fetched-URL char count; shows green <90%, amber
// 90-99%, red at 100%. Refuses submit at 50000+ via creatorStart (bumped from
// 18000 on 2026-04-21 per user request to allow longer source material).
const CREATOR_CONTENT_LIMIT_CHARS = 50000;

function _estimateFileCharCount(files) {
  if (!files || !files.length) return 0;
  // We don't have extracted text client-side — use file size × ~0.7 (rough
  // PDF text-to-byte ratio) as an upper-bound estimate. Actual char count
  // comes back from /api/creator/upload on submit, at which point the
  // frontend knows the real number. This estimate is only for the live meter.
  let total = 0;
  for (const f of files) {
    // Treat .txt/.md as 1:1, .pdf/.docx/.pptx as ~0.4 ratio (lots of binary overhead)
    const ratio = /\.(pdf|docx|pptx|ppt)$/i.test(f.name) ? 0.4 : 1.0;
    total += Math.round((f.size || 0) * ratio);
  }
  return total;
}

function updateCreatorContentMeter() {
  const descEl = document.getElementById('creatorDesc');
  const filesEl = document.getElementById('creatorFiles');
  const urlsEl = document.getElementById('creatorUrls');
  const textEl = document.getElementById('creatorContentMeterText');
  const barEl = document.getElementById('creatorContentMeterBar');
  if (!textEl || !barEl) return;

  const descLen = descEl ? (descEl.value || '').length : 0;
  const fileLen = filesEl ? _estimateFileCharCount(filesEl.files) : 0;
  const urlFetchedLen = (state._urlsFetchedMaterial || '').length;
  // URLs entered but not yet fetched contribute only a rough placeholder (100 chars/URL)
  let urlPlaceholderLen = 0;
  if (urlsEl && urlsEl.value.trim() && !urlFetchedLen) {
    const n = urlsEl.value.trim().split(/[\s,]+/).filter(Boolean).length;
    urlPlaceholderLen = n * 2000;  // assume ~2K chars per URL when not yet fetched
  }

  const total = descLen + fileLen + urlFetchedLen + urlPlaceholderLen;
  const pct = Math.min(100, Math.round((total / CREATOR_CONTENT_LIMIT_CHARS) * 100));
  const over = total > CREATOR_CONTENT_LIMIT_CHARS;
  const warn = total > CREATOR_CONTENT_LIMIT_CHARS * 0.9;

  const fmt = (n) => n.toLocaleString();
  let label = `${fmt(total)} / ${fmt(CREATOR_CONTENT_LIMIT_CHARS)} chars combined`;
  if (urlPlaceholderLen > 0) label += ` (URL estimate — real count after fetch)`;
  if (fileLen > 0) label += ` · files estimated by size`;
  if (over) label = `⚠ Over limit by ${fmt(total - CREATOR_CONTENT_LIMIT_CHARS)} chars — trim before submitting`;

  textEl.textContent = label;
  barEl.style.width = pct + '%';
  barEl.style.background = over ? '#f87171' : (warn ? '#fbbf24' : '#34d399');
}

async function creatorStart() {
  const title = document.getElementById('creatorTitle').value.trim();
  let desc = document.getElementById('creatorDesc').value.trim();
  // When the user types a custom title (no template clicked), #creatorType is "".
  // Backend's Literal["technical","case_study","compliance"] rejects empty → 422.
  // Infer from the title + description; fall back to "technical".
  let courseType = document.getElementById('creatorType').value;
  if (!courseType) {
    const hay = (title + ' ' + desc).toLowerCase();
    if (/\b(compliance|gdpr|posh|hipaa|sox|privacy|regulatory|audit|training)\b/.test(hay)) {
      courseType = 'compliance';
    } else if (/\b(product manager|\bpm\b|ops|hr|recruit|sales|marketing|legal|finance|accountant|counsel|leadership|strategy|stakeholder|customer success|analyst)\b/.test(hay)) {
      courseType = 'case_study';
    } else {
      courseType = 'technical';
    }
    document.getElementById('creatorType').value = courseType;
  }
  // 2026-04-20: the creatorSource paste-text textarea was removed to avoid
  // description-vs-source conflict. Defensive read in case an older template
  // still renders the element; otherwise the sourceTyped string stays empty
  // and the submission path falls back on description + files + URLs alone.
  const _srcEl = document.getElementById('creatorSource');
  const sourceTyped = _srcEl ? _srcEl.value.trim() : '';
  const filesInput = document.getElementById('creatorFiles');
  const files = filesInput?.files ? Array.from(filesInput.files) : [];
  // New optional creator-chosen fields
  const levelEl = document.getElementById('creatorLevel');
  const modeEl = document.getElementById('creatorMode');
  const archEl = document.getElementById('creatorArchetype');
  const level = levelEl?.value || null;
  const courseMode = modeEl?.value || null;
  const archetype = archEl?.value || null;

  // Clear any stale error-border state from a previous failed submit, THEN
  // re-flag only the fields that are still empty. Previously the red border
  // set on missing input persisted forever because nothing cleared it when
  // the creator typed — creating the "stuck red" UX bug (user flagged
  // 2026-04-20).
  const _titleEl = document.getElementById('creatorTitle');
  const _descEl = document.getElementById('creatorDesc');
  if (_titleEl) _titleEl.style.borderColor = '';
  if (_descEl) _descEl.style.borderColor = '';

  if (!title) {
    if (_titleEl) _titleEl.style.borderColor = 'var(--error)';
    // One-shot listener: as soon as the creator types, drop the red border
    // so they get a live "I fixed it" signal instead of a stale error state.
    if (_titleEl) _titleEl.addEventListener('input', function _clr() {
      _titleEl.style.borderColor = '';
      _titleEl.removeEventListener('input', _clr);
    }, { once: true });
    return;
  }
  if (!desc) {
    if (_descEl) _descEl.style.borderColor = 'var(--error)';
    if (_descEl) _descEl.addEventListener('input', function _clr() {
      _descEl.style.borderColor = '';
      _descEl.removeEventListener('input', _clr);
    }, { once: true });
    return;
  }

  // Append any selected framing overlays (suggestions appended to desc — creator's free choice).
  const selectedFramings = [];
  document.querySelectorAll('.framing-pill.active').forEach(p => {
    const dim = p.dataset.dim, opt = p.dataset.opt;
    const D = (typeof FRAMING_DIMENSIONS !== 'undefined') ? FRAMING_DIMENSIONS.find(x => x.id === dim) : null;
    const O = D ? D.options.find(x => x.id === opt) : null;
    if (O) selectedFramings.push(`[${D.label} — ${O.label}] ${O.append}`);
  });
  if (selectedFramings.length) {
    desc = desc + '\n\nCREATOR FRAMING CHOICES (suggestions, not rigid requirements):\n' + selectedFramings.map(f => '- ' + f).join('\n');
  }

  const btn = document.getElementById('creatorStartBtn');
  const statusEl = document.getElementById('creatorUploadStatus');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    // Combine all source material: typed text + uploaded files + fetched URLs.
    let sourceMaterial = sourceTyped;

    // 1. Files
    if (files.length > 0) {
      btn.textContent = 'Extracting text...';
      if (statusEl) statusEl.textContent = `Uploading ${files.length} file(s)...`;
      const fd = new FormData();
      files.forEach(f => fd.append('files', f));
      const uploadRes = await fetch(`${API}/creator/upload`, { method: 'POST', body: fd });
      if (!uploadRes.ok) throw new Error(`Upload failed: ${uploadRes.status}`);
      const uploadData = await uploadRes.json();
      if (statusEl) {
        const okCount = (uploadData.files || []).filter(f => f.status === 'ok').length;
        statusEl.textContent = `Extracted ${uploadData.total_chars} chars from ${okCount}/${files.length} file(s).`;
      }
      sourceMaterial = [sourceMaterial, uploadData.combined_source_material].filter(Boolean).join('\n\n');
    }

    // 2. URLs — if user pasted a link and didn't click the Fetch button first,
    //    crawl here so the submit flow is one-click.
    // User directive 2026-04-20: if a URL is entered it's COMPULSORY — a failed
    // fetch must abort course creation rather than silently proceed without
    // the source. Previously we swallowed fetch errors and generated the
    // course with NO URL content, which was invisible to the creator.
    const urlsInput = document.getElementById('creatorUrls');
    const urlsRaw = urlsInput ? urlsInput.value.trim() : '';
    if (urlsRaw && !state._urlsFetchedMaterial) {
      const urls = urlsRaw.split(/[\s,]+/).filter(Boolean).slice(0, 5);
      if (urls.length) {
        btn.textContent = 'Fetching page(s)...';
        if (statusEl) statusEl.textContent = `Fetching ${urls.length} URL(s)...`;
        let urlData = null;
        let fetchErr = null;
        try {
          const r = await fetch(`${API}/creator/fetch_url`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ urls }),
          });
          urlData = await r.json();
          if (!r.ok) {
            fetchErr = urlData.detail || `HTTP ${r.status}`;
          }
        } catch (e) {
          fetchErr = e.message || 'network error';
        }

        const okPages = (urlData && urlData.pages || []).filter(p => p.status === 'ok');
        const failPages = (urlData && urlData.pages || []).filter(p => p.status !== 'ok');
        const gotMaterial = urlData && urlData.combined_source_material;

        // COMPULSORY: if any URL was entered and we can't get any material from
        // any of them, HARD STOP the creator submission. The creator should
        // fix / remove the URL and retry.
        if (fetchErr || !gotMaterial) {
          const reason = fetchErr ||
            (failPages.length
              ? `all ${failPages.length} URL(s) failed: ${failPages.map(p => `${p.url} [${p.status}]`).join(', ').slice(0, 180)}`
              : 'no content extracted');
          if (statusEl) {
            statusEl.style.color = 'var(--error)';
            statusEl.textContent = `URL fetch required but failed: ${reason}. Remove the URL(s) or fix them, then retry.`;
          }
          btn.disabled = false;
          btn.textContent = 'Start creating →';
          return;  // abort — do not proceed to /creator/start
        }

        // Fetch succeeded (at least one page). Warn if some failed but at
        // least one succeeded — we continue but surface the partial failure.
        sourceMaterial = [sourceMaterial, urlData.combined_source_material].filter(Boolean).join('\n\n');
        if (statusEl) {
          const okMsg = `Fetched ${urlData.total_chars} chars from ${okPages.length}/${urls.length} URL(s).`;
          const partialMsg = failPages.length
            ? ` · Warning: ${failPages.length} URL(s) failed but continuing with the ${okPages.length} successful one(s).`
            : '';
          statusEl.textContent = (statusEl.textContent + ` · ${okMsg}${partialMsg}`).trim();
        }
      }
    } else if (state._urlsFetchedMaterial) {
      // User pre-fetched via the "Fetch" button — fold in now.
      sourceMaterial = [sourceMaterial, state._urlsFetchedMaterial].filter(Boolean).join('\n\n');
    }

    // HARD LIMIT ENFORCEMENT (user directive 2026-04-20): no silent truncation
    // anywhere in the pipeline. If combined content > 50000 chars, refuse to
    // submit and ask the creator to trim. This guarantees every char the
    // creator typed/uploaded/fetched makes it into every prompt verbatim.
    const combinedLen = (desc || '').length + (sourceMaterial || '').length;
    if (combinedLen > CREATOR_CONTENT_LIMIT_CHARS) {
      btn.disabled = false;
      btn.textContent = 'Start creating →';
      if (statusEl) {
        statusEl.style.color = 'var(--error)';
        statusEl.textContent =
          `Combined content is ${combinedLen.toLocaleString()} chars — over the ${CREATOR_CONTENT_LIMIT_CHARS.toLocaleString()}-char limit. ` +
          `Trim the course-objective box or remove a file/URL by ${(combinedLen - CREATOR_CONTENT_LIMIT_CHARS).toLocaleString()} chars before starting.`;
      }
      updateCreatorContentMeter();
      return;
    }

    btn.textContent = 'Starting...';
    const body = { title, description: desc, course_type: courseType };
    if (sourceMaterial) body.source_material = sourceMaterial;
    if (level) body.level = level;
    if (courseMode) body.course_mode = courseMode;
    if (archetype) body.archetype = archetype;

    // Live phase feedback during the LLM-driven /start call (~10-15s). Without
    // this the learner sees only "Starting..." and feels stuck while the LLM
    // drafts the initial outline + clarifying questions.
    const _stopStartPhases = startPhaseCycle(
      (msg) => { btn.textContent = msg; if (statusEl) statusEl.textContent = msg; },
      [
        { delay: 0, text: 'Reading your Topic + Content\u2026' },
        { delay: 3500, text: 'Drafting the initial outline\u2026' },
        { delay: 8000, text: 'Inventing clarifying questions\u2026' },
        { delay: 13000, text: 'Wrapping up\u2026 (this one\u2019s taking a sec)' },
      ],
    );
    // 2026-04-22 v8: /creator/start now enqueues a celery task and returns
    // {session_id, task_id, status: "pending"} immediately. We poll
    // /creator/session/{sid}/status until the task is done, then pull the
    // actual {questions, initial_outline, ...} out of the task's response.
    // Before this fix: the wizard jumped to step 2 with questions=[] and
    // the UI showed "A few questions..." with zero question rows.
    let enqueueRes, enqueueData, finalResp;
    try {
      enqueueRes = await fetch(`${API}/creator/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!enqueueRes.ok) throw new Error(`Failed: ${enqueueRes.status}`);
      enqueueData = await enqueueRes.json();
      const sid = enqueueData.session_id;
      if (!sid) throw new Error('No session_id returned');
      finalResp = await _pollCreatorTaskUntilDone(sid);
    } finally { _stopStartPhases(); }

    creatorState.sessionId = enqueueData.session_id;
    const resp = finalResp || {};
    creatorState.questions = resp.questions || [];
    creatorState.initialOutline = resp.initial_outline || { modules: [] };
    creatorState.step = 2;
    _saveCreatorDraft();  // 2026-04-21 persist draft across back-nav
    renderCreatorWizard();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Start \u2192';
    if (statusEl) statusEl.textContent = 'Error: ' + e.message;
    alert('Failed to start creator session: ' + e.message);
  }
}

// 2026-04-22 v8 — celery async polling helper for the Creator wizard.
//
// After the v7.5 celery switch, /creator/start, /creator/refine, and
// /creator/generate all return {session_id, task_id, status: "pending"}
// immediately instead of the actual response payload. The frontend must
// poll /api/creator/session/{sid}/status until `status == "done"`, then
// pull the real response out of the `response` field.
//
// Returns the parsed `response` object (questions + initial_outline for
// start, outline + follow_up_questions for refine, course_id for generate).
// Throws on timeout or task failure — caller decides how to surface the
// error.
async function _pollCreatorTaskUntilDone(sessionId, opts) {
  opts = opts || {};
  const timeoutMs = opts.timeoutMs || 15 * 60 * 1000;  // 15 min default
  const pollIntervalMs = opts.pollIntervalMs || 2500;
  const onProgress = typeof opts.onProgress === 'function' ? opts.onProgress : null;
  const t0 = Date.now();
  let lastState = null;
  while (true) {
    if (Date.now() - t0 > timeoutMs) {
      throw new Error(`Creator task timed out after ${Math.round(timeoutMs/60000)} min`);
    }
    let r;
    try {
      r = await fetch(`${API}/creator/session/${encodeURIComponent(sessionId)}/status`);
    } catch (e) {
      // Transient network error — keep polling
      await new Promise(res => setTimeout(res, pollIntervalMs));
      continue;
    }
    if (!r.ok) {
      // 404 on the first few polls is expected (race between enqueue and
      // the status endpoint seeing the job). Back off and retry.
      if (r.status === 404) {
        await new Promise(res => setTimeout(res, pollIntervalMs));
        continue;
      }
      throw new Error(`status poll HTTP ${r.status}`);
    }
    const s = await r.json();
    if (s.status !== lastState) {
      lastState = s.status;
      if (onProgress) { try { onProgress(s); } catch (_) {} }
    }
    if (s.status === 'done') {
      return s.response || {};
    }
    if (s.status === 'failed') {
      throw new Error(s.error || 'Creator task failed (no detail)');
    }
    await new Promise(res => setTimeout(res, pollIntervalMs));
  }
}

// ---------- Step 2: Answer Questions ----------
function renderCreatorStep2() {
  // Layout: single column of combo-input questions. Submit proceeds to step 3.
  //
  // 2026-04-22 cleanup: removed the "How hands-on should this feel?" depth
  // picker (Drop-in simulation / Guided practice / Concept-first). It was
  // compulsory in the UI but the selected value was stashed on creatorState
  // and NEVER sent to the backend — /api/creator/refine receives only
  // {session_id, answers}. Dead UX that gated submit for nothing. If/when
  // we wire depth through, restore via the COURSE_MODE_REGISTRY path.

  // Questions render as a TYPEAHEAD COMBOBOX: input + dropdown of suggestions that
  // filters as you type, BUT always accepts free text. Fixes "none of the options fit" problem.
  // Now with ARIA attributes for screen-reader users (aria-combobox / autocomplete / expanded).
  const questionsHtml = creatorState.questions.map((q, qIdx) => {
    const suggestions = (q.type === 'choice' && Array.isArray(q.options)) ? q.options : [];
    const comboId = `creatorCombo_${qIdx}`;
    const ddId = comboId + '_dd';
    const suggestionsJson = JSON.stringify(suggestions).replace(/"/g, '&quot;');
    const hint = suggestions.length
      ? `${suggestions.length} suggestion${suggestions.length===1?'':'s'} — or write your own`
      : 'Type your own answer';
    return `<div class="creator-question-item" style="margin-bottom:16px;">
      <label for="${comboId}" class="creator-question-text" style="margin-bottom:6px; display:block;">${esc(q.question)}</label>
      <div class="combo-wrap" style="position:relative;" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-owns="${ddId}">
        <input class="creator-form-input creator-answer combo-input"
               id="${comboId}"
               data-qid="${esc(q.id)}"
               data-suggestions="${suggestionsJson}"
               type="text"
               autocomplete="off"
               role="combobox"
               aria-autocomplete="list"
               aria-controls="${ddId}"
               aria-expanded="false"
               placeholder="Type your answer or press ↓ for suggestions"
               oninput="onComboInput('${comboId}')"
               onfocus="showComboDropdown('${comboId}')"
               onblur="hideComboDropdownSoon('${comboId}')"
               onkeydown="onComboKey(event, '${comboId}')"
               >
        <div class="combo-hint" style="font-size:0.74rem; color:var(--text-muted); margin-top:4px;">${esc(hint)}</div>
        <div class="combo-dropdown"
             id="${ddId}"
             role="listbox"
             style="display:none; position:absolute; top:100%; left:0; right:0; margin-top:4px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; max-height:240px; overflow-y:auto; z-index:20; box-shadow:0 12px 32px rgba(0,0,0,0.35);">
        </div>
      </div>
    </div>`;
  }).join('');

  // Single-column layout — the outline-preview right-panel was dropped. Outline shows on step 3.
  return `
    <div style="max-width:720px; margin:0 auto;">
      <h3 style="font-size:0.94rem; color:var(--text-primary); margin:10px 0 14px;">A few questions so we can tailor the course</h3>
      ${questionsHtml}

      <div class="creator-actions">
        <button class="creator-btn" onclick="creatorState.step=1;renderCreatorWizard();">&larr; Back</button>
        <button class="creator-btn primary" id="creatorRefineBtn" onclick="creatorRefine()">Submit Answers &rarr;</button>
      </div>
    </div>
  `;
}

async function creatorRefine(isRetry) {
  const answerEls = document.querySelectorAll('.creator-answer');
  const answers = [];
  answerEls.forEach(el => {
    answers.push({
      question_id: el.dataset.qid,
      answer: el.value.trim() || el.value,
    });
  });
  // Preserve answers so a refine failure doesn't lose the creator's work
  creatorState.lastAnswers = answers;

  const btn = document.getElementById('creatorRefineBtn');
  btn.disabled = true;
  btn.textContent = isRetry ? 'Retrying...' : 'Refining...';

  // Clear any previous inline error
  let errEl = document.getElementById('creatorRefineError');
  if (errEl) errEl.remove();

  // Live phase labels during /refine (~30-60s). Without this the learner just
  // sees "Refining..." for a minute and feels stuck. The LLM's actual phases
  // here: apply answers → rewrite outline → outline-critic pass.
  const _stopRefinePhases = startPhaseCycle(
    (msg) => { btn.textContent = msg; },
    [
      { delay: 0, text: 'Applying your answers\u2026' },
      { delay: 5000, text: 'Re-structuring modules\u2026' },
      { delay: 15000, text: 'Critiquing the outline\u2026' },
      { delay: 30000, text: 'Polishing edge cases\u2026' },
      { delay: 50000, text: 'Almost there\u2026' },
    ],
  );

  // 2026-04-22 v8: /creator/refine is now async (celery). Enqueue then poll.
  async function enqueueRefine() {
    const res = await fetch(`${API}/creator/refine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: creatorState.sessionId, answers }),
    });
    if (!res.ok) {
      let detail = '';
      try { detail = (await res.json()).detail || ''; } catch {}
      throw new Error(`HTTP ${res.status}${detail ? ': '+detail : ''}`);
    }
    return await res.json();  // {session_id, task_id, status: "pending"}
  }

  try {
    await enqueueRefine();
    const data = await _pollCreatorTaskUntilDone(creatorState.sessionId, {
      timeoutMs: 5 * 60 * 1000,  // 5 min — refine is faster than generate
    });

    _stopRefinePhases();
    creatorState.refinedOutline = data.outline || { modules: [] };
    creatorState.followUpQuestions = data.follow_up_questions || null;
    creatorState.step = 3;
    _saveCreatorDraft();  // 2026-04-21 persist draft across back-nav
    renderCreatorWizard();
  } catch (e) {
    _stopRefinePhases();
    btn.disabled = false;
    btn.textContent = 'Submit Answers \u2192';
    const parent = btn.parentElement;
    const msg = String(e && e.message || e);
    const errBox = document.createElement('div');
    errBox.id = 'creatorRefineError';
    errBox.style.cssText = 'background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.35); border-radius:6px; padding:10px 12px; margin:10px 0; font-size:0.86rem; color:var(--text-primary); display:flex; align-items:center; justify-content:space-between; gap:12px;';
    errBox.innerHTML = `
      <div>
        <div style="color:#f87171; font-weight:600; margin-bottom:2px;">Couldn't refine the outline.</div>
        <div style="font-size:0.78rem; color:var(--text-muted);">Your answers are preserved. The LLM may have timed out or be busy — try again. <span style="color:var(--text-muted); font-style:italic;">(${esc(msg).slice(0,120)})</span></div>
      </div>
      <button class="creator-btn primary" style="flex:0 0 auto;" onclick="creatorRefine(true)">Try again</button>
    `;
    parent.parentElement.insertBefore(errBox, parent);
  }
}

// ---------- Step 3: Review & Refine ----------
function renderCreatorStep3() {
  const outline = creatorState.refinedOutline;
  const treeHtml = (outline.modules || []).map(mod => {
    const stepsHtml = (mod.steps || []).map(s => `
      <div class="creator-step-node">
        <span class="creator-step-title">${esc(s.title)}</span>
        <span class="creator-exercise-badge ${s.exercise_type || ''}">${esc(s.exercise_type || 'concept')}</span>
      </div>`).join('');

    const objHtml = (mod.objectives || []).length
      ? `<ul class="creator-module-objectives">${mod.objectives.map(o => `<li>${esc(o)}</li>`).join('')}</ul>`
      : '';

    return `<div class="creator-module-node">
      <div class="creator-module-title">${esc(mod.title)}</div>
      ${objHtml}
      ${stepsHtml}
    </div>`;
  }).join('');

  let followUpHtml = '';
  if (creatorState.followUpQuestions && creatorState.followUpQuestions.length) {
    followUpHtml = `
      <div class="creator-follow-ups">
        <h4 style="font-size:0.85rem;font-weight:600;color:var(--text-primary);margin-bottom:10px">Follow-up Questions</h4>
        ${creatorState.followUpQuestions.map(fq => `
          <div class="creator-follow-up-item">
            <div class="creator-follow-up-q">${esc(fq.question)}</div>
            <input class="creator-form-input creator-followup-answer" data-fqid="${esc(fq.id)}" placeholder="Your response (optional)...">
          </div>`).join('')}
      </div>`;
  }

  return `
    <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:14px">Course Outline</h3>
    <div class="creator-outline-tree">${treeHtml || '<p style="color:var(--text-muted)">No modules in outline.</p>'}</div>
    ${followUpHtml}
    <div class="creator-feedback-section">
      <h4>Additional Feedback (optional)</h4>
      <textarea class="creator-form-textarea" id="creatorFeedback" placeholder="Request changes, add modules, adjust difficulty..."></textarea>
      <div style="margin-top:10px">
        <button class="creator-btn" id="creatorReRefineBtn" onclick="creatorReRefine()">Refine Again</button>
      </div>
    </div>
    <div class="creator-actions">
      <button class="creator-btn" onclick="creatorState.step=2;renderCreatorWizard();">&larr; Back</button>
      <button class="creator-btn success" id="creatorGenerateBtn" onclick="creatorGenerate()">Generate Course</button>
    </div>`;
}

async function creatorReRefine() {
  const feedback = (document.getElementById('creatorFeedback').value || '').trim();
  if (!feedback) return;

  const btn = document.getElementById('creatorReRefineBtn');
  btn.disabled = true;
  btn.textContent = 'Refining...';

  // Collect follow-up answers if any
  const fqEls = document.querySelectorAll('.creator-followup-answer');
  const answers = [];
  fqEls.forEach(el => {
    if (el.value.trim()) {
      answers.push({ question_id: el.dataset.fqid, answer: el.value.trim() });
    }
  });

  try {
    const res = await fetch(`${API}/creator/refine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: creatorState.sessionId,
        answers: answers,
        feedback: feedback,
      }),
    });
    if (!res.ok) throw new Error(`Failed: ${res.status}`);
    const data = await res.json();

    creatorState.refinedOutline = data.outline || creatorState.refinedOutline;
    creatorState.followUpQuestions = data.follow_up_questions || null;
    renderCreatorWizard();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Refine Again';
    alert('Failed to refine. Please try again.');
  }
}

async function creatorGenerate() {
  const btn = document.getElementById('creatorGenerateBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const body = document.getElementById('creatorBody');
  // Render live progress UI — updated by the polling loop below.
  // Phase line starts with an explicit pre-gen status so the learner never
  // sees a blank "Starting up..." for 5-15s while the backend initializes.
  body.innerHTML = `
    <div class="creator-progress">
      <h3 style="margin:0 0 4px; font-size:1.15rem; font-weight:700;">Generating your course</h3>
      <p id="creatorProgressPhase" style="margin:0 0 18px; color:var(--text-muted); font-size:0.86rem;">Initializing session\u2026</p>

      <div style="background:var(--bg-tertiary); border-radius:8px; height:10px; overflow:hidden; border:1px solid var(--border);">
        <div id="creatorProgressBar" style="height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--teal)); transition:width 0.6s ease;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:0.82rem;">
        <span id="creatorProgressCount" style="color:var(--text-secondary); font-weight:600;">0 / 0 steps</span>
        <span id="creatorProgressPct" style="color:var(--text-muted);">0%</span>
      </div>

      <div id="creatorProgressModuleList" style="margin-top:22px; display:flex; flex-direction:column; gap:6px;"></div>

      <!-- Per-step feed (user directive 2026-04-20): show the creator real-time
           state for every individual step — pending / generating / complete / failed
           with duration + size info. Replaces the old single "Just built:" line. -->
      <div id="creatorProgressStepsFeed" style="margin-top:22px; max-height:320px; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:4px;"></div>

      <div id="creatorProgressLatest" style="margin-top:14px; padding:12px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; font-size:0.84rem; color:var(--text-secondary); min-height:42px;">
        <span style="color:var(--text-muted);">Warming up the LLM…</span>
      </div>
    </div>
  `;

  // Kick off the polling loop. Runs independently of the generate POST and
  // keeps updating until the POST resolves (success or failure).
  let stopPolling = false;
  const pollProgress = async () => {
    while (!stopPolling) {
      try {
        const r = await fetch(`${API}/creator/progress/${encodeURIComponent(creatorState.sessionId)}`);
        if (r.ok) {
          const p = await r.json();
          _renderCreatorProgress(p);
          if (p.phase === 'done' || p.phase === 'error') break;
        }
      } catch (_) { /* transient — keep polling */ }
      await new Promise(res => setTimeout(res, 1500));
    }
  };
  pollProgress();

  try {
    const creatorNotes = null;
    // 2026-04-22 v8: /creator/generate enqueues a celery task and returns
    // {session_id, task_id, status: "pending"} immediately. Poll /session/{sid}/status
    // until status=done, then pull course_id from the status payload's top level
    // (the status endpoint attaches the successful task's course_id there).
    const res = await fetch(`${API}/creator/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: creatorState.sessionId,
        outline: creatorState.refinedOutline,
        creator_notes: creatorNotes,
      }),
    });
    if (!res.ok) throw new Error(`Failed: ${res.status}`);
    // Enqueue confirmed — start polling for completion. The existing
    // _renderCreatorProgress timer handles per-module/per-step live updates
    // (reads /api/creator/progress/{sid}); this separate poll handles the
    // task-level done / failed signal.
    const courseId = await (async () => {
      const timeoutMs = 20 * 60 * 1000;  // 20 min hard wall
      const t0 = Date.now();
      let lastState = null;
      while (true) {
        if (Date.now() - t0 > timeoutMs) throw new Error('Generate task timed out');
        let r;
        try { r = await fetch(`${API}/creator/session/${encodeURIComponent(creatorState.sessionId)}/status`); }
        catch (_) { await new Promise(res => setTimeout(res, 3000)); continue; }
        if (r.status === 404) { await new Promise(res => setTimeout(res, 3000)); continue; }
        if (!r.ok) throw new Error(`status HTTP ${r.status}`);
        const s = await r.json();
        if (s.status !== lastState) lastState = s.status;
        if (s.status === 'done') return s.course_id;
        if (s.status === 'failed') throw new Error(s.error || 'generate task failed');
        await new Promise(res => setTimeout(res, 3000));
      }
    })();
    stopPolling = true;

    creatorState.generatedCourseId = courseId;
    creatorState.generatedCourse = null;
    creatorState.step = 4;
    _clearCreatorDraft();  // 2026-04-21: course persisted, drop the in-progress draft
    renderCreatorWizard();
    // Product feature 2026-04-20: kick off the auto-review banner poller.
    try { startReviewStatusPolling(courseId); } catch (_) {}
  } catch (e) {
    stopPolling = true;
    const errMsg = String(e && e.message || e);
    body.innerHTML = `<div class="creator-loading" style="color:var(--error)">
      <p>Failed to generate course: ${esc(errMsg)}</p>
      <button class="creator-btn primary" onclick="creatorState.step=3;renderCreatorWizard();">Go Back</button>
    </div>`;
  }
}

// Render the live progress payload returned by /api/creator/progress/{sid}.
function _renderCreatorProgress(p) {
  const phaseEl = document.getElementById('creatorProgressPhase');
  const barEl = document.getElementById('creatorProgressBar');
  const countEl = document.getElementById('creatorProgressCount');
  const pctEl = document.getElementById('creatorProgressPct');
  const modListEl = document.getElementById('creatorProgressModuleList');
  const latestEl = document.getElementById('creatorProgressLatest');
  if (!phaseEl) return;  // progress UI not mounted yet

  // Phase → human label. Early "waiting" state means generate hasn't registered progress yet.
  // Phase labels shown in the big status line. Enhanced 2026-04-20 to give
  // learners a concrete sense of what's happening instead of a generic
  // "Starting up..." silence.
  const done = p.completed_steps || 0;
  const total = p.total_steps || 0;
  const phaseMap = {
    waiting: 'Initializing session — this should kick off in a moment…',
    scenario: 'Inventing the shared scenario (company, feature, characters, metrics)…',
    steps: total > 0
      ? `Generating step content — module by module (${done}/${total} complete)`
      : 'Generating step content — module by module…',
    persist: 'Dark-theme sanitizing + saving every step to the database…',
    done: 'Done! Taking you to your course…',
    error: 'Something went wrong — see error below.',
  };
  phaseEl.textContent = phaseMap[p.phase] || p.phase || '';

  const pct = p.percent || 0;
  barEl.style.width = pct + '%';
  countEl.textContent = `${done} / ${total} steps`;
  pctEl.textContent = pct + '%';

  // Module breakdown: one line per module with tiny per-step dots
  const bd = p.module_breakdown || {};
  const mods = Object.keys(bd);
  modListEl.innerHTML = mods.map((mt, i) => {
    const m = bd[mt];
    const mDone = m.done || 0, mTot = m.total || 0;
    const complete = mDone >= mTot && mTot > 0;
    const active = !complete && mt === p.last_module_title;
    const icon = complete ? '&#10003;' : (active ? '&#9679;' : '&#9675;');
    const color = complete ? 'var(--success)' : (active ? 'var(--accent)' : 'var(--text-muted)');
    return `<div style="display:flex; align-items:center; gap:10px; font-size:0.85rem;">
      <span style="color:${color}; font-weight:700; width:14px; text-align:center;">${icon}</span>
      <span style="color:${complete ? 'var(--text-primary)' : 'var(--text-secondary)'}; flex:1; ${complete ? 'text-decoration:line-through; text-decoration-color:var(--text-muted);' : ''}">${esc(mt)}</span>
      <span style="color:var(--text-muted); font-size:0.78rem; font-variant-numeric:tabular-nums;">${mDone}/${mTot}</span>
    </div>`;
  }).join('');

  if (p.last_step_title) {
    const phrase = (p.phase === 'persist' || p.phase === 'done')
      ? 'Finalizing:' : 'Just built:';
    latestEl.innerHTML = `<strong style="color:var(--text-primary);">${phrase}</strong> <em>${esc(p.last_step_title)}</em> <span style="color:var(--text-muted); margin-left:8px;">(${esc(p.last_module_title || '')})</span>`;
  }

  // Per-step feed (user directive 2026-04-20): one line per step with live
  // status icon. Grouped by module with a lightweight header so the creator
  // sees exactly which step is being worked on right now.
  const feedEl = document.getElementById('creatorProgressStepsFeed');
  if (feedEl && Array.isArray(p.steps_feed) && p.steps_feed.length) {
    // Group by module_title preserving feed order
    const groups = [];
    const lastMod = { title: null };
    for (const s of p.steps_feed) {
      if (s.module_title !== lastMod.title) {
        groups.push({ title: s.module_title, steps: [] });
        lastMod.title = s.module_title;
      }
      groups[groups.length - 1].steps.push(s);
    }

    // Icon + color + label per status
    const statusMap = {
      pending:    { icon: '○', color: '#8892a8', label: 'pending' },
      generating: { icon: '◐', color: '#4a7cff', label: 'generating…' },
      complete:   { icon: '✓', color: '#34d399', label: 'done' },
      failed:     { icon: '⚠', color: '#fbbf24', label: 'fallback' },
    };

    const groupHtml = groups.map(g => {
      const stepRows = g.steps.map(s => {
        const st = statusMap[s.status] || statusMap.pending;
        // Duration (if started + completed)
        let durLabel = '';
        if (s.started_at && s.completed_at) {
          const dur = Math.max(0, (s.completed_at - s.started_at));
          durLabel = ` · ${dur < 1 ? Math.round(dur * 1000) + 'ms' : dur.toFixed(1) + 's'}`;
        } else if (s.started_at && s.status === 'generating') {
          const dur = Math.max(0, (Date.now() / 1000) - s.started_at);
          durLabel = ` · ${dur.toFixed(0)}s`;
        }
        const sizeLabel = s.content_chars ? ` · ${s.content_chars.toLocaleString()} chars` : '';
        const noteLabel = s.note ? ` <span style="color:#f87171;">(${esc(String(s.note).slice(0, 60))})</span>` : '';
        const fontWeight = s.status === 'generating' ? '600' : '400';
        const titleColor = s.status === 'complete' ? 'var(--text-secondary)'
                         : s.status === 'generating' ? 'var(--text-primary)'
                         : s.status === 'failed' ? '#fbbf24'
                         : 'var(--text-muted)';
        const pulse = s.status === 'generating' ? 'animation: creator-pulse 1.2s ease-in-out infinite;' : '';
        return `<div style="display:flex; align-items:center; gap:10px; font-size:0.8rem; padding:3px 0 3px 22px;">
          <span style="color:${st.color}; font-weight:700; width:14px; text-align:center; font-size:0.95rem; ${pulse}">${st.icon}</span>
          <span style="color:${titleColor}; font-weight:${fontWeight}; flex:1;">${esc(s.step_title)} <span style="color:var(--text-muted); font-size:0.72rem;">[${esc(s.exercise_type)}]</span></span>
          <span style="color:var(--text-muted); font-size:0.72rem; font-variant-numeric:tabular-nums;">${st.label}${durLabel}${sizeLabel}${noteLabel}</span>
        </div>`;
      }).join('');
      return `<div style="padding:4px 0;">
        <div style="font-size:0.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; padding:2px 0;">${esc(g.title)}</div>
        ${stepRows}
      </div>`;
    }).join('');

    feedEl.innerHTML = groupHtml;

    // Inject a one-time pulse keyframe for the generating icon
    if (!document.getElementById('_creatorPulseStyle')) {
      const st = document.createElement('style');
      st.id = '_creatorPulseStyle';
      st.textContent = '@keyframes creator-pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }';
      document.head.appendChild(st);
    }
  }
}

// ---------- Step 4: Done ----------
function renderCreatorStep4() {
  const title = creatorState.generatedCourse?.title || 'your course';
  return `
    <div class="creator-success">
      <span class="creator-success-icon">&#10024;</span>
      <h3>Course Created!</h3>
      <p>"${esc(title)}" has been generated and is ready for learners.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="creator-btn primary" onclick="creatorGoToCourse()">Open Course</button>
        <button class="creator-btn" onclick="closeCreatorWizard()">Close</button>
      </div>
    </div>`;
}

async function creatorGoToCourse() {
  closeCreatorWizard();
  // Reload catalog to include new course, then navigate to it
  try {
    state.courses = await fetchCourses();
  } catch (e) { /* ignore, use existing */ }
  const course = state.courses.find(c => c.id === creatorState.generatedCourseId);
  if (course) {
    onCourseClick(course.id);
  } else {
    showCatalog();
  }
}

// Show/hide creator FAB based on view
function updateCreatorFab() {
  const fab = document.getElementById('creatorFab');
  if (fab) {
    fab.style.display = (state.view === 'catalog') ? 'flex' : 'none';
  }
}

// ===================================================================
// Automated post-generation QC banner (product feature, 2026-04-20)
// ===================================================================
// When the Creator finishes generating a course, a headless-browser
// learner agent starts reviewing in the background (up to 3 iterations).
// This polls /api/courses/{id}/review_status and shows a floating banner
// so the creator sees progress + final verdict.
// ===================================================================

let _autoReviewPollTimer = null;
let _autoReviewCourseId = null;
let _autoReviewLastState = null;  // cached for instant re-render on navigation (no wait for 5s poll)

function _ensureAutoReviewBanner() {
  let b = document.getElementById('autoReviewBanner');
  if (b) return b;
  b = document.createElement('div');
  b.id = 'autoReviewBanner';
  b.style.cssText = `
    position: fixed;
    bottom: 20px;
    right: 20px;
    max-width: 360px;
    background: #1e2538;
    color: #e8ecf4;
    border: 1px solid #2a3352;
    border-left: 4px solid #4a7cff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 10000;
    font-size: 13px;
    line-height: 1.55;
    display: none;
  `;
  b.innerHTML = `
    <div style="display:flex; align-items:flex-start; gap:10px;">
      <div id="autoReviewIcon" style="font-size:20px; line-height:1;">🤖</div>
      <div style="flex:1; min-width:0;">
        <div id="autoReviewTitle" style="font-weight:600; color:#e8ecf4; margin-bottom:3px;">Automated learner is reviewing your course</div>
        <div id="autoReviewBody" style="color:#8892a8; font-size:12.5px;">We'll run a beginner through every step and polish any rough edges. We'll let you know when it's done.</div>
        <div id="autoReviewProgress" style="margin-top:8px; font-size:11.5px; color:#8892a8;"></div>
      </div>
      <button id="autoReviewDismiss" style="background:transparent; border:0; color:#8892a8; cursor:pointer; font-size:16px; line-height:1; padding:0 2px;" title="Dismiss">×</button>
    </div>
  `;
  document.body.appendChild(b);
  document.getElementById('autoReviewDismiss').onclick = () => {
    b.style.display = 'none';
    if (_autoReviewPollTimer) { clearInterval(_autoReviewPollTimer); _autoReviewPollTimer = null; }
  };
  return b;
}

function _renderAutoReviewState(reviewState) {
  const b = _ensureAutoReviewBanner();
  const icon = document.getElementById('autoReviewIcon');
  const title = document.getElementById('autoReviewTitle');
  const body = document.getElementById('autoReviewBody');
  const progress = document.getElementById('autoReviewProgress');
  if (!reviewState || reviewState.status === 'not_queued' || reviewState.status === 'unavailable') {
    b.style.display = 'none';
    return;
  }
  // Scope the banner to the course being reviewed (2026-04-21 user report:
  // "only show within that particular course"). If the creator navigated to
  // a DIFFERENT course (or back to catalog), hide — they shouldn't see a QC
  // banner for an unrelated course. Polling continues in the background so
  // when they come back the live state shows up again.
  // Argument renamed to `reviewState` so the module-level `state` (current
  // course / current module) stays visible through the closure.
  const viewingCourseId = (state && state.currentCourse && state.currentCourse.id) || null;
  if (_autoReviewCourseId && viewingCourseId !== _autoReviewCourseId) {
    b.style.display = 'none';
    return;
  }
  b.style.display = 'block';
  const s = reviewState.status || '';
  const iters = reviewState.iterations || [];
  const currIter = iters.length ? iters.length + (s.includes('complete') ? 0 : 1) : 1;
  const maxIters = reviewState.max_iterations || 3;

  if (s === 'complete') {
    const v = reviewState.final_verdict || {};
    if (v.summary === 'clean') {
      icon.textContent = '✅';
      b.style.borderLeftColor = '#34d399';
      title.textContent = 'Course QC complete — clean';
      body.textContent = `Beginner learner walked all steps in ${v.iterations_run} iteration${v.iterations_run===1?'':'s'} and found no major issues.`;
    } else if (v.summary === 'clean_with_minor_polish') {
      icon.textContent = '✅';
      b.style.borderLeftColor = '#34d399';
      title.textContent = 'Course QC complete — minor polish queued';
      body.textContent = `${v.minor_outstanding} minor issue${v.minor_outstanding===1?'':'s'} flagged for async polish. No blockers — course is shippable.`;
    } else if (v.summary === 'incomplete_after_max_iterations') {
      icon.textContent = '⚠️';
      b.style.borderLeftColor = '#fbbf24';
      title.textContent = 'Course QC reached iteration limit';
      body.textContent = `After ${v.iterations_run} iterations, ${v.major_outstanding} major issue${v.major_outstanding===1?'':'s'} remain. Review the course; you may want to regenerate manually.`;
    } else if (v.summary === 'regen_failed') {
      icon.textContent = '⚠️';
      b.style.borderLeftColor = '#f87171';
      title.textContent = 'Course regeneration failed, check server logs';
      body.textContent = `The automated fix-and-regenerate loop hit an error. Your course is fine as-is but the attempted polish didn't land. Review server logs for the underlying cause, or try regenerating the flagged steps manually via the 🔄 button.`;
    } else {
      icon.textContent = '⚠️';
      title.textContent = 'Course QC complete';
      body.textContent = `Verdict: ${v.summary || 'see findings'}.`;
    }
    progress.textContent = iters.length ? `${iters.length} iteration${iters.length===1?'':'s'} run` : '';
    if (_autoReviewPollTimer) { clearInterval(_autoReviewPollTimer); _autoReviewPollTimer = null; }
  } else if (s === 'error') {
    icon.textContent = '⚠️';
    b.style.borderLeftColor = '#f87171';
    title.textContent = 'Course QC encountered an error';
    body.textContent = reviewState.error || 'Automated review could not complete. Your course is unaffected.';
    if (_autoReviewPollTimer) { clearInterval(_autoReviewPollTimer); _autoReviewPollTimer = null; }
  } else {
    icon.textContent = '🤖';
    title.textContent = 'Automated learner is reviewing your course';
    const phaseLabel = s.includes('walking') ? 'walking through the course' :
                       s.includes('regenerating') ? 'applying fixes and regenerating' :
                       'starting up';
    body.textContent = `A beginner-mode agent is ${phaseLabel}. We'll let you know when it's done — you can keep working.`;
    progress.textContent = `Iteration ${Math.min(currIter, maxIters)} of ${maxIters}`;
  }
}

function startReviewStatusPolling(courseId) {
  if (!courseId) return;
  _autoReviewCourseId = courseId;
  if (_autoReviewPollTimer) { clearInterval(_autoReviewPollTimer); _autoReviewPollTimer = null; }
  const poll = async () => {
    try {
      const r = await fetch(`${API}/courses/${courseId}/review_status`);
      if (!r.ok) return;
      const st = await r.json();
      _autoReviewLastState = st;
      _renderAutoReviewState(st);
      if (st.status === 'complete' || st.status === 'error' || st.status === 'not_queued' || st.status === 'unavailable') {
        if (_autoReviewPollTimer) { clearInterval(_autoReviewPollTimer); _autoReviewPollTimer = null; }
      }
    } catch (_e) { /* silent — best-effort poll */ }
  };
  poll();
  _autoReviewPollTimer = setInterval(poll, 5000);
}

// Called on navigation (enterCourse / goToCatalog) to re-evaluate whether
// the banner should be visible for the course being viewed. Uses the cached
// last poll result so we don't wait up to 5s for the next poll tick.
function refreshAutoReviewBannerVisibility() {
  if (!_autoReviewLastState) {
    const b = document.getElementById('autoReviewBanner');
    if (b) b.style.display = 'none';
    return;
  }
  _renderAutoReviewState(_autoReviewLastState);
}

// ===================================================================
// Per-step Regenerate + Edit modals (product feature, 2026-04-20)
// ===================================================================
// Creators can regenerate any step with AI (feedback optional, prior course
// context preserved) or edit fields directly (no AI). Wired to:
//   POST  /api/courses/{id}/steps/{sid}/regenerate
//   PATCH /api/courses/{id}/steps/{sid}
// ===================================================================

function _stepToolsModalShell(title, inner) {
  const overlay = document.createElement('div');
  overlay.id = 'stepToolsOverlay';
  overlay.style.cssText = `
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 10050;
  `;
  overlay.innerHTML = `
    <div style="background:#1c2333; color:#e8ecf4; border:1px solid #2a3352; border-radius:12px; padding:22px 26px; width:min(560px, 92vw); max-height:82vh; overflow:auto; box-shadow:0 16px 56px rgba(0,0,0,0.5);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;">
        <h3 style="margin:0; color:#e8ecf4; font-size:17px;">${esc(title)}</h3>
        <button onclick="document.getElementById('stepToolsOverlay').remove()" style="background:transparent; border:0; color:#8892a8; cursor:pointer; font-size:20px; line-height:1;">×</button>
      </div>
      ${inner}
    </div>
  `;
  document.body.appendChild(overlay);
  return overlay;
}

function openRegenerateStepModal(stepId, stepTitle) {
  const inner = `
    <p style="color:#8892a8; font-size:13px; margin:0 0 12px 0;">
      Regenerating <strong style="color:#e8ecf4;">${esc(stepTitle)}</strong>.
      The AI sees a summary of every prior step (personas, brands, code identifiers)
      so the regenerated step stays consistent with the rest of the course.
      Cost: ~$0.03. Leaves all other steps untouched.
    </p>
    <label style="display:block; color:#c9d1df; font-size:13px; margin-bottom:6px;">Feedback (optional)</label>
    <textarea id="regenStepFeedback" placeholder="e.g. 'The briefing is too short — expand with a numbered list of bug categories to hunt for' or 'Add a worked example before the blanks'"
      style="width:100%; min-height:110px; background:#161b26; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:10px 12px; font-family:inherit; font-size:13px; resize:vertical;"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
      <button onclick="document.getElementById('stepToolsOverlay').remove()"
        style="background:transparent; color:#8892a8; border:1px solid #2a3352; border-radius:6px; padding:8px 16px; cursor:pointer;">Cancel</button>
      <button id="regenStepGoBtn" onclick="doRegenerateStep(${stepId})"
        style="background:#4a7cff; color:white; border:0; border-radius:6px; padding:8px 16px; cursor:pointer;">Regenerate step</button>
    </div>
    <div id="regenStepStatus" style="margin-top:14px; font-size:12.5px; color:#8892a8;"></div>
  `;
  _stepToolsModalShell('Regenerate this step', inner);
}

async function doRegenerateStep(stepId) {
  const feedback = document.getElementById('regenStepFeedback').value.trim();
  const btn = document.getElementById('regenStepGoBtn');
  const status = document.getElementById('regenStepStatus');
  btn.disabled = true;
  btn.textContent = 'Regenerating…';
  status.innerHTML = '<span style="color:#8892a8;">AI is rewriting this step with prior-course context. 15-30s typical.</span>';
  try {
    const r = await fetch(`${API}/courses/${state.currentCourse.id}/steps/${stepId}/regenerate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback: feedback || null }),
    });
    if (!r.ok) {
      const err = await r.text();
      throw new Error(`HTTP ${r.status}: ${err}`);
    }
    const d = await r.json();
    status.innerHTML = `<span style="color:#34d399;">✓ Regenerated (prior context: ${d.prior_context_chars} chars). Reloading…</span>`;
    // Reload the current module so the step re-renders with new content
    setTimeout(async () => {
      document.getElementById('stepToolsOverlay')?.remove();
      if (state.currentModule) {
        await loadModule(state.currentModule, state.currentStepIndex);
      }
    }, 700);
  } catch (e) {
    // User-directed copy 2026-04-20: concrete, actionable, points to where to check
    status.innerHTML = `<span style="color:#f87171;">Course regeneration failed, check server logs.</span><div style="color:#8892a8; font-size:11.5px; margin-top:4px;">${esc(String(e.message || e))}</div>`;
    btn.disabled = false;
    btn.textContent = 'Regenerate step';
  }
}

async function openEditStepModal(stepId) {
  // Fetch current step fields from the loaded module data
  const steps = getSteps();
  const step = steps.find(s => s.id === stepId);
  if (!step) { alert('Step not found in current view'); return; }
  const editable = {
    content: step.content || '',
    code: step.code || '',
    expected_output: step.expected_output || '',
  };
  const inner = `
    <p style="color:#8892a8; font-size:13px; margin:0 0 14px 0;">
      Direct edit — no AI call. Applies immediately. Title and exercise type are locked
      (regenerate the module if you need to change shape).
    </p>
    <label style="display:block; color:#c9d1df; font-size:12px; margin-bottom:4px;">content (HTML)</label>
    <textarea id="editStepContent" style="width:100%; height:120px; background:#161b26; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:8px; font-family:monospace; font-size:12px; margin-bottom:10px;">${esc(editable.content)}</textarea>
    <label style="display:block; color:#c9d1df; font-size:12px; margin-bottom:4px;">code</label>
    <textarea id="editStepCode" style="width:100%; height:90px; background:#161b26; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:8px; font-family:monospace; font-size:12px; margin-bottom:10px;">${esc(editable.code)}</textarea>
    <label style="display:block; color:#c9d1df; font-size:12px; margin-bottom:4px;">expected_output</label>
    <textarea id="editStepExpected" style="width:100%; height:60px; background:#161b26; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:8px; font-family:monospace; font-size:12px;">${esc(editable.expected_output)}</textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px;">
      <button onclick="document.getElementById('stepToolsOverlay').remove()"
        style="background:transparent; color:#8892a8; border:1px solid #2a3352; border-radius:6px; padding:8px 16px; cursor:pointer;">Cancel</button>
      <button id="editStepGoBtn" onclick="doPatchStep(${stepId})"
        style="background:#4a7cff; color:white; border:0; border-radius:6px; padding:8px 16px; cursor:pointer;">Save changes</button>
    </div>
    <div id="editStepStatus" style="margin-top:14px; font-size:12.5px; color:#8892a8;"></div>
  `;
  _stepToolsModalShell('Edit this step', inner);
}

async function doPatchStep(stepId) {
  const btn = document.getElementById('editStepGoBtn');
  const status = document.getElementById('editStepStatus');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  const payload = {
    content: document.getElementById('editStepContent').value,
    code: document.getElementById('editStepCode').value,
    expected_output: document.getElementById('editStepExpected').value,
  };
  try {
    const r = await fetch(`${API}/courses/${state.currentCourse.id}/steps/${stepId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      const err = await r.text();
      throw new Error(`HTTP ${r.status}: ${err}`);
    }
    status.innerHTML = `<span style="color:#34d399;">✓ Saved. Reloading…</span>`;
    setTimeout(async () => {
      document.getElementById('stepToolsOverlay')?.remove();
      if (state.currentModule) {
        await loadModule(state.currentModule, state.currentStepIndex);
      }
    }, 500);
  } catch (e) {
    status.innerHTML = `<span style="color:#f87171;">Failed: ${esc(String(e.message || e))}</span>`;
    btn.disabled = false;
    btn.textContent = 'Save changes';
  }
}

// ===================================================================
// Initialize
// ===================================================================
init();
</script>
