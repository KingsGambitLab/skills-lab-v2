// Split out so filter changes can re-render WITHOUT re-running view state setup.
function _renderCatalogBody() {
  const f = state.catalogFilter;
  const allCourses = _dedupCourses(state.courses);
  const visible = _filterCourses(allCourses);

  // Pin featured at top (within visible), then discipline/time-sorted rest
  const featured = visible.filter(c => FEATURED_COURSE_IDS.has(c.id));
  const rest = visible.filter(c => !FEATURED_COURSE_IDS.has(c.id));

  // Count disciplines present in the FULL catalog (not filtered) so chip row is stable
  const disciplineCounts = {};
  allCourses.forEach(c => {
    const a = _inferArchetype(c);
    disciplineCounts[a] = (disciplineCounts[a] || 0) + 1;
  });
  const archMeta = _archMeta();
  // Chip order: disciplines with >= 3 courses first, sorted by count desc; drop "generalist"
  const disciplineKeys = Object.keys(disciplineCounts)
    .filter(k => k !== 'generalist' && disciplineCounts[k] >= 3)
    .sort((a, b) => disciplineCounts[b] - disciplineCounts[a]);

  let chipsHtml = `<button class="catalog-filter-chip ${!f.discipline ? 'active' : ''}" onclick="setCatalogDiscipline(null)">All · ${allCourses.length}</button>`;
  chipsHtml += disciplineKeys.map(k => {
    const m = archMeta[k] || { label: k, color: '#6b7280' };
    const active = f.discipline === k ? 'active' : '';
    return `<button class="catalog-filter-chip ${active}" onclick="setCatalogDiscipline('${k}')"
              style="${active ? '' : `border-left: 3px solid ${m.color};`}">${esc(m.label)} · ${disciplineCounts[k]}</button>`;
  }).join('');

  // Level chips (inline row beside discipline)
  const levelCounts = { beginner: 0, intermediate: 0, advanced: 0 };
  allCourses.forEach(c => { const k = _levelKey(c.level); if (levelCounts[k] != null) levelCounts[k]++; });
  const levelChips = ['beginner', 'intermediate', 'advanced'].map(l => {
    const active = f.level === l ? 'active' : '';
    const label = l[0].toUpperCase() + l.slice(1);
    return `<button class="catalog-filter-chip ${active}" onclick="setCatalogLevel('${l}')">${label} · ${levelCounts[l]}</button>`;
  }).join('');

  const resultsLabel = (f.search || f.discipline || f.level || f.courseType)
    ? `<strong>${visible.length}</strong> of ${allCourses.length} courses`
    : `<strong>${allCourses.length}</strong> courses`;

  let html = `
    <div class="catalog">
      <div class="catalog-hero">
        <div>
          <div class="catalog-title">Skills Library</div>
          <div class="catalog-title-sub">Drop into a real workday. Ship real work. Get real feedback.</div>
        </div>
        <div class="catalog-stats">${resultsLabel}</div>
      </div>

      <div class="catalog-controls">
        <input class="catalog-search" type="search" placeholder="Search courses, skills, or scenarios…"
               value="${esc(f.search || '')}" oninput="setCatalogSearch(this.value)" />
        ${chipsHtml}
        <span style="width:1px; height:20px; background:var(--border); margin: 0 4px;"></span>
        ${levelChips}
        ${(f.search || f.discipline || f.level || f.courseType) ? `<button class="catalog-filter-chip" onclick="clearCatalogFilters()" style="color:#f87171;">Clear</button>` : ''}
      </div>`;

  if (featured.length) {
    html += `
      <div class="catalog-section">
        <div class="catalog-section-title">★ Featured — AI Power Skills by Role</div>
        <div class="course-grid">
          ${featured.map(c => renderCourseCard(c, { featured: true })).join('')}
        </div>
      </div>`;
  }

  if (rest.length) {
    html += `
      <div class="catalog-section">
        <div class="catalog-section-title">${featured.length ? 'All courses' : '●'} ${featured.length ? '' : 'Library'}</div>
        <div class="course-grid">
          ${rest.map(c => renderCourseCard(c)).join('')}
        </div>
      </div>`;
  }

  if (!featured.length && !rest.length) {
    html += `<div class="catalog-empty">No courses match these filters. <a href="#" onclick="clearCatalogFilters(); return false;" style="color:var(--accent);">Clear filters</a> to see everything.</div>`;
  }

  html += '</div>';
  document.getElementById('contentScroll').innerHTML = html;
}

// Filter setters — apply to state and re-render body only
function setCatalogSearch(v) {
  state.catalogFilter.search = v;
  _renderCatalogBody();
  // Preserve focus + cursor in the search box (rerender blows it away)
  const input = document.querySelector('.catalog-search');
  if (input) {
    input.focus();
    const len = input.value.length;
    try { input.setSelectionRange(len, len); } catch (e) {}
  }
}
function setCatalogDiscipline(k) {
  state.catalogFilter.discipline = (state.catalogFilter.discipline === k) ? null : k;
  _renderCatalogBody();
}
function setCatalogLevel(l) {
  state.catalogFilter.level = (state.catalogFilter.level === l) ? null : l;
  _renderCatalogBody();
}
function clearCatalogFilters() {
  state.catalogFilter = { search: '', discipline: null, level: null, courseType: null };
  _renderCatalogBody();
}

// Heuristic: does this subtitle look like a capstone-pitch (action verb first,
// under ~280 chars, concrete verb)? Creator started producing these 2026-04-19
// after user request to "position every course as the path to the final capstone."
// Older courses may have generic truncated-description subtitles — show those
// in the dimmer .course-card-desc style. New pitches get the prominent
// .course-card-pitch style with an arrow glyph.
const _PITCH_VERBS = /^(automate|ship|build|deploy|close|diagnose|defend|negotiate|triage|win|launch|master|audit|rescue|debug|scale|fix|secure|design|draft|prototype|present|pitch|redline|review|test|onboard|coach|handle|run|untangle|synthesize|align|convert|refactor|migrate|document|grade|interview|triangulate|prioritize|forecast|unblock|escalate|decide)/i;
function _looksLikePitch(text) {
  if (!text) return false;
  const t = text.trim();
  if (t.length < 20 || t.length > 320) return false;
  // Starts with an action verb?
  return _PITCH_VERBS.test(t);
}

function renderCourseCard(course, opts = {}) {
  const icon = course.icon || '&#128214;';
  const level = _levelKey(course.level);
  const time = course.estimated_time || '';
  const archKey = _inferArchetype(course);
  const archMeta = _archMeta();
  const arch = archMeta[archKey] || { label: archKey === 'generalist' ? '' : archKey, color: '#6b7280' };
  const subtitleText = course.subtitle || '';
  const fallbackDesc = course.description || '';
  const isFeatured = opts.featured;

  const archChip = arch.label
    ? `<span class="course-card-arch-chip" style="background: ${arch.color}22; color: ${arch.color};">${esc(arch.label)}</span>`
    : '';

  // Prefer pitch rendering when the subtitle reads like a capstone pitch.
  // Otherwise render subtitle in the dimmer description style (old courses).
  let bodyHtml = '';
  if (_looksLikePitch(subtitleText)) {
    bodyHtml = `<div class="course-card-pitch">${esc(subtitleText)}</div>`;
  } else {
    const desc = subtitleText || fallbackDesc;
    bodyHtml = desc ? `<div class="course-card-desc">${esc(desc)}</div>` : '';
  }

  // 2026-04-25 — enrollment button surfaced on every catalog card.
  // States:
  //   - signed out: button label "Enroll" → opens auth modal
  //   - signed in + already enrolled: chip showing progress %, click goes straight to next step
  //   - signed in + not enrolled: button label "Enroll" → confirm + POST + go to course
  // The whole card stays clickable for "preview" — the button stops propagation.
  const enrolledRow = (window._auth && Array.isArray(window._auth.enrollments))
    ? window._auth.enrollments.find(en => en.course_id === course.id)
    : null;
  let enrollBtn;
  if (enrolledRow) {
    const pct = Math.max(0, Math.min(100, Number(enrolledRow.progress_percent || 0)));
    const label = enrolledRow.completed_at ? 'Completed ✓' : `Continue · ${pct}%`;
    enrollBtn = `<button class="course-enroll-btn enrolled" onclick="event.stopPropagation(); onCourseClick('${esc(course.id)}')">${label}</button>`;
  } else {
    enrollBtn = `<button class="course-enroll-btn" onclick="event.stopPropagation(); onEnrollClick('${esc(course.id)}', '${esc((course.title || '').replace(/'/g, '&apos;'))}')">Enroll</button>`;
  }

  return `
    <div class="course-card${isFeatured ? ' featured' : ''}" style="border-left-color: ${arch.color};" onclick="onCourseClick('${course.id}')">
      ${isFeatured ? '<span class="catalog-featured-ribbon">Headline</span>' : ''}
      <div class="course-card-row">
        <span class="course-card-icon">${icon}</span>
        ${archChip}
      </div>
      <div class="course-card-title">${esc(course.title)}</div>
      ${bodyHtml}
      <div class="course-card-footer">
        ${level ? `<span class="level-badge ${level}">${level}</span>` : '<span></span>'}
        ${time ? `<span class="course-time">${esc(time)}</span>` : '<span></span>'}
      </div>
      <div class="course-card-enroll-row">${enrollBtn}</div>
    </div>`;
}

// 2026-04-25 — single-click enroll confirmation modal.
// User flow: click Enroll → modal "Enroll in <title>?" → click Confirm →
// POST /api/auth/enroll/{course_id} → on success, hydrate, advance to course.
// One click, one confirmation. Cancel returns to the catalog with no change.
async function onEnrollClick(courseId, courseTitle) {
  if (!window._auth || !window._auth.user) {
    if (typeof showAuthModal === 'function') showAuthModal('login');
    return;
  }
  // Build the modal once + reuse on subsequent enrolls
  let modal = document.getElementById('enrollModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'enrollModal';
    modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; z-index:9000; backdrop-filter: blur(4px);';
    modal.innerHTML = `
      <div style="background:#1a1f2e; border:1px solid #2a3352; border-radius:12px; padding:24px 28px; max-width:480px; box-shadow:0 8px 32px rgba(0,0,0,0.6);">
        <div style="color:#e8ecf4; font-size:1.15rem; font-weight:600; margin-bottom:8px;">Enroll in this course?</div>
        <div id="enrollModalTitle" style="color:#c9d1df; font-size:0.95rem; margin-bottom:14px; line-height:1.5;"></div>
        <div style="color:#8892a8; font-size:0.85rem; margin-bottom:18px; line-height:1.5;">You'll see this in <strong style="color:#c9d1df;">My Courses</strong>, your progress will be tracked, and the creator will see you in their roster.</div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button id="enrollModalCancel" style="background:transparent; color:#8892a8; border:1px solid #2a3352; border-radius:6px; padding:8px 16px; cursor:pointer; font-weight:500;">Cancel</button>
          <button id="enrollModalConfirm" style="background:#4a7cff; color:#fff; border:0; border-radius:6px; padding:8px 18px; cursor:pointer; font-weight:600;">Confirm Enroll</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    modal.querySelector('#enrollModalCancel').addEventListener('click', () => { modal.style.display = 'none'; });
  }
  modal.querySelector('#enrollModalTitle').textContent = courseTitle;
  modal.style.display = 'flex';
  // Re-bind confirm with the current course id (cleanup prior bindings)
  const confirmBtn = modal.querySelector('#enrollModalConfirm');
  const newConfirm = confirmBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
  newConfirm.addEventListener('click', async () => {
    newConfirm.disabled = true;
    newConfirm.textContent = 'Enrolling…';
    try {
      const r = await fetch(`${API}/auth/enroll/${encodeURIComponent(courseId)}`, {
        method: 'POST', credentials: 'same-origin',
      });
      if (!r.ok) {
        const body = await r.json().catch(() => ({detail: 'enroll failed'}));
        alert('Enroll failed: ' + (body.detail || r.status));
        newConfirm.disabled = false;
        newConfirm.textContent = 'Confirm Enroll';
        return;
      }
      await hydrateAuth();
      modal.style.display = 'none';
      newConfirm.disabled = false;
      newConfirm.textContent = 'Confirm Enroll';
      // Refresh catalog so the card flips from "Enroll" to "Continue · 0%"
      try { showCatalog(); } catch (_) {}
      // And open the course immediately so the learner gets started
      try { onCourseClick(courseId); } catch (_) {}
    } catch (e) {
      alert('Enroll error: ' + e.message);
      newConfirm.disabled = false;
      newConfirm.textContent = 'Confirm Enroll';
    }
  });
}

function onCourseClick(courseId) {
  // Tear down prior course state so sidebar/modules don't bleed across courses
  // (fixes: clicking a different course while already in one showed stale sidebar)
  if (state.currentCourse && state.currentCourse.id !== courseId) {
    state.currentCourse = null;
    state.currentModule = null;
    state.currentStepIndex = 0;
    state.modules = [];
    state.currentModuleData = null;
    // Clear sidebar module list immediately
    const moduleListEl = document.getElementById('moduleList');
    if (moduleListEl) moduleListEl.innerHTML = '';
    const sidebarCourseInfoEl = document.getElementById('sidebarCourseInfo');
    if (sidebarCourseInfoEl) sidebarCourseInfoEl.style.display = 'none';
  }
  const course = state.courses.find(c => c.id === courseId);
  if (course) enterCourse(course);
}

// ===================================================================
// View: Course
// ===================================================================
async function enterCourse(course, moduleId, stepIndex) {
  // Guard against async race: record WHICH course we're entering so that
  // if the user clicks another course mid-fetch, we abort the stale path.
  const requestedCourseId = course.id;
  _currentEnterCourseRequestId = requestedCourseId;

  // Fetch full course detail with modules if not already loaded
  if (!course.modules) {
    try {
      const res = await fetch(`${API}/courses/${course.id}`);
      if (!res.ok) throw new Error('Failed to load course');
      course = await res.json();
    } catch (e) {
      if (_currentEnterCourseRequestId !== requestedCourseId) return;
      showError('Failed to load course details.');
      return;
    }
  }

  // If user navigated to a different course while we were fetching, abort.
  if (_currentEnterCourseRequestId !== requestedCourseId) {
    return;
  }

  // Complexity is set by the COURSE, not the learner.
  // (Removed 2026-04-19: the learner-side expertise picker was cosmetic — content was
  // identical across levels. Complexity is now Creator-chosen at course creation time
  // and reflected in course.level, shown as a read-only badge.)
  state.expertiseLevel = course.level || null;
  state.view = 'course';
  state.currentCourse = course;
  state.modules = course.modules || [];
  // Leaving catalog: restore the sidebar-bearing layout
  document.body.classList.remove('catalog-mode');
  updateCreatorFab();

  // Check whether an automated QC review is in progress for this course —
  // if so, mount the banner so the creator can follow progress when they
  // navigate away from the wizard. No-op if review already completed /
  // never queued (the banner hides itself).
  try { startReviewStatusPolling(course.id); } catch (_) {}

  // Default to first module
  const targetModule = moduleId || (state.modules[0] && state.modules[0].id);
  if (!targetModule) {
    showError('This course has no modules.');
    return;
  }

  // Show sidebar elements
  document.getElementById('sidebarCourseInfo').style.display = 'block';
  document.getElementById('sidebarCourseTitle').textContent = course.title;
  document.getElementById('sidebarCourseSubtitle').textContent = course.subtitle || '';
  document.getElementById('sidebarFooter').style.display = 'block';
  renderExpertiseBadge();

  // Show Clicky FAB
  document.getElementById('clickyFab').classList.remove('hidden');

  renderModuleList();
  await loadModule(targetModule, stepIndex || 0);
}

function renderModuleList() {
  if (!state.modules.length) return;
  const list = document.getElementById('moduleList');
  list.innerHTML = state.modules.map((m, i) => {
    const isActive = m.id === state.currentModule;
    const moduleStepCount = m.step_count || m.steps_count || 0;
    const done = getModuleCompletion(state.currentCourse.id, m.id, moduleStepCount);
    const complete = moduleStepCount > 0 && done === moduleStepCount;
    const classes = ['module-item'];
    if (isActive) classes.push('active');
    if (complete) classes.push('completed');
    return `
      <div class="${classes.join(' ')}" onclick="onModuleClick('${m.id}')">
        <div class="module-number">${complete ? '&#10003;' : i + 1}</div>
        <div class="module-info">
          <div class="module-title">${esc(m.title)}</div>
          <div class="module-meta">${m.estimated_time || ''} ${moduleStepCount ? `&middot; ${done}/${moduleStepCount} steps` : ''}</div>
        </div>
        <div class="module-check">&#10003;</div>
      </div>`;
  }).join('');
}

function onModuleClick(moduleId) {
  if (moduleId !== state.currentModule) {
    loadModule(moduleId, 0);
  }
}

async function loadModule(moduleId, stepIndex) {
  // Guard against stale async responses: capture the course+module we're loading,
  // and bail if state has moved on by the time fetch returns.
  const courseSnap = state.currentCourse?.id;
  const moduleSnap = moduleId;
  state.currentModule = moduleId;
  state.currentStepIndex = stepIndex || 0;
  showLoading();
  renderModuleList();

  try {
    const data = await fetchModule(state.currentCourse.id, moduleId);
    // Abort if user navigated elsewhere during the fetch
    if (state.currentCourse?.id !== courseSnap || state.currentModule !== moduleSnap) {
      return;
    }
    state.currentModuleData = data;
    renderCurrentStep();
    updateHash();
  } catch (e) {
    if (state.currentCourse?.id !== courseSnap) return;
    showError('Failed to load module.', () => loadModule(moduleId, stepIndex));
  }
}

// ===================================================================
// Step Navigation
// ===================================================================
function getSteps() {
  return state.currentModuleData?.steps || [];
}

function renderStepDots() {
  const steps = getSteps();
  if (!steps.length) {
    document.getElementById('stepDotsContainer').innerHTML = '';
    return;
  }
  const dots = steps.map((s, i) => {
    const completed = isStepComplete(state.currentCourse.id, state.currentModule, i);
    const current = i === state.currentStepIndex;
    let cls = 'step-dot';
    if (completed) cls += ' completed';
    else if (current) cls += ' current';
    else cls += ' future';
    return `<button class="${cls}" onclick="goToStep(${i})" title="Step ${i + 1}: ${esc(s.title || '')}"></button>`;
  }).join('');

  const label = steps[state.currentStepIndex]?.title || `Step ${state.currentStepIndex + 1}`;
  document.getElementById('stepDotsContainer').innerHTML = `
    <div class="step-dots">${dots}<span class="step-dot-label">${esc(label)}</span></div>`;
}

function renderStepNav() {
  const steps = getSteps();
  const isFirst = state.currentStepIndex === 0;
  const isLast = state.currentStepIndex === steps.length - 1;
  // state.modules is an ARRAY of module objects, not a dict. Find the current module
  // by its DB id, NOT by Object.keys (which returns array indices like "0","1","2").
  const mods = Array.isArray(state.modules) ? state.modules : [];
  const currentModIdx = mods.findIndex(m => String(m.id) === String(state.currentModule));
  const hasNextModule = currentModIdx >= 0 && currentModIdx < mods.length - 1;
  const isVeryLast = isLast && !hasNextModule;
  const nextLabel = isLast && hasNextModule ? 'Next Module &#8594;' : 'Next &#8594;';
  document.getElementById('stepNavContainer').innerHTML = `
    <div class="step-nav">
      <button class="step-nav-btn" onclick="prevStep()" ${isFirst ? 'disabled' : ''}>&#8592; Previous</button>
      <button class="step-nav-btn primary" onclick="nextStep()" ${isVeryLast ? 'disabled' : ''}>${nextLabel}</button>
    </div>`;
}

function goToStep(i) {
  const steps = getSteps();
  if (i >= 0 && i < steps.length) {
    state.currentStepIndex = i;
    renderCurrentStep();
    updateHash();
  }
}

function prevStep() {
  if (state.currentStepIndex > 0) goToStep(state.currentStepIndex - 1);
}

function nextStep() {
  const steps = getSteps();
  if (state.currentStepIndex < steps.length - 1) {
    goToStep(state.currentStepIndex + 1);
  } else {
    // Last step in module — advance to next module.
    // state.modules is an ARRAY, not a dict. Find by .id.
    const mods = Array.isArray(state.modules) ? state.modules : [];
    const currentIdx = mods.findIndex(m => String(m.id) === String(state.currentModule));
    if (currentIdx >= 0 && currentIdx < mods.length - 1) {
      const nextModId = mods[currentIdx + 1].id;
      loadModule(nextModId, 0);
    }
  }
}

function renderCurrentStep() {
  const steps = getSteps();
  if (!steps.length) {
    document.getElementById('contentScroll').innerHTML = '<div class="loading-state">No steps in this module.</div>';
    return;
  }
  const step = steps[state.currentStepIndex];
  renderStepDots();
  renderStepNav();
  renderStep(step, state.currentStepIndex);
  // Reset BOTH the inner content scroll AND the window scroll (user directive
  // 2026-04-20: after clicking Next, learner was landing mid-page because the
  // outer window scroll wasn't reset). Use instant, not smooth, so learner
  // always lands on the new step title.
  const contentScroll = document.getElementById('contentScroll');
  if (contentScroll) contentScroll.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ===================================================================
// Step Renderer (dispatcher)
// ===================================================================
// P0-1 (2026-04-22): template HTML cache + data-contract helpers. Preloads
// the 3 template HTMLs on page init so mount() can be synchronous.
window._sllTemplateHtmlCache = window._sllTemplateHtmlCache || {};
(function _preloadTemplates() {
  const names = ['drag_drop', 'code', 'project', 'terminal'];
  // 2026-04-22: cache-buster version must match the `?v=` on the CSS/JS
  // links above so a single version bump invalidates every template asset
  // atomically. If you change *.html / *.css / *.js, bump BOTH locations.
  // v1.1.2 (2026-04-24) — added terminal.css + terminal.js to the head so
  // SllTemplateTerminal registers on boot. Prior version shipped terminal.html
  // in the HTML cache but never loaded the JS → dispatch fell through to the
  // narrative fallback (agent blocker P0.4 2026-04-24).
  const TPL_VERSION = '1.1.7';
  names.forEach(n => {
    fetch(`/templates/${n}.html?v=${TPL_VERSION}`, {cache: 'force-cache'})
      .then(r => r.ok ? r.text() : Promise.reject(`HTTP ${r.status}`))
      .then(html => { window._sllTemplateHtmlCache[n] = html; })
      .catch(e => console.warn(`[tpl] failed to preload ${n}.html:`, e));
  });
})();

// 2026-04-22 — Title/content mismatch softeners. Beginner-agent walkthrough
// caught titles like "Is This a Binary-Search-the-Answer Problem?" on a
// code_exercise (learner expected categorization UI) and "Write-Pointer
// Off-By-One" on a code_review whose code had no detectable off-by-one.
// Per user 2026-04-22: "for content issues, use template/backend
// safeguards, avoid Creator prompt churn." These helpers soften the
// mismatch at render time without regenerating the course.
const _TITLE_QUIZ_PATTERNS = [
  /^is this (?:a|an) .+\?$/i,
  /^does .+ apply(?: here)?\?$/i,
  /^would .+ work here\?$/i,
  /^which .+ fits\?$/i,
];
function _softenBriefingForMismatch(step, type) {
  const title = (step.title || '').trim();
  const briefing = step.content || '';
  // Case 1: quiz-sounding title on a code_exercise — add "Implement" banner
  if (type === 'code_exercise' && _TITLE_QUIZ_PATTERNS.some(r => r.test(title))) {
    const banner = `<div style="margin:0 0 12px 0; padding:10px 14px; background:#1a2440; border-left:3px solid #4a7cff; border-radius:6px; color:#cdd8ff; font-size:0.9rem;">
      <strong>Exercise:</strong> This is an <em>Implement</em> step — read the briefing below, then write code in the editor to answer the question in the title.
    </div>`;
    return banner + briefing;
  }
  // Case 2: code_review — titles sometimes name a bug theme that doesn't
  // match the actual planted bugs. Prepend a generic clarifier so the
  // learner trusts the CODE over the TITLE.
  if (type === 'code_review') {
    const banner = `<div style="margin:0 0 12px 0; padding:10px 14px; background:#2a1f1a; border-left:3px solid #fbbf24; border-radius:6px; color:#fde9c9; font-size:0.88rem;">
      <strong>How to solve:</strong> Read the code below line-by-line. Click any line you believe contains a bug. The title hints at bug <em>categories</em> but the actual planted bugs may differ — trust what you read, not what the title suggests.
    </div>`;
    return banner + briefing;
  }
  return briefing;
}

// Transform a step record into the data contract each template expects.
function stepToTemplateData(step, type) {
  const dd = step.demo_data || {};
  const v = step.validation || {};
  const softenedBriefing = _softenBriefingForMismatch(step, type);
  const data = {
    exercise_type: type,
    title: step.title || '',
    briefing: softenedBriefing,
    problem_statement: softenedBriefing,
  };
  if (['code_exercise', 'code', 'code_read'].includes(type)) {
    data.language = dd.language || v.language || step.language || 'python';
    data.starter_code = step.code || dd.code || '';
    data.hint = v.hint || '';
    data.starter_files = dd.starter_files;
    data.starter_repo = dd.starter_repo;
    data.repo_path_var = dd.repo_path_var;
    data.schema_setup = dd.schema_setup;
    data.seed_rows = dd.seed_rows;
    data.must_contain = v.must_contain || [];
  } else if (type === 'parsons') {
    const lines = dd.lines || [];
    data.items = lines.map((l, i) => ({ id: `l${i}`, text: l }));
  } else if (type === 'ordering') {
    data.items = dd.items || [];
  } else if (type === 'categorization') {
    data.items = dd.items || [];
    data.categories = dd.categories || [];
  } else if (type === 'sjt') {
    data.items = (dd.options || []).map((o, i) => ({
      id: o.id || `o${i}`,
      text: o.label || o.text || String(o),
    }));
  } else if (type === 'code_review') {
    data.code = dd.code || step.code || '';
    data.language = dd.language || 'python';
  } else if (type === 'mcq') {
    data.options = dd.options || [];
    data.question = dd.question || step.content || '';
  } else if (type === 'fill_in_blank') {
    data.code = step.code || dd.code || '';
    data.template = step.code || dd.code || '';
    data.blanks = v.blanks || dd.blanks || [];
  } else if (type === 'system_build') {
    data.phases = dd.phases || [];
    data.checklist = dd.checklist || [];
    data.starter_repo = dd.starter_repo;
    data.gha_workflow_check = v.gha_workflow_check || dd.gha_workflow_check;
    data.endpoint_check = v.endpoint_check || dd.endpoint_check;
    // v8.6.2 (2026-04-24) — zero-code rubric capstone fields. Template
    // shows a paste-markdown widget when rubric is present AND no GHA
    // /endpoint primitive is configured. Aliases: `rubric` (v8.6.2 standard)
    // or `paste_rubric` (legacy).
    data.rubric = v.rubric || v.paste_rubric || dd.rubric || '';
    data.paste_prompt = dd.paste_prompt || v.paste_prompt || '';
  } else if (type === 'terminal_exercise') {
    // v8 (2026-04-22): BYO-execution. Fields from demo_data:
    //   instructions  — HTML block with the commands/steps to run
    //   byo_key_notice — bool; show the "your key stays on your machine" panel
    //   asciinema_url — optional pre-recorded terminal demo
    // hint (if any) comes through validation.hint like other types.
    data.instructions = dd.instructions || step.code || '';
    data.byo_key_notice = dd.byo_key_notice !== false; // default true for this type
    data.asciinema_url = dd.asciinema_url;
    data.hint = v.hint || '';
    // v8.6.1 (2026-04-24) SWITCHING-UX pass-through — the terminal template
    // renders a step-aware bootstrap banner + dependencies panel + structured
    // paste slots when the Creator emits these in demo_data.
    data.bootstrap_command = dd.bootstrap_command || '';
    data.dependencies = Array.isArray(dd.dependencies) ? dd.dependencies : [];
    data.paste_slots = Array.isArray(dd.paste_slots) ? dd.paste_slots : [];
    // 2026-04-25 — byo_provider title heuristic. The terminal template uses
    // byo_provider to render the right BYO-key copy ("Configure Aider via
    // OPENAI_API_KEY" vs "Configure Claude Code via claude /login"). Creator
    // doesn't always emit byo_provider on demo_data + dependencies are also
    // often empty, so the template's dependency-driven inference falls
    // through to vendor-blank "generic" copy. Layer a TITLE heuristic on top:
    // course title / subtitle drives the provider when the step has neither
    // explicit field. Generic — applies to any future Kimi/Aider/Claude course
    // without needing per-step Creator emission.
    data.byo_provider = dd.byo_provider || '';
    if (!data.byo_provider) {
      try {
        const titleBlob = ((state.currentCourse && state.currentCourse.title) || '').toLowerCase()
          + ' ' + ((state.currentCourse && state.currentCourse.subtitle) || '').toLowerCase();
        if (/\b(kimi|aider|moonshot|open-source ai coding)\b/.test(titleBlob)) {
          data.byo_provider = 'aider_kimi';
        } else if (/\b(claude code|ai-augmented engineering|claude-code)\b/.test(titleBlob)) {
          data.byo_provider = 'claude_code';
        }
      } catch (_) {}
    }
    // step_slug defaults to "M<modIdx>.S<stepIdx>" if Creator didn't set one
    if (!dd.step_slug) {
      try {
        const mods = Array.isArray(state.modules) ? state.modules : [];
        const mIdx = mods.findIndex(m => String(m.id) === String(state.currentModule));
        if (mIdx >= 0) data.step_slug = `M${mIdx + 1}.S${state.currentStepIndex}`;
      } catch (_) {}
    } else {
      data.step_slug = dd.step_slug;
    }
    data.step_task = dd.step_task || step.title || '';
    // Dashboard deep-link — always include so learner can jump back.
    // v8.6.1 (2026-04-24): user directive — Claude Preview MCP only
    // resolves "localhost", not "127.0.0.1". If the user opened the
    // dashboard on 127.0.0.1, normalize to localhost here so the deep-link
    // pasted in their terminal works under preview.
    try {
      const origin = window.location.origin
        .replace('://127.0.0.1:', '://localhost:')
        .replace('://0.0.0.0:', '://localhost:');
      data.dashboard_deeplink = origin + '/#' +
        state.currentCourse.id + '/' + state.currentModule + '/' + state.currentStepIndex;
    } catch (_) {}
  }
  return data;
}

function createTemplateHandlers(step, index) {
  return {
    // Submit for grading via the server. Also marks step complete on pass.
    async judgeFn(payload) {
      // 2026-04-22 fix: unified sessionStorage-backed counter (shared with
      // legacy validateExercise path). Previous in-memory state._attempts
      // appeared to reset between submits on some flows — beginner-agent
      // saw "2 more retries" three attempts in a row on M4.S4 categorization.
      const attempt = _sllRecordAttempt(step.id);
      try {
        const res = await fetch(`${API}/exercises/validate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            step_id: step.id,
            response_data: payload,
            attempt_number: attempt,
          }),
        });
        const result = await res.json();
        if (result && (result.correct || (result.score || 0) >= 0.95)) {
          try {
            markStepComplete(state.currentCourse.id, state.currentModule, index);
            if (typeof showCelebration === 'function') showCelebration();
          } catch (_) {}
        }
        return result;
      } catch (e) {
        return { correct: false, score: 0, feedback: `Network error: ${e.message || e}` };
      }
    },
    // Run learner code via the backend sandbox / Docker runner.
    async executeFn(code, language, extras) {
      return await executeCode(code, language, extras);
    },
    // GHA workflow check for system_build capstones that have gha_workflow_check.
    async checkGhaFn(runUrl) {
      try {
        const res = await fetch(`${API}/exercises/check_gha`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ run_url: runUrl }),
        });
        return await res.json();
      } catch (e) {
        return { ok: false, detail: `Network error: ${e.message || e}` };
      }
    },
  };
}


function renderStep(rawStep, index) {
  const container = document.getElementById('contentScroll');
  // Merge demo_data and validation into step so renderers can access fields directly.
  // Explicitly preserve expertise-variant content fields on the merged step so
  // adaptive renderers can pick the right variant.
  const step = { ...rawStep, ...(rawStep.demo_data || {}), ...(rawStep.validation || {}) };
  if (rawStep.content_explorer !== undefined) step.content_explorer = rawStep.content_explorer;
  if (rawStep.content_builder !== undefined) step.content_builder = rawStep.content_builder;
  if (rawStep.content_deployer !== undefined) step.content_deployer = rawStep.content_deployer;
  const type = step.exercise_type || step.step_type || 'concept';
  const courseId = state.currentCourse ? state.currentCourse.id : null;

  let html = '<div class="step-content">';
  html += `<div class="step-header">`;
  html += renderBanner(type);
  if (courseId) html += renderExpertiseHint(courseId);
  html += `<div class="step-title">${esc(step.title || `Step ${index + 1}`)}</div>`;
  // Creator tools strip — surgical per-step regenerate + manual edit. Ships
  // 2026-04-20; until roles exist, visible to all. Click "Regenerate" to call
  // POST /api/courses/{id}/steps/{sid}/regenerate (carries prior-course context
  // so personas/brands/code identifiers stay consistent across modules).
  if (courseId && step.id) {
    html += `<div class="creator-tools-strip" style="display:flex; gap:8px; margin-top:8px; font-size:12px;">
      <button onclick="openRegenerateStepModal(${step.id}, '${esc(step.title || '').replace(/'/g, "\\'")}')"
              style="background:#1e2538; color:#8892a8; border:1px solid #2a3352; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:12px;"
              title="Regenerate this step with AI using feedback. Prior course context is preserved.">🔄 Regenerate</button>
      <button onclick="openEditStepModal(${step.id})"
              style="background:#1e2538; color:#8892a8; border:1px solid #2a3352; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:12px;"
              title="Edit this step directly (no AI call)">✏️ Edit</button>
    </div>`;
  }
  html += '</div>';

  if (step.description) {
    html += `<div class="step-description">${step.description}</div>`;
  }

  // P0-1 (2026-04-22): template-first dispatch for types covered by
  // frontend/templates/{drag_drop,code,project}.*. When the template cache is
  // loaded AND the type is covered, emit a placeholder instead of calling the
  // legacy renderX function. The placeholder gets mounted in post-render.
  // Legacy path (renderX + setupX) still runs for uncovered types
  // (adaptive_roleplay / voice_mock_interview / incident_console / simulator_loop)
  // or when templates haven't loaded yet.
  // User directive 2026-04-22: templates cover EVERY non-interactive-first-slide
  // exercise type. Legacy renderers for these types are dead. Only `concept`
  // (interactive intro slides) + the rich custom renderers (adaptive_roleplay,
  // voice_mock_interview, incident_console, simulator_loop, scenario_branch)
  // still get LLM-authored HTML. Everything else = JSON data → template.
  //
  // 2026-04-22 v6: moved ABOVE the briefing-panel block (was below). The old
  // order caused double-rendered briefings on every template type — the panel
  // wrote step.content, then the template's [data-slot="briefing"] /
  // [data-slot="problem_statement"] also rendered step.content (via
  // stepToTemplateData's softenedBriefing). User screenshot caught this on
  // code_review "Spot the Bug: Off-by-One in the Window Slide" showing the
  // same text twice. Fix: compute _useTemplate first, then skip the upstream
  // briefing panel when the template owns the render.
  const _TEMPLATE_DISPATCH = {
    'code_exercise': 'code', 'code': 'code', 'code_read': 'code',
    'parsons': 'drag_drop', 'ordering': 'drag_drop',
    'categorization': 'drag_drop', 'sjt': 'drag_drop',
    'code_review': 'drag_drop',
    'mcq': 'drag_drop',
    'fill_in_blank': 'drag_drop',
    'system_build': 'project',
    // v8 (2026-04-22): BYO-execution. Learner runs on own machine, pastes output.
    'terminal_exercise': 'terminal',
  };
  const _TPL_GLOBAL = {
    'drag_drop': 'SllTemplateDragDrop',
    'code': 'SllTemplateCode',
    'project': 'SllTemplateProject',
    'terminal': 'SllTemplateTerminal',
  };
  const _templateName = _TEMPLATE_DISPATCH[type];
  const _useTemplate = _templateName
    && window._sllTemplateHtmlCache
    && window._sllTemplateHtmlCache[_templateName]
    && window[_TPL_GLOBAL[_templateName]];

  // BRIEFING PANEL (user screenshot 2026-04-20: "No where it is written what to do"):
  // For non-concept exercise types, render step.content as a briefing panel
  // ABOVE the widget. Only fires for LEGACY-render types now — when _useTemplate
  // is active, the template's own briefing/problem slot owns the render and
  // adding this panel produces the double-text bug caught 2026-04-22 v6.
  //
  // Skip rendering when content is just a fallback stub (carries the
  // data-auto-review-stub="1" marker) — those are intentionally terse and
  // the widget's built-in header is enough.
  const NON_CONCEPT_TYPES_WITH_BRIEFING = new Set([
    'code_review', 'ordering', 'categorization', 'fill_in_blank',
    'parsons', 'sjt', 'mcq', 'scenario_branch', 'code_exercise', 'system_build',
  ]);
  if (NON_CONCEPT_TYPES_WITH_BRIEFING.has(type) && step.content && !_useTemplate) {
    const isStub = /data-auto-review-stub="1"/.test(step.content);
    const plainLen = step.content.replace(/<[^>]+>/g, ' ').trim().length;
    // Threshold lowered 80 -> 20 on 2026-04-21 when the duplicate inline renders
    // in renderCodeExerciseStep / renderSystemBuildStep were removed (E.1 fix).
    // Without the inline fallback, short-but-real content (20-80 chars) would
    // have rendered nowhere. 20 chars still excludes tokens-only stubs.
    if (!isStub && plainLen > 20) {
      html += `<div class="step-briefing" style="background:#1e2538; color:#e8ecf4; border:1px solid #2a3352; border-radius:8px; padding:14px 18px; margin:14px 0 22px; line-height:1.6;">
        ${step.content}
      </div>`;
    }
  }

  if (_useTemplate) {
    // Emit a placeholder. Real mount happens in the post-render block.
    html += `<div class="sll-template-mount" data-template="${_templateName}" data-step-idx="${index}" style="margin-top:14px;"></div>`;
  } else {
    switch (type) {
    case 'concept':
      html += renderConceptStep(step, index);
      break;
    case 'code':
      html += renderCodeStep(step, index);
      break;
    case 'code_exercise':
      html += renderCodeExerciseStep(step, index);
      break;
    case 'fill_in_blank':
      html += renderFillInBlankStep(step, index);
      break;
    case 'parsons':
      html += renderParsonsStep(step, index);
      break;
    case 'ordering':
      html += renderOrderingStep(step, index);
      break;
    case 'categorization':
      html += renderCategorizationStep(step, index);
      break;
    case 'scenario_branch':
      html += renderScenarioBranchStep(step, index);
      break;
    case 'sjt':
      html += renderSjtStep(step, index);
      break;
    case 'code_review':
      html += renderCodeReviewStep(step, index);
      break;
    case 'mcq':
      html += renderMcqStep(step, index);
      break;
    case 'system_build':
      html += renderSystemBuildStep(step, index);
      break;
    case 'adaptive_roleplay':
      html += renderAdaptiveRoleplayStep(step, index);
      break;
    case 'voice_mock_interview':
      html += renderVoiceInterviewStep(step, index);
      break;
    case 'incident_console':
      html += renderIncidentConsoleStep(step, index);
      break;
    case 'simulator_loop':
      html += renderSimulatorLoopStep(step, index);
      break;
    default:
      html += `<div class="concept-content">${step.content || '<p>Unknown step type.</p>'}</div>`;
      break;
  }
  }  // end else-block for _useTemplate fallback path

  html += '</div>';
  container.innerHTML = html;

  // Execute inline <script> tags (innerHTML doesn't run them automatically).
  // F3 fix 2026-04-21: the Creator tends to wrap setup code in
  // `document.addEventListener('DOMContentLoaded', function() { ... })`, but
  // DOMContentLoaded has ALREADY fired by the time we reinstantiate these
  // scripts — so the body never runs and "Click to reveal" widgets look dead
  // (user report on /41/0 of created-d08b7691ff00).
  // Strip the DOMContentLoaded wrapper and run the body inline as an IIFE.
  //
  // Fix A 2026-04-21 (zombie-timer teardown): any setInterval / setTimeout
  // armed inside a widget script SURVIVES step navigation because we only
  // replace the container's innerHTML on nav. The old interval keeps firing
  // against a now-null `getElementById(...)`, throwing 10-100 errors/min
  // (user report on skills.sclr.ac/#created-2672ff02d5d0/126/1, module intro
  // widget's "Auto-pulse sync indicator" interval kept firing on step 1).
  //
  // Fix: tear down any timers armed by the PREVIOUS widget script before we
  // arm the new one. We shim setInterval/setTimeout inside the widget's IIFE
  // so the timer IDs are captured and we can clear them on step nav. The
  // shimmed functions feed the shared _widgetTimers registry on `window`.
  if (!window._widgetTimers) {
    window._widgetTimers = { intervals: [], timeouts: [] };
    window._tearDownWidgetTimers = function() {
      try {
        (window._widgetTimers.intervals || []).forEach(id => { try { clearInterval(id); } catch (e) {} });
        (window._widgetTimers.timeouts || []).forEach(id => { try { clearTimeout(id); } catch (e) {} });
      } catch (e) {}
      window._widgetTimers = { intervals: [], timeouts: [] };
    };
  }
  // Clear any timers the PREVIOUS widget armed before running the new one.
  window._tearDownWidgetTimers();

  container.querySelectorAll('script').forEach(oldScript => {
    const newScript = document.createElement('script');
    if (oldScript.src) {
      newScript.src = oldScript.src;
    } else {
      let code = oldScript.textContent || '';
      // Match patterns like:
      //   document.addEventListener('DOMContentLoaded', function() { BODY });
      //   window.addEventListener('DOMContentLoaded', () => { BODY });
      // Extract BODY and run inline via IIFE. Anchored loosely so both
      // function-expression and arrow forms match.
      const domReadyRegex = /(?:document|window)\s*\.\s*addEventListener\s*\(\s*['"]DOMContentLoaded['"]\s*,\s*(?:function\s*\(\s*\)\s*|\(\s*\)\s*=>\s*)\{([\s\S]*)\}\s*\)\s*;?\s*$/;
      const m = code.trim().match(domReadyRegex);
      if (m) {
        code = `(function(){${m[1]}})();`;
      }
      // Fix A: wrap the widget body so setInterval/setTimeout are tracked.
      // The shimmed fns call the real ones and push the returned id into
      // window._widgetTimers. Teardown on next step nav clears them.
      //
      // 2026-04-22 BUG FIX (user report: "Interactive slide(1st) click does
      // nothing" on Go course #created-575a53998df8/23070/0 — the content
      // ships `<button onclick="showZeroValue('string')">` plus a `<script>`
      // declaring `function showZeroValue`. Wrapping the whole script body
      // in an IIFE made showZeroValue a LOCAL function to the IIFE — the
      // inline onclick handler (which runs in global scope) couldn't find
      // it, so clicks did nothing silently.
      //
      // Fix: scan the original script text for top-level `function NAME(`
      // declarations and re-export them to `window` at the end of the IIFE.
      // This preserves timer tracking while restoring the "widget buttons
      // can call the widget script's functions" behavior the LLM assumes.
      const _fnNameMatches = [...code.matchAll(/(?:^|\n)\s*function\s+([a-zA-Z_$][\w$]*)\s*\(/g)];
      const _hoistedNames = Array.from(new Set(_fnNameMatches.map(m => m[1])));
      const _hoistTail = _hoistedNames
        .map(n => `try{window[${JSON.stringify(n)}]=${n};}catch(_e){}`)
        .join('');
      code = `(function(){
        const _origInt = window.setInterval.bind(window);
        const _origTo  = window.setTimeout.bind(window);
        const _tracked = window._widgetTimers;
        const setInterval = (fn, d, ...a) => { const id = _origInt(fn, d, ...a); _tracked.intervals.push(id); return id; };
        const setTimeout  = (fn, d, ...a) => { const id = _origTo(fn, d, ...a);  _tracked.timeouts.push(id);  return id; };
        try { ${code}\n${_hoistTail} } catch (e) { console.error('[widget script]', e); }
      })();`;
      newScript.textContent = code;
    }
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });

  // P0-1 post-render: mount the template into the placeholder we emitted
  // during the render-switch phase above. This replaces the legacy setupX
  // call for covered types — templates handle their own event wiring.
  if (_useTemplate) {
    try {
      const mountPoint = container.querySelector(
        `.sll-template-mount[data-step-idx="${index}"]`);
      if (!mountPoint) throw new Error('template mount point missing');
      mountPoint.innerHTML = window._sllTemplateHtmlCache[_templateName];
      const shellEl = mountPoint.querySelector(`[data-template="${_templateName}"]`);
      if (!shellEl) throw new Error('template shell element missing');
      const data = stepToTemplateData(step, type);
      const handlers = createTemplateHandlers(step, index);
      window[_TPL_GLOBAL[_templateName]].mount(shellEl, data, handlers);
      // v8.6.1 (2026-04-24) — P0.4 BLOCKER fix from today's review agents:
      // `code_read` is POLYMORPHIC based on whether the step has an
      // `explanation_rubric`.
      //
      //   A) explanation_rubric PRESENT → learner must WRITE an explanation,
      //      graded against the rubric by the backend's LLM-rubric grader.
      //      Render a textarea + Submit below the (read-only) code editor.
      //
      //   B) explanation_rubric ABSENT → pure read-only reference material.
      //      Auto-complete on view + hide Submit. This is the legacy path
      //      preserved for code_read steps that never had a rubric (the
      //      2026-04-22 v3→v4 fix.)
      //
      // Ontology (backend/ontology.py:338-348) declares explanation_rubric
      // as REQUIRED on code_read steps going forward — but existing courses
      // may have code_read steps without it, and we tolerate that.
      if (type === 'code_read') {
        const _crRubric = (step?.validation && (step.validation.explanation_rubric || step.validation.rubric)) || '';
        // v8.6.2 (2026-04-24) — "text" language detection.
        // Non-tech courses stash prompt/template/checklist REFERENCE TEXT
        // in `code_read` steps with `demo_data.language === "text"`. The
        // Monaco-like editor + line numbers + "What does this code do?"
        // placeholder felt like a code exercise to the beginner reviewer.
        // For `language === "text"`, swap the editor chrome for a styled
        // reference-text block + keep the rubric-graded textarea below.
        const _crLang = (step?.demo_data?.language || step?.demo_data?.lang || '').toLowerCase();
        const _crIsText = _crLang === 'text' || _crLang === 'markdown' || _crLang === 'md' || _crLang === 'plaintext' || _crLang === 'plain';
        // Editor stays read-only in BOTH branches — the learner reads code,
        // they don't edit it.
        try {
          const edEl = shellEl.querySelector('[data-role="editor"]');
          if (edEl) {
            edEl.setAttribute('readonly', 'true');
            edEl.style.cursor = 'default';
          }
        } catch (_) {}
        // If the content is TEXT (not code), hide the code-editor shell entirely
        // and render a plain styled reference block BEFORE the textarea. The
        // step's concept HTML already shows the content; this block is a second
        // confirmation the learner can scroll to. We hide the shell so the
        // learner doesn't see "line 1: WEAK PROMPT:" treated as code.
        try {
          if (_crIsText) {
            shellEl.style.display = 'none';
            const rawText = ((step.demo_data && step.demo_data.code) || step.code || '').toString();
            if (rawText.trim()) {
              const container = shellEl.parentElement || shellEl;
              if (!container.querySelector('.code-read-textref')) {
                const block = document.createElement('div');
                block.className = 'code-read-textref';
                block.style.cssText = 'margin:14px 0; padding:16px 20px; background:#161b26; border:1px solid #2a3352; border-left:3px solid #4a7cff; border-radius:8px; color:#e8ecf4; white-space:pre-wrap; font-family: ui-sans-serif, system-ui; font-size:0.92rem; line-height:1.6; max-height:520px; overflow:auto;';
                const header = document.createElement('div');
                header.style.cssText = 'color:#8892a8; font-size:0.76rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:10px;';
                header.textContent = 'Reference material — read below';
                const body = document.createElement('div');
                body.textContent = rawText;
                block.appendChild(header);
                block.appendChild(body);
                shellEl.parentElement.insertBefore(block, shellEl);
              }
            }
          }
        } catch (_) {}
        // "read-only reference" badge in both branches.
        try {
          const hdr = shellEl.querySelector('.tmpl-editor-header');
          if (hdr && !hdr.querySelector('.sll-readonly-badge')) {
            const badge = document.createElement('span');
            badge.className = 'sll-readonly-badge';
            badge.textContent = 'read-only reference';
            badge.style.cssText = 'margin-left:10px; padding:2px 8px; border-radius:10px; background:#2dd4bf22; color:#2dd4bf; font-size:0.74rem; font-weight:600;';
            hdr.appendChild(badge);
          }
        } catch (_) {}
        // Hide Run / Reset (no code-execution path on code_read in either branch).
        try {
          shellEl.querySelectorAll('[data-action="run"], [data-action="reset-code"]').forEach(el => {
            el.style.display = 'none';
          });
        } catch (_) {}

        if (_crRubric) {
          // === Branch A: explain-with-rubric ===
          // Hide the code editor's Submit button — we render our own under
          // the textarea so the learner's action target is unambiguous.
          try {
            shellEl.querySelectorAll('[data-action="submit"]').forEach(el => {
              el.style.display = 'none';
            });
          } catch (_) {}
          // Inject explanation textarea + grade-on-submit UI below the shell.
          try {
            const container = shellEl.parentElement || shellEl;
            // Avoid double-mounting on re-render
            if (!container.querySelector('.code-read-explain')) {
              const block = document.createElement('div');
              block.className = 'code-read-explain';
              block.style.cssText = 'margin-top:14px; background:#161b26; border:1px solid #2a3352; border-radius:8px; padding:14px;';
              // v8.6.2 — content-agnostic prompt copy. "code" vocabulary
              // confuses non-coder learners when the reference material is
              // actually prose/prompts/templates (language: text).
              const _explainIntro = _crIsText
                ? 'Read the material above, then explain the key differences, trade-offs, or what makes one approach stronger than another. 3-5 sentences. Grader checks your explanation against a rubric.'
                : 'Read the code above, then explain what it does and the key design choices. 3-5 sentences. Grader checks your explanation against a rubric.';
              const _explainPlaceholder = _crIsText
                ? 'What do you notice? What makes one approach work better than the other? Be specific.'
                : 'What does this code do? What are the important design choices a learner should notice?';
              block.innerHTML = `
                <div style="color:#e8ecf4; font-weight:600; font-size:0.92rem; margin-bottom:8px;">
                  Write your explanation
                </div>
                <div style="color:#8892a8; font-size:0.82rem; margin-bottom:10px; line-height:1.5;">
                  ${_explainIntro}
                </div>
                <textarea id="codeReadExplain" rows="6" placeholder="${_explainPlaceholder}"
                  style="width:100%; background:#0e1218; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:10px; font-family: ui-sans-serif, system-ui; font-size:0.9rem; line-height:1.5; resize:vertical;"></textarea>
                <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                  <button id="codeReadSubmit" class="check-btn"
                    style="background:#4a7cff; color:#fff; border:0; border-radius:6px; padding:8px 16px; cursor:pointer; font-weight:600;">
                    Submit explanation
                  </button>
                  <span id="codeReadStatus" style="color:#8892a8; font-size:0.82rem;"></span>
                </div>
                <div id="codeReadResult" style="margin-top:14px;"></div>
              `;
              container.appendChild(block);
              const btn = block.querySelector('#codeReadSubmit');
              const ta = block.querySelector('#codeReadExplain');
              const status = block.querySelector('#codeReadStatus');
              const result = block.querySelector('#codeReadResult');
              btn.addEventListener('click', async () => {
                const txt = (ta.value || '').trim();
                if (txt.length < 30) {
                  status.textContent = 'Your explanation is too short — aim for 3-5 sentences.';
                  status.style.color = '#fca5a5';
                  return;
                }
                // v8.6.2 (2026-04-24) — clear stale feedback BEFORE firing the
                // new grade request. Beginner reviewer 2026-04-24 saw attempt-2
                // feedback "stuck" at attempt-1 score (20%) even though backend
                // returned a different score. Root cause: async request could
                // still be in flight when user clicks again, and the visible
                // feedback pane wasn't cleared — giving the illusion the new
                // submission didn't register. Clearing result.innerHTML up front
                // makes "I clicked Submit but nothing changed" impossible.
                result.innerHTML = '';
                btn.disabled = true;
                status.textContent = 'Grading…';
                status.style.color = '#8892a8';
                try {
                  const res = await validateExercise(step.id, 'code_read', { explanation: txt });
                  const score = typeof res.score === 'number' ? res.score : 0;
                  const scorePct = Math.round(score * 100);
                  const isCorrect = !!res.correct;
                  const color = isCorrect ? '#2dd4bf' : (score >= 0.4 ? '#fbbf24' : '#fca5a5');
                  result.innerHTML = `
                    <div style="background:#0e1218; border:1px solid #2a3352; border-left:3px solid ${color}; border-radius:6px; padding:12px;">
                      <div style="color:${color}; font-weight:600; font-size:0.92rem; margin-bottom:6px;">
                        ${isCorrect ? '✓' : score >= 0.4 ? '◐' : '✗'} Score: ${scorePct}%
                      </div>
                      <div style="color:#c9d1df; font-size:0.88rem; line-height:1.5; white-space:pre-line;">
                        ${esc(res.feedback || '')}
                      </div>
                      ${!isCorrect ? `<div style="margin-top:10px; color:#8892a8; font-size:0.78rem;">Iterate: refine your explanation and submit again.</div>` : ''}
                    </div>
                  `;
                  status.textContent = '';
                  // v8.6.2 — INVERTED-LOGIC FIX. Previous line was
                  //   btn.disabled = !isCorrect;  // disabled on miss, enabled on pass
                  // which is the OPPOSITE of the inline comment's intent
                  // ("leave disabled on pass, allow retry on miss"). Beginner
                  // reviewer saw button get DISABLED after first fail →
                  // couldn't iterate → step felt broken. Correct semantics:
                  // disable on pass (to signal done), keep enabled on miss
                  // (so the learner can edit + retry).
                  btn.disabled = isCorrect;
                  if (isCorrect) {
                    try { markStepComplete(state.currentCourse.id, state.currentModule, index, scorePct); } catch (_) {}
                  }
                } catch (e) {
                  status.textContent = 'Grading failed. Try again.';
                  status.style.color = '#fca5a5';
                  btn.disabled = false;
                }
              });
            }
          } catch (e) { console.warn('code_read rubric UI mount failed:', e); }
        } else {
          // === Branch B: legacy read-only reference (no rubric) ===
          // Hide Submit too — auto-complete path.
          try {
            shellEl.querySelectorAll('[data-action="submit"]').forEach(el => {
              el.style.display = 'none';
            });
          } catch (_) {}
          // Mark complete on view (legacy behavior).
          try {
            if (state.currentCourse && state.currentCourse.id && state.currentModule) {
              markStepComplete(state.currentCourse.id, state.currentModule, index);
            }
          } catch (_) {}
        }
      }
      return;  // skip legacy setup for this step
    } catch (tpErr) {
      console.warn('[tpl] post-render mount failed, legacy setupX will not run either:', tpErr);
      return;  // avoid running legacy setup on a half-rendered container
    }
  }

  // Post-render setup
  switch (type) {
    case 'concept':
      markStepComplete(state.currentCourse.id, state.currentModule, index);
      break;
    case 'code':
    case 'code_exercise':
      setupCodeEditor(step, index);
      break;
    case 'fill_in_blank':
      setupFillInBlank(step, index);
      break;
    case 'parsons':

function renderConceptStep(step) {
  const courseId = state.currentCourse ? state.currentCourse.id : null;
  const level = courseId ? getExpertise(courseId) : 'builder';
  const variantKey = 'content_' + level;
  const content = (step[variantKey] !== undefined && step[variantKey] !== null && step[variantKey] !== '')
    ? step[variantKey]
    : (step.content || '');
  // Incomplete-content fallback (user directive 2026-04-20): when the per-step
  // LLM call silently dropped this step, don't render a blank pane — surface
  // a clear in-line note so learners know to flag it rather than thinking
  // they're seeing empty content by design.
  const plainLen = (content || '').replace(/<[^>]+>/g, '').trim().length;
  if (!content || plainLen < 40) {
    return renderIncompleteStepNote(step);
  }
  return `<div class="concept-content">${content}</div>`;
}

// Shared incomplete-step notice — used by any step-type renderer whose

// Code Exercise Step
// ===================================================================
function renderCodeExerciseStep(step, index) {
  const code = loadCode(state.currentCourse.id, state.currentModule, index) || step.code || '';
  const todos = extractTodos(code);
  const hint = step.validation?.hint || step.hint || '';
  const level = getExpertise(state.currentCourse.id);

  // Task list (may also come from explicit tasks / validation.tasks)
  const explicitTasks = Array.isArray(step.tasks)
    ? step.tasks
    : (Array.isArray(step.validation?.tasks) ? step.validation.tasks : []);
  const taskItems = explicitTasks.length ? explicitTasks : todos;

  let html = '';

  // NOTE (2026-04-21): step.content is now rendered by the unified briefing panel
  // in the dispatcher above (renderStep). Removing the old inline block here —
  // previously it caused the briefing to appear TWICE on code_exercise steps
  // (user report on skills.sclr.ac/#created-373e38f8e51c/117/3).
  // The briefing panel's 20-char threshold still guarantees short-but-real
  // content lands on screen.

  // Deployer sandbox note — subtle banner for simple sandboxed code exercises.
  if (level === 'deployer') {
    html += `<div class="deployer-hint"><strong>Deployer mode:</strong> consider running this in your own terminal for the full experience. The sandbox is here for quick verification.</div>`;
  }

  if (taskItems.length) {
    const renderTaskList = () => {
      let list = `<div class="todo-list" id="taskList"><div class="todo-header">Your Tasks</div>`;
      taskItems.forEach(t => {
        list += `<div class="todo-item"><div class="todo-bullet"></div>${esc(t)}</div>`;
      });
      list += '</div>';
      return list;
    };

    if (level === 'explorer') {
      // Full task list upfront — current behavior.
      html += renderTaskList();
    } else if (level === 'builder') {
      // Collapsible — visible by default but can be toggled.
      html += `<button class="task-toggle-btn" onclick="toggleTaskList()" id="taskToggleBtn">&#9660; Hide Tasks</button>`;
      html += renderTaskList();
    } else {
      // deployer — hidden by default, single View Tasks toggle.
      html += `<button class="task-toggle-btn" onclick="toggleTaskList()" id="taskToggleBtn">&#9654; View Tasks</button>`;
      html += `<div style="display:none;">${renderTaskList()}</div>`;
    }
  }

  html += renderCodeEditor(code, index, false);
  html += `<div class="code-actions">
    <button class="run-btn" id="runBtn" onclick="onRunCode(${index}, true)">&#9654; Run</button>`;
  // Hints: explorer auto-shown, builder on-click, deployer hidden entirely.
  if (hint && level === 'builder') {
    html += `<button class="hint-btn" onclick="toggleHint()">&#128161; Show Hint</button>`;
  }
  html += '</div>';
  if (hint && level === 'explorer') {
    html += `<div class="hint-box" id="hintBox">${esc(hint)}</div>`;
  } else if (hint && level === 'builder') {
    html += `<div class="hint-box" id="hintBox" style="display:none;">${esc(hint)}</div>`;
  }
  html += `
    <div class="output-panel" id="outputPanel" style="display:none;">
      <div class="output-header">&#128187; Output</div>
      <div class="output-body" id="outputBody"></div>
    </div>
    <div id="exerciseResult"></div>`;
  return html;
}

function toggleTaskList() {
  const list = document.getElementById('taskList');
  const btn = document.getElementById('taskToggleBtn');
  if (!list) return;
  // The list may be wrapped in a hidden container (deployer) or be visible directly (builder).
  const wrapper = list.parentElement && list.parentElement.style && list.parentElement.style.display === 'none'
    ? list.parentElement
    : list;
  const nowHidden = wrapper.style.display !== 'none';
  wrapper.style.display = nowHidden ? 'none' : '';
  if (btn) btn.innerHTML = nowHidden ? '&#9654; View Tasks' : '&#9660; Hide Tasks';
}

function extractTodos(code) {
  const lines = code.split('\n');
  const todos = [];
  lines.forEach(l => {
    const m = l.match(/#\s*TODO[:\s]+(.*)/i);
    if (m) todos.push(m[1].trim());
  });
  return todos;
}

function toggleHint() {
  const box = document.getElementById('hintBox');
  if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

// F16 fix (2026-04-21): language label + highlighter were hardcoded to Python.
// Now reads `step.language` (falls back to demo_data.language / validation.language)
// and picks the display label + highlighter per-language. For types we don't
// syntax-highlight, we render escaped plain text (still in the dark editor chrome).
const _LANG_LABEL = {
  python: 'Python', py: 'Python',
  sql: 'SQL',
  yaml: 'YAML', yml: 'YAML',
  dockerfile: 'Dockerfile', docker: 'Dockerfile',
  shell: 'Shell', bash: 'Bash', sh: 'Shell',
  javascript: 'JavaScript', js: 'JavaScript',
  typescript: 'TypeScript', ts: 'TypeScript',
  go: 'Go',
  rust: 'Rust',
  java: 'Java',
  ruby: 'Ruby',
  php: 'PHP',
  c: 'C', cpp: 'C++',
  markdown: 'Markdown', md: 'Markdown',
  json: 'JSON',
  log: 'Log',
  text: 'Text',
};

function _resolveEditorLanguage(index) {
  try {
    const step = (getSteps() || [])[index] || {};
    const dd = step.demo_data || {};
    const val = step.validation || {};
    const raw = (step.language || dd.language || val.language || 'python');
    return String(raw).toLowerCase().trim();
  } catch (e) {
    return 'python';
  }
}

function _renderEditorHighlight(code, lang) {
  if (lang === 'python' || lang === 'py') return highlightPython(code);
  // For non-Python we render plain-escaped text — safer than mis-highlighting
  // as Python (keywords like FROM/RUN/CMD would have been colored as Python).
  return esc(code);
}

function renderCodeEditor(code, index, readOnly) {
  const lines = code.split('\n').length;
  const lineNums = Array.from({ length: Math.max(lines, 1) }, (_, i) => i + 1).join('\n');
  const lang = _resolveEditorLanguage(index);
  const label = _LANG_LABEL[lang] || (lang.charAt(0).toUpperCase() + lang.slice(1)) || 'Python';
  return `
    <div class="code-editor-wrapper" data-lang="${esc(lang)}">
      <div class="code-editor-header">
        <span>${esc(label)}</span>
      </div>
      <div class="code-editor-body">
        <div class="code-line-numbers" id="lineNums">${lineNums}</div>
        <pre class="code-highlight" id="codeHighlight">${_renderEditorHighlight(code, lang)}</pre>
        <textarea class="code-textarea" id="codeTextarea"
          spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
          ${readOnly ? 'readonly' : ''}>${esc(code)}</textarea>
      </div>
    </div>`;
}

function setupCodeEditor(step, index) {
  const ta = document.getElementById('codeTextarea');
  const hl = document.getElementById('codeHighlight');
  const ln = document.getElementById('lineNums');
  if (!ta) return;

  function autoResize() {
    ta.style.height = 'auto';
    ta.style.height = Math.max(120, ta.scrollHeight) + 'px';
  }

  const _editorLang = _resolveEditorLanguage(index);
  function sync() {
    // F16 fix 2026-04-21: highlight matches step.language (Python coloring on
    // a Dockerfile would mis-color keywords).
    hl.innerHTML = _renderEditorHighlight(ta.value, _editorLang);
    const lines = ta.value.split('\n').length;
    ln.textContent = Array.from({ length: Math.max(lines, 1) }, (_, i) => i + 1).join('\n');
    autoResize();
    saveCode(state.currentCourse.id, state.currentModule, index, ta.value);
  }

  ta.addEventListener('input', sync);
  // Initial auto-size
  setTimeout(autoResize, 0);
  ta.addEventListener('scroll', () => {
    hl.scrollTop = ta.scrollTop;
    hl.scrollLeft = ta.scrollLeft;
    ln.style.transform = `translateY(-${ta.scrollTop}px)`;
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
      sync();
    }
  });
}

// ===================================================================
// Python Syntax Highlighting
// ===================================================================
function highlightPython(code) {
  // Tokenize
  const tokens = [];
  let i = 0;
  const src = code;
  const keywords = new Set(['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield']);
  const builtins = new Set(['print','len','range','int','str','float','list','dict','set','tuple','type','isinstance','enumerate','zip','map','filter','sorted','reversed','any','all','sum','min','max','abs','round','open','input','super','property','staticmethod','classmethod','hex','bin','oct','format','repr','id','hash','callable','getattr','setattr','hasattr','delattr','vars','dir','help','next','iter','object','bool','bytes','bytearray','memoryview','complex','frozenset','chr','ord','pow','divmod','Exception','ValueError','TypeError','KeyError','IndexError','AttributeError','RuntimeError','StopIteration','NotImplementedError']);

  while (i < src.length) {
    // Comment
    if (src[i] === '#') {
      let j = i;
      while (j < src.length && src[j] !== '\n') j++;
      tokens.push({ type: 'comment', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // Strings (triple-quoted)
    if (src.slice(i, i + 3) === '"""' || src.slice(i, i + 3) === "'''") {
      const q = src.slice(i, i + 3);
      let j = i + 3;
      while (j < src.length && src.slice(j, j + 3) !== q) j++;
      j += 3;
      tokens.push({ type: 'string', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // Strings (single/double)
    if (src[i] === '"' || src[i] === "'") {
      const q = src[i];
      let j = i + 1;
      while (j < src.length && src[j] !== q && src[j] !== '\n') {
        if (src[j] === '\\') j++;
        j++;
      }
      if (j < src.length && src[j] === q) j++;
      tokens.push({ type: 'string', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // f-string prefix
    if ((src[i] === 'f' || src[i] === 'F' || src[i] === 'r' || src[i] === 'R' || src[i] === 'b' || src[i] === 'B') && (src[i + 1] === '"' || src[i + 1] === "'")) {
      const q = src[i + 1];
      let j = i + 2;
      while (j < src.length && src[j] !== q && src[j] !== '\n') {
        if (src[j] === '\\') j++;
        j++;
      }
      if (j < src.length && src[j] === q) j++;
      tokens.push({ type: 'string', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // Decorator
    if (src[i] === '@' && (i === 0 || src[i - 1] === '\n' || /\s/.test(src[i - 1]))) {
      let j = i + 1;
      while (j < src.length && /[\w.]/.test(src[j])) j++;
      tokens.push({ type: 'decorator', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // Number
    if (/\d/.test(src[i]) && (i === 0 || !/\w/.test(src[i - 1]))) {
      let j = i;
      while (j < src.length && /[\d.xXoObBeE_a-fA-F]/.test(src[j])) j++;
      tokens.push({ type: 'number', value: src.slice(i, j) });
      i = j;
      continue;
    }
    // Identifier / keyword
    if (/[a-zA-Z_]/.test(src[i])) {
      let j = i;
      while (j < src.length && /\w/.test(src[j])) j++;
      const word = src.slice(i, j);
      if (word === 'self') tokens.push({ type: 'self', value: word });
      else if (word === 'True' || word === 'False') tokens.push({ type: 'bool', value: word });
      else if (word === 'None') tokens.push({ type: 'none', value: word });
      else if (word === 'def' || word === 'class') tokens.push({ type: word, value: word });
      else if (keywords.has(word)) tokens.push({ type: 'keyword', value: word });
      else if (builtins.has(word)) tokens.push({ type: 'builtin', value: word });
      else tokens.push({ type: 'plain', value: word });
      i = j;
      continue;
    }
    // Operator
    if ('+-*/%=!<>&|^~'.includes(src[i])) {
      tokens.push({ type: 'operator', value: src[i] });
      i++;
      continue;
    }
    // Other
    tokens.push({ type: 'plain', value: src[i] });
    i++;
  }

  // After def/class, color the next identifier
  let result = '';
  for (let t = 0; t < tokens.length; t++) {
    const tok = tokens[t];
    let cls = 'syn-plain';
    switch (tok.type) {
      case 'keyword': case 'def': case 'class': cls = 'syn-keyword'; break;
      case 'string': cls = 'syn-string'; break;
      case 'comment': cls = 'syn-comment'; break;
      case 'number': cls = 'syn-number'; break;
      case 'builtin': cls = 'syn-builtin'; break;
      case 'decorator': cls = 'syn-decorator'; break;
      case 'operator': cls = 'syn-operator'; break;
      case 'self': cls = 'syn-self'; break;
      case 'bool': cls = 'syn-bool'; break;
      case 'none': cls = 'syn-none'; break;
    }
    // Color name after def/class
    if ((tok.type === 'def' || tok.type === 'class') && t + 1 < tokens.length) {
      result += `<span class="${cls}">${esc(tok.value)}</span>`;
      t++;
      // Skip whitespace
      while (t < tokens.length && tokens[t].value.trim() === '') {
        result += esc(tokens[t].value);
        t++;
      }
      if (t < tokens.length) {
        result += `<span class="${tok.type === 'def' ? 'syn-def' : 'syn-class'}">${esc(tokens[t].value)}</span>`;
      }
      continue;
    }
    result += `<span class="${cls}">${esc(tok.value)}</span>`;
  }
  return result;
}

// ===================================================================
// Run Code
// ===================================================================
async function onRunCode(index, isExercise) {
  const ta = document.getElementById('codeTextarea');
  const btn = document.getElementById('runBtn');
  const panel = document.getElementById('outputPanel');
  const body = document.getElementById('outputBody');
  if (!ta || !btn) return;

  const code = ta.value;
  // D.2 (2026-04-21): pick language + fixtures from step metadata so SQL / YAML
  // exercises route to the correct sandbox. step.language / step.demo_data.language
  // comes through the demo_data spread in the dispatcher at line ~3501.
  const step = getSteps()[index] || {};
  const dd = step.demo_data || {};
  const val = step.validation || {};
  const language = step.language || dd.language || val.language || 'python';
  const extras = {
    schema_setup: dd.schema_setup || val.schema_setup,
    seed_rows: dd.seed_rows || val.seed_rows,
    yaml_schema: val.yaml_schema || dd.yaml_schema || val.schema || dd.schema,
  };
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running...';
  panel.style.display = 'block';
  body.className = 'output-body';
  body.textContent = 'Running...';

  try {
    const result = await executeCode(code, language, extras);
    const output = result.stdout || result.output || '';
    const error = result.stderr || result.error || '';
    if (result.exit_code === 1 || (!output && error)) {
      body.className = 'output-body error';
      body.textContent = error || 'Code execution failed.';
    } else {
      body.className = 'output-body';
      body.textContent = output || '(No output)';

      if (isExercise) {
        const step = getSteps()[index];
        const expected = step.validation?.expected_output || step.expected_output;
        if (expected && output && output.trim() === expected.trim()) {
          markStepComplete(state.currentCourse.id, state.currentModule, index);
          showCelebration();
          const resEl = document.getElementById('exerciseResult');
          if (resEl) {
            resEl.innerHTML = '<div class="score-display perfect" style="margin-top:16px;">&#10003; Exercise completed!</div>';
          }
        }
      } else {
        // Read & run: mark complete on successful execution
        markStepComplete(state.currentCourse.id, state.currentModule, index);
      }
    }
  } catch (e) {
    body.className = 'output-body error';
    body.textContent = 'Error communicating with server. Please try again.';
  }

  btn.disabled = false;
  btn.innerHTML = '&#9654; Run';
}

function renderFillInBlankStep(step, index) {
  const blanks = step.blanks || (step.validation && step.validation.blanks) || [];
  let code = step.code_template || step.code || '';

  // Replace ____ with input fields
  let blankIndex = 0;
  code = code.replace(/____/g, () => {
    const hint = blanks[blankIndex]?.placeholder || blanks[blankIndex]?.hint || '';
    const inp = `<input type="text" class="fib-input" id="fib-${blankIndex}" placeholder="${esc(hint)}" data-index="${blankIndex}" autocomplete="off">`;
    blankIndex++;
    return inp;
  });

  return `
    <div class="fib-code" id="fibCode">${code}</div>
    <button class="check-btn" id="fibCheckBtn" onclick="checkFillInBlank(${index})">Check Answers</button>
    <div id="fibResult"></div>`;
}
