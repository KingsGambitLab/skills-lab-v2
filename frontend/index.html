async function checkFillInBlank(index) {
  const step = getSteps()[index];
  // Blanks metadata (hints/alternatives) is stripped by the sanitizer — but the INPUT
  // count should be derived from the rendered DOM, not from the stripped validation
  // array. Alex learner review 2026-04-20 found the UI showed "0/0 correct" because
  // step.blanks was empty after sanitization.
  const inputEls = Array.from(document.querySelectorAll('.fib-input'));
  const btn = document.getElementById('fibCheckBtn');
  const answers = inputEls.map(inp => inp.value.trim());

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    const result = await validateExercise(step.id, 'fill_in_blank', { answers });
    // Backend returns item_results[{index, correct, expected, hint}] — the authoritative
    // per-blank outcome. Prefer that over local guessing.
    const results = result.item_results || result.results || result.blank_results || [];
    const total = inputEls.length;
    let correct = 0;

    // REVEAL-GATE AWARENESS (2026-04-20): on attempts 1-2 the server strips
    // the `expected` value so learners don't see the answer key. Only show the
    // "Expected: X" hint when the server returned it (full reveal path).
    inputEls.forEach((inp, i) => {
      const r = results[i] || {};
      const isCorrect = (r.correct !== undefined) ? r.correct : false;
      inp.className = isCorrect ? 'fib-input correct' : 'fib-input incorrect';
      inp.disabled = true;
      if (isCorrect) correct++;
      // Show the expected answer ONLY when server returned it (attempt 3+ OR all correct)
      if (!isCorrect && r.expected) {
        const hintEl = document.createElement('div');
        hintEl.style.cssText = 'font-size:0.78rem; color:var(--text-muted); margin-top:4px;';
        hintEl.innerHTML = `Expected: <code style="color:var(--success);">${esc(r.expected)}</code>`;
        inp.parentElement?.insertBefore(hintEl, inp.nextSibling);
      }
    });

    // If backend didn't return item_results, fall back to score × total.
    if (!results.length && typeof result.score === 'number') {
      correct = Math.round(result.score * total);
    }

    const pct = total > 0 ? correct / total : 0;
    const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
    document.getElementById('fibResult').innerHTML = `
      <div class="score-display ${cls}"><strong>${correct} / ${total} correct</strong> &middot; ${Math.round(pct*100)}%
      ${result.feedback ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.85rem;">${esc((result.feedback||'').split('\n')[0])}</span>` : ''}</div>`;

    if (pct === 1) {
      markStepComplete(state.currentCourse.id, state.currentModule, index);
      showCelebration();
    } else if (pct >= 0.5) {
      markStepComplete(state.currentCourse.id, state.currentModule, index, Math.round(pct * 100));
    }
  } catch (e) {
    // No client-side fallback — would require access to the stripped answer key.
    document.getElementById('fibResult').innerHTML = `
      <div class="score-display low" style="margin-top:12px;">Grading unavailable. Please try again.</div>`;
  } finally {
    // ALWAYS reset (bulletproof-finally pattern, 2026-04-21).
    btn.disabled = false;
    btn.innerHTML = 'Check Answers';
  }
}

// ===================================================================
// Parsons Problem
// ===================================================================
function renderParsonsStep(step, index) {
  const lines = step.scrambled_lines || step.lines || [];
  const distractors = new Set(step.distractors || []);
  const allLines = [...lines];

  // Shuffle
  const shuffled = shuffle(allLines.map((l, i) => ({ text: l, origIndex: i, isDistractor: distractors.has(l) })));
  const targetCount = allLines.filter(l => !distractors.has(l)).length;

  let html = '<div class="parsons-container">';

  // Source
  html += '<div class="parsons-source">';
  html += '<div class="parsons-label">Available Lines</div>';
  html += '<div class="parsons-items" id="parsonsSource">';
  shuffled.forEach((l, i) => {
    const distCls = l.isDistractor ? ' distractor' : '';
    html += `<div class="drag-item${distCls}" draggable="true" data-parsons-id="${i}" data-text="${escAttr(l.text)}">${esc(l.text)}</div>`;
  });
  html += '</div></div>';

  // Target
  html += '<div class="parsons-target">';
  html += '<div class="parsons-label">Your Solution</div>';
  html += '<div class="parsons-items" id="parsonsTarget">';
  for (let i = 0; i < targetCount; i++) {
    html += `<div class="parsons-drop-slot" data-slot="${i}">Drop here</div>`;
  }
  html += '</div></div>';
  html += '</div>';

  html += `<button class="check-btn" id="parsonsCheckBtn" onclick="checkParsons(${index})">Check Order</button>`;
  html += '<div id="parsonsResult"></div>';
  return html;
}

// ===================================================================
// Ordering
// ===================================================================
function renderOrderingStep(step, index) {
  // Support both shapes: step.items directly or step.demo_data.items
  const items = (step.items && step.items.length) ? step.items : ((step.demo_data && step.demo_data.items) || []);
  // Preserve each item's ID (needed for server-side validation; no correct_position leaked in the API response)
  const enriched = items.map((item, i) => ({
    id: item.id || `ord_${i}`,
    text: item.text || (typeof item === 'string' ? item : ''),
  }));
  const shuffled = shuffle(enriched.slice());

  let html = '<div class="parsons-label">Drag items into the correct order</div>';
  html += `<div class="cat-source" id="orderingSource">`;
  shuffled.forEach((item) => {
    html += `<div class="drag-item" draggable="true" data-ordering-id="${escAttr(item.id)}" data-text="${escAttr(item.text)}">${esc(item.text)}</div>`;
  });
  html += '</div>';

  html += '<div class="ordering-slots" id="orderingSlots">';
  for (let i = 0; i < enriched.length; i++) {
    html += `<div class="ordering-slot">
      <div class="ordering-slot-number">${i + 1}</div>
      <div class="ordering-drop" data-slot="${i}">
        <span style="color:var(--text-muted);font-size:0.82rem;">Drop here</span>
      </div>
    </div>`;
  }
  html += '</div>';

  html += `<button class="check-btn" id="orderingCheckBtn" onclick="checkOrdering(${index})">Check Order</button>`;
  html += '<div id="orderingResult"></div>';
  return html;
}

// ===================================================================
// Categorization
// ===================================================================
function renderCategorizationStep(step, index) {
  // Support both shapes: direct fields on step (from merged demo_data) or step.demo_data.*
  const categories = (step.categories && step.categories.length) ? step.categories : ((step.demo_data && step.demo_data.categories) || []);
  const items = (step.items && step.items.length) ? step.items : ((step.demo_data && step.demo_data.items) || []);
  // Preserve the REAL item.id from the backend (e.g. "i1", "i2") — the server validator
  // matches by this id. Previously used the array index, which broke server-side grading
  // (server saw placement like {"0":"Bias..."} but items had ids "i1",... — no matches).
  const shuffled = shuffle(items.map((item, i) => ({
    text: item.text || item.item || (typeof item === 'string' ? item : ''),
    id: (item.id !== undefined && item.id !== null) ? item.id : `cat_${i}`,
  })));

  const colCount = Math.min(categories.length, 4);
  let html = `<div class="cat-buckets cols-${colCount}" id="catBuckets">`;
  categories.forEach((cat, ci) => {
    const catName = cat.name || cat;
    html += `<div class="cat-bucket" data-category="${escAttr(catName)}">
      <div class="cat-bucket-header">${esc(catName)}</div>
      <div class="cat-bucket-items" data-cat-target="${ci}"></div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="parsons-label">Drag items to the correct category</div>';
  html += '<div class="cat-source" id="catSource">';
  shuffled.forEach(item => {
    // NOTE (2026-04-19): `data-correct-cat` was previously rendered here and leaked the
    // answer key to anyone using View Source. Removed. Grading is now 100% server-side via
    // POST /api/exercises/validate. If the server call fails, we show "grading unavailable"
    // rather than fall back to client-side grading with a leaked answer.
    html += `<div class="drag-item" draggable="true" data-cat-id="${item.id}" data-text="${escAttr(item.text)}">${esc(item.text)}</div>`;
  });
  html += '</div>';

  html += `<button class="check-btn" id="catCheckBtn" onclick="checkCategorization(${index})">Check</button>`;
  html += '<div id="catResult"></div>';
  return html;
}

// ===================================================================
// Scenario Branch
// ===================================================================
// ===================================================================
// Shared multi-part UX helpers (user directive 2026-04-20): every exercise
// type that collects N interactions before one evaluation needs a consistent
// upfront notice + a submission-in-progress transition so the learner never
// wonders "am I done?" or "why aren't answers being evaluated?"
//
// Applied across: scenario_branch, fill_in_blank, parsons, ordering,
// categorization, sjt, code_review.
// ===================================================================
function renderMultiPartNotice(total, label, hint) {
  return `
    <div class="multi-part-notice" role="status" style="background:#1a2440; border:1px solid #2a3352; border-left:3px solid #4a7cff; border-radius:8px; padding:10px 14px; margin-bottom:14px; display:flex; align-items:flex-start; gap:10px; font-size:0.84rem; color:#c9d1df;">
      <span style="color:#4a7cff; font-weight:700; font-size:14px; margin-top:1px;">ⓘ</span>
      <div style="flex:1;">
        <div style="color:#e8ecf4; font-weight:600;">${total} ${esc(label)} — answer all, then we evaluate together</div>
        ${hint ? `<div style="font-size:0.78rem; color:#8892a8; margin-top:3px;">${esc(hint)}</div>` : ''}
      </div>
    </div>`;
}

// Injected once on first use so exercise-type setups can re-use the keyframe.
let _multipartSpinnerInjected = false;
function _ensureSpinnerKeyframe() {
  if (_multipartSpinnerInjected) return;
  const st = document.createElement('style');
  st.textContent = '@keyframes multipart-spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(st);
  _multipartSpinnerInjected = true;
}

function renderEvaluationTransitionElement(message) {
  _ensureSpinnerKeyframe();
  const el = document.createElement('div');
  el.className = 'eval-transition';
  el.style.cssText = 'background:#1a2440; border:1px solid #2a3352; border-radius:8px; padding:14px 16px; margin-top:14px; display:flex; align-items:center; gap:12px; color:#c9d1df; font-size:0.88rem;';
  el.innerHTML = `
    <span style="display:inline-block; width:14px; height:14px; border:2px solid #4a7cff; border-top-color:transparent; border-radius:50%; animation:multipart-spin 0.8s linear infinite;"></span>
    <span style="color:#e8ecf4;">${esc(message || 'Submitting your answers for evaluation\u2026')}</span>`;
  return el;
}

function renderScenarioBranchStep(step, index) {
  // The verbose multi-part notice was removed 2026-04-20 (user feedback: redundant).
  // The "Decision N of M" progress indicator on each question + the evaluation
  // spinner carry the signal instead.
  return `
    <div class="scenario-desc">${step.scenario || step.description || ''}</div>
    <div id="scenarioSteps"></div>`;
}

function setupScenarioBranch(step, index) {
  const questions = step.questions || step.steps || [];
  const container = document.getElementById('scenarioSteps');
  const userChoices = {};       // { qi: oi } — user's picks
  const questionEls = {};       // { qi: <div> } — so we can re-paint after backend validation

  async function showQuestion(qi) {
    if (qi >= questions.length) {
      // Transition banner so the learner gets explicit "we're evaluating now"
      // feedback rather than silently waiting on the server. Removed when the
      // scored panel appears, OR when the 15s timeout fires (safety against
      // stuck-evaluation, user screenshot 2026-04-20).
      const transEl = renderEvaluationTransitionElement(
        `Evaluating your ${questions.length} answer${questions.length === 1 ? '' : 's'}\u2026`
      );
      container.appendChild(transEl);
      transEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

      // Hard 15s failsafe — if validateExercise never resolves, swap the
      // spinner for an actionable error so the learner isn't trapped.
      const stuckTimeout = setTimeout(() => {
        if (transEl && transEl.parentNode) {
          transEl.innerHTML = `
            <span style="color:#f87171; font-size:18px;">\u26a0</span>
            <span style="color:#e8ecf4;">Evaluation is taking longer than usual — the grading service may be down.
              <button onclick="window.location.reload()" style="background:transparent; border:1px solid #4a7cff; color:#4a7cff; padding:4px 10px; border-radius:4px; margin-left:8px; cursor:pointer; font-size:0.85rem;">Reload</button>
            </span>`;
        }
      }, 15000);

      // Show insight if any
      if (step.insight) {
        const insightEl = document.createElement('div');
        insightEl.className = 'scenario-insight';
        insightEl.innerHTML = `<strong>Insight:</strong> ${esc(step.insight)}`;
        container.appendChild(insightEl);
      }

      // Score via backend and THEN re-paint all questions with authoritative feedback.
      // Alex learner review (2026-04-20): reading `opt.correct` from the sanitized step
      // JSON always returns undefined, so every pick used to paint RED even when the
      // backend said 100%. Fix: trust server response, not local option flags.
      try {
        const result = await validateExercise(step.id, 'scenario_branch', { choices: userChoices });
        // Re-paint from result.item_results[]. Clear any stale .picked state first,
        // then set .correct for every correct option (visible teaching — shows what
        // was right even if the learner didn't pick it), and .incorrect for the
        // learner's wrong picks. Rahul-learner review (2026-04-20) found wrong picks
        // stayed blue because `incorrect` wasn't being added — fix: explicitly clear
        // .picked before setting final state so there's no CSS precedence ambiguity.
        const irByStepOption = new Map();
        (result.item_results || []).forEach(ir => {
          irByStepOption.set(`${ir.step_index}:${ir.option_index}`, ir);
        });
        Object.keys(questionEls).forEach(qiKey => {
          const wrapper = questionEls[qiKey];
          if (!wrapper) return;
          const buttons = wrapper.querySelectorAll('.scenario-option');
          const pickedOi = userChoices[String(qiKey)];
          buttons.forEach((btn, oi) => {
            btn.classList.remove('picked');
            const ir = irByStepOption.get(`${qiKey}:${oi}`);
            const isCorrectOption = ir && ir.is_correct;
            const wasLearnerPick = (pickedOi !== undefined && oi === parseInt(pickedOi));
            if (isCorrectOption) {
              btn.classList.add('correct');
            } else if (wasLearnerPick) {
              // Learner picked this, but it's not the correct answer
              btn.classList.add('incorrect');
            }
            // Render inline explanation for the learner's pick + the correct pick
            if (ir && ir.explanation && (isCorrectOption || wasLearnerPick)) {
              if (!wrapper.querySelector(`.scenario-explanation[data-oi="${oi}"]`)) {
                const expEl = document.createElement('div');
                expEl.className = 'scenario-explanation';
                expEl.dataset.oi = String(oi);
                expEl.textContent = ir.explanation;
                // Place after the button for locality
                btn.insertAdjacentElement('afterend', expEl);
              }
            }
          });
        });

        // Remove the "evaluating…" transition now that results are in
        clearTimeout(stuckTimeout);
        if (transEl && transEl.parentNode) transEl.remove();

        // F23 fix 2026-04-21: promoted to a sticky score banner at the TOP of
        // the scenario (not mid-body flow where it scrolled away). Uses the
        // standard score-display color tiers (perfect / partial / low) instead
        // of the scenario-score class which had NO matching CSS — previously
        // rendered as plain unstyled text. 3 tiers: ≥90% perfect (green),
        // 50-89% partial (amber), <50% low (red). Retry hint included when
        // score < 100% and attempts left.
        const scorePct = Math.round((result.score || 0) * 100);
        const tier = scorePct >= 90 ? 'perfect' : (scorePct >= 50 ? 'partial' : 'low');
        const iconByTier = { perfect: '✓', partial: '◐', low: '✗' };
        const totalQs = questions.length;
        const rightCount = Math.round((result.score || 0) * totalQs);
        // Remove any prior score banner so re-runs don't stack
        container.querySelectorAll('.scenario-score-banner').forEach(n => n.remove());
        const scoreEl = document.createElement('div');
        scoreEl.className = `scenario-score-banner score-display ${tier}`;
        scoreEl.style.cssText = `
          position: sticky; top: 8px; z-index: 5;
          margin: 0 0 16px 0; padding: 14px 18px;
          display: flex; align-items: center; gap: 12px;
          font-size: 0.95rem; font-weight: 500;
          box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        `;
        scoreEl.innerHTML = `
          <span style="font-size:1.4rem; line-height:1;">${iconByTier[tier]}</span>
          <span><strong style="font-size:1.15rem;">${scorePct}%</strong>
            <span style="opacity:0.75; margin-left:4px;">· ${rightCount} of ${totalQs} decisions correct</span>
          </span>
          ${result.feedback && !result.correct ? `<span style="margin-left:auto; font-size:0.82rem; font-weight:400; opacity:0.85;">${esc((result.feedback || '').split('\n')[0].slice(0, 140))}</span>` : ''}
        `;
        // Insert at the TOP of the scenario container (above the questions)
        container.insertBefore(scoreEl, container.firstChild);

        if ((result.score || 0) >= 0.5) {
          markStepComplete(state.currentCourse.id, state.currentModule, index, scorePct);
        }
        // Auto-scroll so the learner sees the banner — and then the insight if any
        setTimeout(() => scoreEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      } catch (e) {
        clearTimeout(stuckTimeout);
        if (transEl && transEl.parentNode) transEl.remove();
        // No client-side grading fallback — would require leaking the answer key.
        container.querySelectorAll('.scenario-score-banner').forEach(n => n.remove());
        const scoreEl = document.createElement('div');
        scoreEl.className = 'scenario-score-banner score-display low';
        scoreEl.style.cssText = 'position:sticky; top:8px; z-index:5; margin:0 0 16px 0; padding:14px 18px;';
        scoreEl.textContent = 'Grading unavailable — try again in a moment.';
        container.insertBefore(scoreEl, container.firstChild);
      }
      return;
    }

    const q = questions[qi];
    const div = document.createElement('div');
    div.className = 'scenario-step';
    questionEls[qi] = div;

    // Progress indicator — tells the learner where they are in the scenario
    // (e.g. "Decision 2 of 3") so they know how much is left before evaluation.
    let html = `<div class="scenario-progress" style="font-size:0.76rem; color:var(--text-muted); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px;">Decision ${qi + 1} of ${questions.length}</div>`;
    html += `<div class="scenario-question">${esc(q.question || q.prompt || '')}</div>`;
    html += '<div class="scenario-options">';
    (q.options || []).forEach((opt, oi) => {
      const text = opt.text || opt.label || opt;
      html += `<button class="scenario-option" data-qi="${qi}" data-oi="${oi}">${esc(text)}</button>`;
    });
    html += '</div>';
    div.innerHTML = html;
    container.appendChild(div);
    // User feedback 2026-04-20: when a new decision appears after a click,
    // scroll it into view — otherwise the learner has to hunt for it below
    // the previous (now-disabled) question.
    if (qi > 0) {
      div.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Click handler: mark the selected option with a neutral "picked" style,
    // disable all options in this question, move to next. Correctness paint
    // happens at the end once the backend authoritatively scores.
    div.querySelectorAll('.scenario-option').forEach(btn => {
      btn.addEventListener('click', function () {
        const oi = parseInt(this.dataset.oi);
        userChoices[String(qi)] = oi;
        div.querySelectorAll('.scenario-option').forEach((b, bi) => {
          b.disabled = true;
          if (bi === oi) b.classList.add('picked');  // neutral selected state
        });
        // Move to next question after a short pause so the click feels acknowledged.
        setTimeout(() => { showQuestion(qi + 1); }, 500);
      });
    });
  }

  showQuestion(0);
}

// ===================================================================
// SJT
// ===================================================================
function renderSjtStep(step, index) {
  const options = step.options || [];
  const labels = ['1 = Best', '2 = Second', '3 = Third', '4 = Worst'];

  let html = `<div class="sjt-scenario">${step.scenario || step.description || ''}</div>`;
  html += '<div class="parsons-label">Drag options to rank them</div>';
  html += '<div class="sjt-source" id="sjtSource">';
  const shuffled = shuffle(options.map((o, i) => ({ ...o, origIndex: i })));
  shuffled.forEach((opt, i) => {
    html += `<div class="drag-item" draggable="true" data-sjt-id="${opt.origIndex}" data-text="${escAttr(opt.text || opt.label || '')}">${esc(opt.text || opt.label || '')}</div>`;
  });
  html += '</div>';

  html += '<div class="sjt-slots" id="sjtSlots">';
  for (let i = 0; i < Math.min(options.length, 4); i++) {
    html += `<div class="sjt-slot">
      <div class="sjt-rank-label">${labels[i] || `Rank ${i + 1}`}</div>
      <div class="sjt-drop" data-slot="${i}"><span style="color:var(--text-muted);font-size:0.82rem;">Drop here</span></div>
    </div>`;
  }
  html += '</div>';

  html += `<button class="check-btn" id="sjtCheckBtn" onclick="checkSjt(${index})">Submit Ranking</button>`;
  html += '<div id="sjtResult"></div>';
  return html;
}

async function checkSjt(index) {
  const step = getSteps()[index];
  const options = step.options || [];
  const slots = document.querySelectorAll('#sjtSlots .sjt-drop');
  const ranking = [];

  slots.forEach(slot => {
    const item = slot.querySelector('.drag-item');
    ranking.push(item ? parseInt(item.dataset.sjtId) : -1);
  });

  if (ranking.includes(-1)) {
    document.getElementById('sjtResult').innerHTML = '<div class="score-display low" style="margin-top:12px;">Please rank all options</div>';
    return;
  }

  const btn = document.getElementById('sjtCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    const result = await validateExercise(step.id, 'sjt', { ranking });
    // Wrap the renderer so a render-time throw can't leave the button stuck
    // on "Checking..." (user screenshot 2026-04-21 showed exactly this).
    try {
      displaySjtResults(result, options, ranking, index);
    } catch (renderErr) {
      console.error('displaySjtResults threw:', renderErr);
      const pctTxt = result.score != null ? `${Math.round(result.score * 100)}%` : '—';
      document.getElementById('sjtResult').innerHTML =
        `<div class="score-display partial" style="margin-top:12px;">${esc(pctTxt)}
         ${result.feedback ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.88rem;">${esc(result.feedback.split('\n')[0])}</span>` : ''}
         </div>`;
    }
  } catch (e) {
    // Grading-unavailable message (no client-side fallback — would require a leaked key).
    document.getElementById('sjtResult').innerHTML =
      `<div class="score-display low" style="margin-top:12px;">Grading unavailable — please try again.</div>`;
  } finally {
    // ALWAYS reset the button, even if rendering threw (bulletproof).
    btn.disabled = false;
    btn.innerHTML = 'Submit Ranking';
  }
}

function displaySjtResults(result, options, ranking, index) {
  const results = result.results || result.ranking_results || result.item_results || [];
  let correct = 0;

  const total = ranking.length;
  // REVEAL-GATE AWARENESS (2026-04-20): on attempts 1-2 the server strips
  // `correct_rank` + `explanation`. If no item has correct_rank, skip the
  // per-option reveal (which would show "Your rank: 3" with no correct rank
  // and no explanation — useless) and show the server's retry hint instead.
  const anyHasCorrectRank = results.some(r => r && r.correct_rank != null);
  const hintText = (result.feedback || '').split('\n')[0] || '';
  let html = '';

  // Count correct regardless of reveal path
  ranking.forEach((optIdx, rank) => {
    const r = results[rank] || {};
    if (r.correct ?? false) correct++;
  });

  if (anyHasCorrectRank) {
    // Full-reveal path: per-option breakdown with correct rank + explanation.
    // Defensive null-guards (user browser screenshot 2026-04-21 showed
    // TypeError "Cannot read properties of undefined (reading 'text')" when
    // options[optIdx] was undefined — likely a re-submit with stale ranking
    // or an options array that got filtered. Prefer server's `r.text` over
    // the client-side options lookup; fall back gracefully on both.
    ranking.forEach((optIdx, rank) => {
      const opt = options[optIdx] || {};
      const r = results[rank] || {};
      const optionText = r.text || opt.text || opt.label || `Option ${rank + 1}`;
      const explanation = r.explanation || opt.explanation || '';
      html += `<div class="sjt-result">
        <div class="option-text">${esc(optionText)}</div>
        <div class="ranks">Your rank: ${rank + 1}${r.correct_rank ? ` | Correct rank: ${r.correct_rank}` : ''}</div>
        ${explanation ? `<div class="explanation">${esc(explanation)}</div>` : ''}
      </div>`;
    });
  } else if (hintText) {
    // Reveal-gated: server's retry hint (e.g. "2 more retries before we show the breakdown")
    html += `<div style="margin-top:14px; padding:12px 14px; background:var(--bg-tertiary); border:1px solid var(--border); border-left:3px solid #fbbf24; border-radius:6px; font-size:0.88rem; color:var(--text-secondary); line-height:1.5;">${esc(hintText)}</div>`;
  }

  const pct = total > 0 ? correct / total : 0;
  const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
  // Format score as "N/M correct · XX%" — NEVER raw 0-1 float like "0.67 correct"
  // (user screenshot 2026-04-21 showed the old "0.67 correct" style).
  const serverScorePct = (result.score != null) ? Math.round(result.score * 100) : Math.round(pct * 100);
  html += `<div class="score-display ${cls}" style="margin-top:12px;"><strong>${correct}/${total} correct</strong> &middot; ${serverScorePct}%</div>`;

  document.getElementById('sjtResult').innerHTML = html;

  if (pct >= 0.5) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    if (pct === 1) showCelebration();
  }
}

function renderCodeReviewStep(step, index) {
  const code = step.code || '';
  const lines = code.split('\n');

  let html = '<div class="code-review-editor">';
  html += '<div class="cr-header">Click on lines you think contain bugs</div>';
  lines.forEach((line, i) => {
    html += `<div class="cr-line" data-line="${i + 1}">
      <div class="cr-line-num">${i + 1}</div>
      <div class="cr-line-marker"></div>
      <div class="cr-line-code">${highlightPython(line) || '&nbsp;'}</div>
    </div>`;
  });
  html += '</div>';

  html += `<button class="check-btn" id="crCheckBtn" onclick="checkCodeReview(${index})">Submit Review</button>`;
  html += '<div id="crResult"></div>';
  return html;
}

function setupCodeReview(step, index) {
  document.querySelectorAll('.cr-line').forEach(line => {
    line.addEventListener('click', () => {
      line.classList.toggle('flagged');
      const marker = line.querySelector('.cr-line-marker');
      marker.textContent = line.classList.contains('flagged') ? '&#9679;' : '';
      marker.innerHTML = line.classList.contains('flagged') ? '&#9679;' : '';
    });
  });
}

async function checkCodeReview(index) {
  const step = getSteps()[index];
  const bugs = step.bugs || step.issues || [];
  const flaggedLines = new Set();

  document.querySelectorAll('.cr-line.flagged').forEach(el => {
    flaggedLines.add(parseInt(el.dataset.line));
  });

  const btn = document.getElementById('crCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  try {
    const result = await validateExercise(step.id, 'code_review', { flagged_lines: Array.from(flaggedLines) });
    try {
      displayCodeReviewResults(result, bugs, flaggedLines, index);
    } catch (renderErr) {
      console.error('displayCodeReviewResults threw:', renderErr);
      const pctTxt = result.score != null ? `${Math.round(result.score * 100)}%` : '—';
      document.getElementById('crResult').innerHTML =
        `<div class="score-display partial" style="margin-top:12px;">${esc(pctTxt)}
         ${result.feedback ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.88rem;">${esc((result.feedback || '').split('\n')[0])}</span>` : ''}
         </div>`;
    }
  } catch (e) {
    // Server unreachable. Don't fall back to client-side grading — bugs
    // metadata on step is sanitizer-stripped, would silently produce wrong
    // scores. Show a grading-unavailable banner and let the learner retry.
    document.getElementById('crResult').innerHTML = `<div class="score-display low" style="margin-top:12px;">Grading service unavailable. Please try again.</div>`;
  } finally {
    // ALWAYS reset (bulletproof-finally pattern, 2026-04-21)
    btn.disabled = false;
    btn.innerHTML = 'Submit Review';
  }
}

function displayCodeReviewResults(result, bugs, flaggedLines, index) {
  // Prefer backend's item_results (which knows which bugs the user flagged vs missed),
  // with correctness text already computed. Alex learner review 2026-04-20 found the
  // prior code showed "1 bugs found" on a perfect 8/8 submission because it tried to
  // display `result.score` (a 0-1 float) as the count.
  const itemResults = result.item_results || result.bugs || result.results || [];

  // REVEAL-GATE AWARENESS (user screenshot 2026-04-20): on attempt 1-2 with
  // wrong submissions, the server strips `line` / `description` / `hint` from
  // item_results so the learner doesn't see the answer key. When reveal is
  // gated, skip per-bug rendering and show score + retry hint only.
  const anyHasLineInfo = itemResults.some(b =>
    (b.line != null || b.line_number != null) &&
    (b.description || b.issue || b.hint)
  );

  let html = '';

  // Server-authoritative found-count. Server knows which lines the learner
  // flagged, so if item_results has per-bug `found_by_user`/`found`, use that.
  // If item_results is gated/opaque, derive found from the score (source of truth).
  const totalBugs = itemResults.length || (bugs && bugs.length) || (result.total_bugs || 0);
  let found;
  if (anyHasLineInfo) {
    found = itemResults.reduce((acc, b) => {
      const was = (b.found_by_user !== undefined) ? b.found_by_user
        : (b.found !== undefined ? b.found
        : (b.correct !== undefined ? b.correct
        : (b.is_correct !== undefined ? b.is_correct : null)));
      if (was !== null) return acc + (was ? 1 : 0);
      const ln = b.line || b.line_number;
      return acc + ((ln != null && flaggedLines.has(ln)) ? 1 : 0);
    }, 0);
  } else {
    // F4 fix 2026-04-21: on the gated path, item_results is opaque (`[{}, {}, {}]`)
    // so the prior reduce always returned 0 — produced the "0/3 bugs found · 33%"
    // contradiction the user flagged. Instead, round the score to a found count.
    found = totalBugs > 0 ? Math.round((result.score || 0) * totalBugs) : 0;
  }

  if (anyHasLineInfo) {
    // Full-reveal path: render per-bug details
    itemResults.forEach(bug => {
      const bugLine = bug.line || bug.line_number;
      if (bugLine == null) return;
      const wasFound = (bug.found_by_user !== undefined)
        ? bug.found_by_user
        : (bug.found !== undefined ? bug.found : flaggedLines.has(bugLine));
      html += `<div class="cr-result ${wasFound ? 'found' : 'missed'}">
        <div class="bug-line">${wasFound ? '&#10003; Found' : '&#10007; Missed'} - Line ${bugLine}</div>
        <div class="bug-issue">${esc(bug.issue || bug.description || '')}</div>
        ${bug.hint ? `<div class="bug-hint">Hint: ${esc(bug.hint)}</div>` : ''}
      </div>`;
    });
  }

  const pct = totalBugs > 0 ? found / totalBugs : 0;
  const cls = pct === 1 ? 'perfect' : pct >= 0.5 ? 'partial' : 'low';
  const scorePct = (result.score != null) ? Math.round(result.score * 100) : Math.round(pct * 100);

  // Score banner. If reveal is gated, carry the server's retry hint text.
  const firstFeedbackLine = (result.feedback || '').split('\n')[0] || '';
  html += `<div class="score-display ${cls}" style="margin-top:12px;">
    <strong>${found} / ${totalBugs} bugs found</strong> &middot; ${scorePct}%
    ${firstFeedbackLine ? `<br><span style="font-weight:400; color:var(--text-muted); font-size:0.88rem;">${esc(firstFeedbackLine)}</span>` : ''}
  </div>`;

  document.getElementById('crResult').innerHTML = html;

  // F4 fix 2026-04-21: update the in-code line markers so correct clicks turn
  // green and wrong clicks turn bright-red — previously ALL flagged lines kept
  // the same coral-red tint regardless of correctness (user report on /40/3).
  // Compute the canonical bug-line set from item_results (when revealed) so we
  // can color BOTH hit-clicks AND missed-click lines correctly.
  const correctBugLines = new Set();
  itemResults.forEach(b => {
    const ln = b.line || b.line_number;
    if (ln != null) correctBugLines.add(Number(ln));
  });
  document.querySelectorAll('.cr-line.flagged').forEach(el => {
    el.classList.remove('correct-click', 'wrong-click');
    const ln = Number(el.dataset.line);
    if (!correctBugLines.size) return;  // gated path — no per-line info to color
    if (correctBugLines.has(ln)) {
      el.classList.add('correct-click');
    } else {
      el.classList.add('wrong-click');
    }
  });

  if (pct >= 0.5) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    if (pct === 1) showCelebration();
  }
}

function renderMcqStep(step, index) {
  const options = step.options || [];
  let html = `<div class="mcq-question">${esc(step.question || '')}</div>`;
  html += '<div class="mcq-options" id="mcqOptions">';
  options.forEach((opt, i) => {
    const text = opt.text || opt.label || opt;
    html += `<div class="mcq-option" data-index="${i}">
      <div class="mcq-radio"></div>
      <div>${esc(text)}</div>
    </div>`;
  });
  html += '</div>';
  html += `<button class="check-btn" id="mcqCheckBtn" onclick="checkMcq(${index})" disabled>Check Answer</button>`;
  html += '<div id="mcqResult"></div>';
  return html;
}

function setupMcq(step, index) {
  let selected = -1;
  document.querySelectorAll('.mcq-option').forEach(opt => {
    opt.addEventListener('click', () => {
      if (opt.classList.contains('disabled')) return;
      document.querySelectorAll('.mcq-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selected = parseInt(opt.dataset.index);
      document.getElementById('mcqCheckBtn').disabled = false;
    });
  });
}

async function checkMcq(index) {
  const step = getSteps()[index];
  const options = step.options || [];
  const selectedEl = document.querySelector('.mcq-option.selected');
  if (!selectedEl) return;
  const selectedIndex = parseInt(selectedEl.dataset.index);

  const btn = document.getElementById('mcqCheckBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking...';

  // Disable all options
  document.querySelectorAll('.mcq-option').forEach(o => o.classList.add('disabled'));

  try {
    const result = await validateExercise(step.id, 'mcq', { answer: selectedIndex });
    displayMcqResult(result, options, selectedIndex, index);
  } catch (e) {
    // Fallback: check locally
    const correctIndex = options.findIndex(o => o.correct || o.is_correct);
    const isCorrect = selectedIndex === correctIndex;
    displayMcqResultLocal(isCorrect, options, selectedIndex, correctIndex, index);
  }

  btn.innerHTML = 'Check Answer';
}

function displayMcqResult(result, options, selectedIndex, index) {
  const isCorrect = result.correct ?? false;
  const correctIdx = result.correct_index ?? options.findIndex(o => o.correct || o.is_correct);

  document.querySelectorAll('.mcq-option').forEach((opt, i) => {
    if (i === selectedIndex && !isCorrect) opt.classList.add('incorrect-answer');
    if (i === correctIdx || (i === selectedIndex && isCorrect)) opt.classList.add('correct-answer');
  });

  const explanation = result.explanation || options[selectedIndex]?.explanation || '';
  if (explanation) {
    document.getElementById('mcqResult').innerHTML = `
      <div class="mcq-explanation ${isCorrect ? 'correct' : 'incorrect'}">${esc(explanation)}</div>`;
  }

  if (isCorrect) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    showCelebration();
  }
}

function displayMcqResultLocal(isCorrect, options, selectedIndex, correctIndex, index) {
  document.querySelectorAll('.mcq-option').forEach((opt, i) => {
    if (i === selectedIndex && !isCorrect) opt.classList.add('incorrect-answer');
    if (i === correctIndex || (i === selectedIndex && isCorrect)) opt.classList.add('correct-answer');
  });

  const explanation = options[selectedIndex]?.explanation || '';
  if (explanation || !isCorrect) {
    const correctText = options[correctIndex]?.text || options[correctIndex]?.label || '';
    document.getElementById('mcqResult').innerHTML = `
      <div class="mcq-explanation ${isCorrect ? 'correct' : 'incorrect'}">
        ${isCorrect ? '&#10003; Correct!' : `&#10007; Incorrect. The correct answer is: ${esc(correctText)}`}
        ${explanation ? `<br><br>${esc(explanation)}` : ''}
      </div>`;
  }

  if (isCorrect) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    showCelebration();
  }
}

function renderSystemBuildStep(step, index) {
  const mission = step.mission || step.title || 'System Build';

  // step.content is rendered by the unified briefing panel above (E.1 fix

  html += '<div class="sb-mission">';
  html += '<div class="sb-mission-label">Mission Briefing</div>';
  html += `<div class="sb-mission-name">${esc(mission)}</div>`;
  if (missionDesc) {
    // Mission description is HTML from course data — render as HTML, not escaped text
    html += `<div class="sb-mission-desc">${missionDesc}</div>`;
  }

  // --- Starter Code (the main body) ---
  if (starterCode) {
    html += '<div class="sb-section-title" style="margin-top:20px;">Starter Code</div>';
    html += '<div class="sb-starter-code" id="sbStarterCode">';

    html += '</div>';
    html += '<div class="code-actions" style="margin-top:12px;">';
    html += `<button class="run-btn" id="runBtn" onclick="onRunCode(${index})">&#9654; Run in Sandbox</button>`;
    html += '<span style="color:var(--text-muted); font-size:0.82rem; margin-left:12px;">This starter runs in a sandbox with mocks. For the real deployment, run it on your machine or cloud.</span>';
    html += '</div>';
    html += '<div class="output-panel" id="outputPanel" style="display:none;">';
    html += '<div class="output-label">Output</div>';
    html += '<pre class="output-content" id="outputContent"></pre>';
    html += '</div>';
  }

  // --- Deployment Config ---
  if (deploymentConfig) {
    html += '<div class="sb-section-title" style="margin-top:20px;">Deployment Target</div>';
    html += '<div class="sb-deployment-config">';
    if (deploymentConfig.platform) {
      html += `<div><strong>Platform:</strong> ${esc(deploymentConfig.platform)}${deploymentConfig.service ? ' / ' + esc(deploymentConfig.service) : ''}</div>`;
    }
    if (deploymentConfig.infra_hint) {
      html += `<div style="margin-top:8px; color:var(--text-secondary);">${esc(deploymentConfig.infra_hint)}</div>`;
    }
    if (deploymentConfig.dockerfile) {
      html += '<details style="margin-top:10px;"><summary style="cursor:pointer; color:var(--accent);">View Dockerfile</summary>';
      html += `<pre style="background:var(--bg-tertiary); padding:12px; border-radius:6px; font-size:0.78rem; overflow-x:auto; margin-top:8px;">${esc(deploymentConfig.dockerfile)}</pre>`;
      html += '</details>';
    }
    if (deploymentConfig.requirements) {
      html += '<details style="margin-top:8px;"><summary style="cursor:pointer; color:var(--accent);">View requirements.txt</summary>';
      html += `<pre style="background:var(--bg-tertiary); padding:12px; border-radius:6px; font-size:0.78rem; overflow-x:auto; margin-top:8px;">${esc(deploymentConfig.requirements)}</pre>`;
      html += '</details>';
    }
    html += '</div>';
  }

  if (requirements.length) {
    html += '<div class="sb-requirements">';
    html += '<div class="sb-section-title">Requirements</div>';
    html += '<ul class="sb-req-list">';
    requirements.forEach(r => { html += `<li>${esc(r)}</li>`; });
    html += '</ul></div>';
  }

  if (techStack.length) {
    html += '<div class="sb-section-title">Tech Stack</div>';
    html += '<div class="sb-tech-stack">';
    techStack.forEach(t => { html += `<span class="sb-tech-badge">${esc(t)}</span>`; });
    html += '</div>';
  }

  if (architecture) {
    html += '<div class="sb-section-title" style="margin-top:16px;">Architecture</div>';
    html += `<pre style="color:var(--text-secondary);font-size:0.78rem;line-height:1.5;margin-top:4px;overflow-x:auto;">${esc(architecture)}</pre>`;
  }

  html += '</div>'; // end sb-mission

  // --- Phase Tracker ---
  if (phases.length) {
    html += '<div class="sb-phases">';
    html += '<div class="sb-section-title">Build Phases</div>';
    html += '<div class="sb-phase-track">';
    phases.forEach((_, i) => {
      html += `<div class="sb-phase-bar" id="sbPhaseBar${i}"></div>`;
    });
    html += '</div>';

    phases.forEach((phase, i) => {
      const phaseCode = phase.starter_code || '';
      html += `<div class="sb-phase-card" id="sbPhaseCard${i}">`;
      html += `<div class="sb-phase-header" data-phase="${i}">`;
      html += `<div class="sb-phase-check" id="sbPhaseCheck${i}" data-phase="${i}"></div>`;
      html += `<div class="sb-phase-title">${esc(phase.title || 'Phase ' + (i + 1))}</div>`;
      html += `<div class="sb-phase-num">Phase ${phase.id || i + 1}</div>`;
      html += '</div>';
      html += `<div class="sb-phase-body" id="sbPhaseBody${i}">`;
      html += `<div class="sb-phase-instructions">${esc(phase.description || '')}</div>`;
      if (phase.instructions) {
        html += `<div class="sb-phase-instructions" style="color:var(--text-primary);">${esc(phase.instructions)}</div>`;
      }
      if (phaseCode) {
        html += `<div id="sbPhaseEditor${i}" style="margin-top:12px;">`;
        html += renderCodeEditor(phaseCode, index, false);
        html += '</div>';
      }
      html += '</div>'; // end sb-phase-body
      html += '</div>'; // end sb-phase-card
    });
    html += '</div>'; // end sb-phases
  }

  // --- Deployment Checklist ---
  if (checklist.length) {
    html += '<div class="sb-checklist">';
    html += '<div class="sb-section-title">Deployment Checklist</div>';
    checklist.forEach(item => {
      html += `<div class="sb-checklist-item" data-checklist-id="${escAttr(item.id)}">`;
      html += '<div class="sb-checklist-box"></div>';
      html += `<div>${esc(item.label)}</div>`;
      html += '</div>';
    });
    html += '</div>';
  }

  // --- Verification Panel ---
  // v8.6.2 (2026-04-24) — mode-switched submit UI based on validation shape.
  // ZERO-CODE capstone (validation.rubric present) → paste-markdown textarea.
  // GHA capstone (validation.gha_workflow_check) → GitHub Actions run URL input.
  // ENDPOINT capstone (validation.endpoint_check) → live endpoint URL input.
  // Generic for all system_build courses — no hardcoding per course.
  const _sbVal = step.validation || {};
  const _sbHasRubric = typeof _sbVal.rubric === 'string' && _sbVal.rubric.trim();
  const _sbHasGha = _sbVal.gha_workflow_check && typeof _sbVal.gha_workflow_check === 'object';
  const _sbHasEndpoint = _sbVal.endpoint_check && typeof _sbVal.endpoint_check === 'object';
  const _sbPastePrompt = (step.demo_data && step.demo_data.paste_prompt) || 'Paste your complete deliverable (markdown, plaintext, or prompt library) below.';

  html += '<div class="sb-verify-panel">';
  html += '<div class="sb-verify-title">Submit Your Deliverable</div>';
  if (_sbHasRubric) {
    // Zero-code: markdown paste textarea.
    html += `<div style="color:var(--text-secondary); font-size:0.85rem; margin:6px 0 10px;">${esc(_sbPastePrompt)}</div>`;
    html += '<textarea id="sbPasteMarkdown" rows="14" placeholder="# Your Team Prompt Library&#10;&#10;## Template 1: ...&#10;&#10;(paste your full doc here)"'
      + ' style="width:100%; background:#0e1218; color:#e8ecf4; border:1px solid #2a3352; border-radius:6px; padding:12px; font-family: ui-sans-serif, system-ui; font-size:0.9rem; line-height:1.5; resize:vertical; min-height:280px;"></textarea>';
    html += '<div class="sb-deploy-status" id="sbDeployStatus" style="margin-top:8px;">';
    html += '<div class="sb-status-dot" id="sbStatusDot"></div>';
    html += '<span id="sbStatusText">Paste your doc above, then click Submit to grade against the rubric.</span>';
    html += '</div>';
  } else if (_sbHasGha) {
    // GHA capstone: run URL input.
    html += '<div style="color:var(--text-secondary); font-size:0.85rem; margin:6px 0 10px;">Paste the GitHub Actions RUN URL (e.g. <code>https://github.com/your/repo/actions/runs/1234567</code>).</div>';
    html += '<input type="text" class="sb-endpoint-input" id="sbWorkflowUrl" placeholder="https://github.com/<your>/<fork>/actions/runs/<id>" />';
    html += '<div class="sb-deploy-status" id="sbDeployStatus">';
    html += '<div class="sb-status-dot" id="sbStatusDot"></div>';
    html += '<span id="sbStatusText">Awaiting GHA run URL…</span>';
    html += '</div>';
  } else {
    // Endpoint capstone or legacy: endpoint URL input.
    html += '<input type="text" class="sb-endpoint-input" id="sbEndpointUrl" placeholder="https://your-deployment.example.com" />';
    html += '<div class="sb-deploy-status" id="sbDeployStatus">';
    html += '<div class="sb-status-dot" id="sbStatusDot"></div>';
    html += '<span id="sbStatusText">Awaiting deployment URL...</span>';
    html += '</div>';
  }
  html += '</div>';

  html += `<button class="sb-submit-btn" id="sbSubmitBtn" onclick="submitSystemBuild(${index})">${_sbHasRubric ? 'Submit Deliverable' : 'Submit Build'}</button>`;
  html += '<div id="sbResult"></div>';

  html += '</div>'; // end system-build
  return html;
}

function setupSystemBuild(step, index) {
  // Initialize the main code editor for the starter code if present
  if (step.code) {
    setupCodeEditor(step, index);
  }
  const phases = step.phases || [];

  // Phase header toggles
  document.querySelectorAll('.sb-phase-header').forEach(header => {
    header.addEventListener('click', function(e) {
      // Don't toggle if clicking the check circle
      if (e.target.classList.contains('sb-phase-check')) return;
      const pi = parseInt(this.dataset.phase);
      const body = document.getElementById('sbPhaseBody' + pi);
      if (body) body.classList.toggle('open');
    });
  });

  // Phase check toggles
  document.querySelectorAll('.sb-phase-check').forEach(check => {
    check.addEventListener('click', function() {
      const pi = parseInt(this.dataset.phase);
      this.classList.toggle('checked');
      const isChecked = this.classList.contains('checked');
      this.innerHTML = isChecked ? '&#10003;' : '';

      const card = document.getElementById('sbPhaseCard' + pi);
      const bar = document.getElementById('sbPhaseBar' + pi);
      if (card) {
        card.classList.toggle('completed', isChecked);
        card.classList.remove('active');
      }
      if (bar) {
        bar.classList.toggle('completed', isChecked);
        bar.classList.remove('active');
      }

      // Set next incomplete phase as active
      updateActivePhase(phases.length);
    });
  });

  // Checklist item toggles
  document.querySelectorAll('.sb-checklist-item').forEach(item => {
    item.addEventListener('click', function() {
      this.classList.toggle('checked');
      const box = this.querySelector('.sb-checklist-box');
      if (this.classList.contains('checked')) {
        box.innerHTML = '&#10003;';
      } else {
        box.innerHTML = '';
      }
    });
  });

  // Endpoint URL status updates
  const urlInput = document.getElementById('sbEndpointUrl');
  if (urlInput) {
    urlInput.addEventListener('input', function() {
      const dot = document.getElementById('sbStatusDot');
      const text = document.getElementById('sbStatusText');
      if (this.value.trim().startsWith('http')) {
        dot.className = 'sb-status-dot pending';
        text.textContent = 'Endpoint provided - ready to verify';
      } else {
        dot.className = 'sb-status-dot';
        text.textContent = 'Awaiting deployment URL...';
      }
    });
  }

  // Open first phase by default and set it active
  if (phases.length) {
    const firstBody = document.getElementById('sbPhaseBody0');
    const firstCard = document.getElementById('sbPhaseCard0');
    const firstBar = document.getElementById('sbPhaseBar0');
    if (firstBody) firstBody.classList.add('open');
    if (firstCard) firstCard.classList.add('active');
    if (firstBar) firstBar.classList.add('active');
  }
}

function updateActivePhase(totalPhases) {
  let firstIncomplete = -1;
  for (let i = 0; i < totalPhases; i++) {
    const check = document.getElementById('sbPhaseCheck' + i);
    const card = document.getElementById('sbPhaseCard' + i);
    const bar = document.getElementById('sbPhaseBar' + i);
    if (check && !check.classList.contains('checked')) {
      if (firstIncomplete === -1) {
        firstIncomplete = i;
        if (card) card.classList.add('active');
        if (bar) bar.classList.add('active');
      }
    } else {
      if (card) card.classList.remove('active');
      if (bar) bar.classList.remove('active');
    }
  }
}

async function submitSystemBuild(index) {
  const step = getSteps()[index];
  const phases = step.phases || [];
  const checklist = step.checklist || [];

  // Gather phase completion
  const phasesCompleted = [];
  phases.forEach((phase, i) => {
    const check = document.getElementById('sbPhaseCheck' + i);
    if (check && check.classList.contains('checked')) {
      phasesCompleted.push(phase.id || i + 1);
    }
  });

  // Gather checklist completion
  const checklistData = {};
  document.querySelectorAll('.sb-checklist-item').forEach(item => {
    const id = item.dataset.checklistId;
    checklistData[id] = item.classList.contains('checked');
  });

  // v8.6.2 (2026-04-24) — mode-aware submission gathering.
  // Pick up whichever of the three input kinds is present in the DOM:
  //   - #sbPasteMarkdown (zero-code rubric capstone)
  //   - #sbWorkflowUrl   (GHA run URL)
  //   - #sbEndpointUrl   (endpoint_check live URL)
  const pasteMarkdown = (document.getElementById('sbPasteMarkdown')?.value || '').trim();
  const workflowRunUrl = (document.getElementById('sbWorkflowUrl')?.value || '').trim();
  const endpointUrl = (document.getElementById('sbEndpointUrl')?.value || '').trim();

  const btn = document.getElementById('sbSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = pasteMarkdown ? 'Grading…' : 'Deploying...';

  const responseData = {
    checklist: checklistData,
    phases_completed: phasesCompleted,
    endpoint_url: endpointUrl || undefined,
    workflow_run_url: workflowRunUrl || undefined,
    // Backend accepts paste_markdown / paste / submission aliases.
    paste_markdown: pasteMarkdown || undefined,
  };

  try {
    const result = await validateExercise(step.id, 'system_build', responseData);
    displaySystemBuildResult(result, phasesCompleted, phases, checklist, index);
  } catch (e) {
    // Fallback: local scoring
    const totalPhases = phases.length;
    const completedPhases = phasesCompleted.length;
    const totalChecklist = checklist.length;
    const completedChecklist = Object.values(checklistData).filter(Boolean).length;

    const phaseScore = totalPhases > 0 ? completedPhases / totalPhases : 0;
    const checkScore = totalChecklist > 0 ? completedChecklist / totalChecklist : 0;
    const totalScore = (phaseScore * 0.6) + (checkScore * 0.4);

    const cls = totalScore >= 0.9 ? 'perfect' : totalScore >= 0.5 ? 'partial' : 'low';
    let fb = `<div class="score-display ${cls}" style="margin-top:12px;">Score: ${Math.round(totalScore * 100)}%</div>`;
    fb += `<div style="margin-top:8px;font-size:0.85rem;color:var(--text-secondary);">`;
    fb += `Phases: ${completedPhases}/${totalPhases} | Checklist: ${completedChecklist}/${totalChecklist}`;
    if (endpointUrl) fb += ` | Endpoint: ${esc(endpointUrl)}`;
    fb += '</div>';

    if (completedPhases < totalPhases) {
      const missing = phases.filter((_, i) => !phasesCompleted.includes(i + 1)).map(p => p.title);
      fb += `<div style="margin-top:8px;font-size:0.82rem;color:var(--warning);">Missing phases: ${missing.join(', ')}</div>`;
    }

    document.getElementById('sbResult').innerHTML = fb;

    if (totalScore >= 0.7) {
      markStepComplete(state.currentCourse.id, state.currentModule, index);
      if (totalScore >= 0.9) showCelebration();
    }
  }

  btn.disabled = false;
  btn.innerHTML = 'Submit Build';
}

function displaySystemBuildResult(result, phasesCompleted, phases, checklist, index) {
  const score = result.score ?? 0;
  const feedback = result.feedback || '';
  const correct = result.correct ?? false;
  const cls = score >= 0.9 ? 'perfect' : score >= 0.5 ? 'partial' : 'low';

  let html = `<div class="score-display ${cls}" style="margin-top:12px;">Score: ${Math.round(score * 100)}%</div>`;
  if (feedback) {
    html += `<div style="margin-top:8px;font-size:0.85rem;color:var(--text-secondary);white-space:pre-wrap;">${esc(feedback)}</div>`;
  }

  document.getElementById('sbResult').innerHTML = html;

  const dot = document.getElementById('sbStatusDot');
  if (correct && dot) {
    dot.className = 'sb-status-dot ready';
    document.getElementById('sbStatusText').textContent = 'Build verified!';
  }

  if (score >= 0.7) {
    markStepComplete(state.currentCourse.id, state.currentModule, index);
    if (correct) showCelebration();
  }
}

let _roleplaySession = null;

function setupAdaptiveRoleplay(step, index) {
  _roleplaySession = { sessionId: null, stepId: step.id, turnCount: 0, turnLimit: 15, active: false };
  const inp = document.getElementById('roleplayInput');
  if (inp) {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendRoleplayTurn(index);
      }
    });
  }
}

async function startAdaptiveRoleplay(index) {
  const startBtn = document.getElementById('roleplayStartBtn');
  startBtn.disabled = true;
  startBtn.textContent = 'Starting...';
  const step = getSteps()[index];
  try {
    const res = await fetch(`${API}/roleplay/start`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({step_id: step.id}),
    });
    if (!res.ok) throw new Error(`Roleplay start failed: ${res.status}`);
    const data = await res.json();
    _roleplaySession = {
      sessionId: data.session_id, stepId: step.id, turnCount: 0,
      turnLimit: data.turn_limit || 15, active: true, messages: [],
    };
    const chat = document.getElementById('roleplayChat');
    chat.innerHTML = '';
    appendRoleplayMessage('assistant', data.opening_message || 'Hello. How can I help?');
    document.getElementById('roleplayInput').style.display = 'block';
    document.getElementById('roleplaySendBtn').style.display = 'block';
    document.getElementById('roleplayStartBtn').style.display = 'none';
    document.getElementById('roleplayTurnIndicator').style.display = 'block';
    document.getElementById('roleplayTurnN').textContent = '0';
    document.getElementById('roleplayTurnLimit').textContent = _roleplaySession.turnLimit;
    document.getElementById('roleplayInput').focus();
  } catch (e) {
    startBtn.disabled = false;
    startBtn.textContent = 'Retry — Start Roleplay';
    appendRoleplayMessage('assistant', `(Error: ${e.message})`);
  }
}

async function sendRoleplayTurn(index) {
  if (!_roleplaySession || !_roleplaySession.active) return;
  const inp = document.getElementById('roleplayInput');
  const msg = inp.value.trim();
  if (!msg) return;
  const sendBtn = document.getElementById('roleplaySendBtn');
  inp.value = '';
  sendBtn.disabled = true;
  appendRoleplayMessage('user', msg);
  const thinkingEl = appendRoleplayMessage('assistant', '...', true);
  try {
    const res = await fetch(`${API}/roleplay/turn`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: _roleplaySession.sessionId, message: msg}),
    });
    if (!res.ok) throw new Error(`Turn failed: ${res.status}`);
    const data = await res.json();
    thinkingEl.remove();
    appendRoleplayMessage('assistant', data.reply);
    _roleplaySession.turnCount = data.turn;
    document.getElementById('roleplayTurnN').textContent = data.turn;
    if (data.outcome && data.outcome !== 'continue') {
      _roleplaySession.active = false;
      inp.disabled = true;
      sendBtn.disabled = true;
      if (data.debrief) showRoleplayDebrief(data.outcome, data.debrief, index);
    }
  } catch (e) {
    thinkingEl.remove();
    appendRoleplayMessage('assistant', `(Error: ${e.message})`);
  } finally {
    sendBtn.disabled = !_roleplaySession.active;
  }
}

function appendRoleplayMessage(role, text, isPlaceholder) {
  const chat = document.getElementById('roleplayChat');
  if (chat.querySelector('.roleplay-empty')) chat.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'roleplay-msg ' + role;
  el.innerHTML = `<div class="who">${role === 'user' ? 'You' : 'Counterparty'}</div>${esc(text)}`;
  if (isPlaceholder) el.style.opacity = '0.6';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

// Recognize outcome families so Creator-generated unique outcomes still map to color + sentiment.
function _classifyOutcome(outcome) {
  const s = (outcome || '').toLowerCase();
  const WIN = ['concede','agree','approve','accept','align','ready_for','commit_to_phased','phased'];
  const LOSE = ['walk_away','walkaway','escalate','hostile','reject','end_meeting','abruptly',
                'demand_immediate','cut_meeting_short','shut_down','threaten','guarded',
                'openly_hostile','defensive','postponement','skeptical_and_curt','become_hostile'];
  if (WIN.some(k => s.includes(k))) return 'win';
  if (LOSE.some(k => s.includes(k))) return 'lose';
  if (s === 'timeout' || s === 'continue') return 'neutral';
  return 'neutral';
}

function _humanizeOutcome(outcome) {
  const canonical = {
    concede: 'Success — counterparty conceded',
    escalate: 'Counterparty escalated',
    escalate_to_ceo: 'Escalated past you to leadership',
    walk_away: 'Counterparty walked away',
    timeout: 'Turn limit reached — conversation stalled',
  };
  if (canonical[outcome]) return canonical[outcome];
  // Fallback: humanize snake_case (escalate_CTO → "Escalate CTO"; become_openly_hostile → "Become Openly Hostile")
  return (outcome || 'unknown')
    .replace(/_/g, ' ')
    .replace(/\b([a-z])/g, (m, c) => c.toUpperCase());
}

function showRoleplayDebrief(outcome, debrief, index) {
  const el = document.getElementById('roleplayDebrief');
  const score = Math.round((debrief.score || 0) * 100);
  const family = _classifyOutcome(outcome);
  const label = _humanizeOutcome(outcome);
  let html = `<div class="roleplay-debrief-label">Session Debrief</div>`;
  html += `<div class="roleplay-outcome ${family}" data-outcome="${esc(outcome)}">${esc(label)}</div>`;
  html += `<div class="roleplay-debrief-score">Score: ${score}%</div>`;
  html += `<div style="color:var(--text-secondary); font-size:0.88rem; margin-bottom:10px;">Turns used: ${debrief.turns_used || 0}</div>`;

  // Score breakdown (added 2026-04-19 after scorer was rewritten to 3-component weighted sum).
  // Teaches learners WHY they got their score — which lever to pull to improve next time.
  const bd = debrief.score_breakdown || null;
  if (bd) {
    const out = Math.round((bd.outcome_component || 0) * 100);
    const flo = Math.round((bd.state_floor_component || 0) * 100);
    const tra = Math.round((bd.trajectory_component || 0) * 100);
    html += `<div class="roleplay-breakdown" style="margin:8px 0 12px; padding:10px 12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:6px;">`;
    html += `<div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:6px;"><strong style="color:var(--text-primary);">Score breakdown</strong> — where your points came from</div>`;
    html += `<div class="roleplay-traj-row"><span style="color:var(--text-secondary);">Outcome (×0.5)</span><span><strong>${out}%</strong> <span style="color:var(--text-tertiary); font-size:0.8rem;">of 50</span></span></div>`;
    html += `<div class="roleplay-traj-row"><span style="color:var(--text-secondary);">Final state floor (×0.3)</span><span><strong>${flo}%</strong> <span style="color:var(--text-tertiary); font-size:0.8rem;">of 30</span></span></div>`;
    html += `<div class="roleplay-traj-row"><span style="color:var(--text-secondary);">Trajectory improvement (×0.2)</span><span><strong>${tra}%</strong> <span style="color:var(--text-tertiary); font-size:0.8rem;">of 20</span></span></div>`;
    html += `</div>`;
  }

  if (debrief.state_trajectory && debrief.state_trajectory.length) {
    html += `<div class="roleplay-trajectory"><strong style="color:var(--text-primary); font-size:0.85rem;">Counterparty State Trajectory</strong>`;
    debrief.state_trajectory.forEach(t => {
      const deltaClass = t.delta > 0 ? 'pos' : t.delta < 0 ? 'neg' : 'neutral';
      const deltaStr = t.delta > 0 ? `+${t.delta}` : `${t.delta}`;
      html += `<div class="roleplay-traj-row"><span>${esc(t.dimension)}</span><span>${t.start} → ${t.end} <span class="roleplay-traj-delta-${deltaClass}">(${deltaStr})</span></span></div>`;
    });
    html += `</div>`;
  }
  if (debrief.rubric_tags && debrief.rubric_tags.length) {
    html += `<div style="margin-top:12px; font-size:0.85rem; color:var(--text-secondary);"><strong>Skills exercised:</strong> ${debrief.rubric_tags.join(', ')}</div>`;
  }
  el.innerHTML = html;
  el.style.display = 'block';
  if (score >= 50 && state.currentCourse) {
    markStepComplete(state.currentCourse.id, state.currentModule, index, score);
  }
}

let _vmiSession = null;
let _vmiRecognition = null;
let _vmiIsRecording = false;

function setupVoiceInterview(step, index) {
  _vmiSession = { sessionId: null, stepId: step.id, turnCount: 0, turnLimit: step.demo_data?.turn_limit || 12, active: false };
  // Warm up SpeechRecognition capability detection
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const status = document.getElementById('vmiStatus');
  if (!SR) {
    if (status) status.textContent = '⚠ Mic-based speech recognition not available in this browser. You can still type answers — they will be evaluated the same way.';
  }
  const ta = document.getElementById('vmiTextFallback');
  if (ta) {
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault(); sendVmiTurn(index);
      }
    });
  }
}

async function startVoiceInterview(index) {
  const startBtn = document.getElementById('vmiStartBtn');
  startBtn.disabled = true; startBtn.textContent = 'Starting...';
  const step = getSteps()[index];
  try {
    const res = await fetch(`${API}/roleplay/start`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({step_id: step.id}),
    });
    if (!res.ok) throw new Error(`Voice interview start failed: ${res.status}`);
    const data = await res.json();
    _vmiSession = { sessionId: data.session_id, stepId: step.id, turnCount: 0, turnLimit: data.turn_limit || 12, active: true };
    document.getElementById('vmiActiveRow').style.display = 'flex';
    startBtn.style.display = 'none';
    const chat = document.getElementById('vmiTranscript');
    chat.innerHTML = '';
    _vmiAppendMsg('assistant', data.opening_message, true);
    document.getElementById('vmiTurnIndicator').style.display = 'block';
    document.getElementById('vmiTurnN').textContent = '0';
    document.getElementById('vmiTurnLimit').textContent = _vmiSession.turnLimit;
  } catch (e) {
    startBtn.disabled = false;
    startBtn.textContent = 'Start Interview';
    document.getElementById('vmiStatus').textContent = `Error: ${e.message}`;
  }
}

function _vmiAppendMsg(role, text, speak=false) {
  const chat = document.getElementById('vmiTranscript');
  const el = document.createElement('div');
  el.className = `vmi-msg ${role}`;
  const who = role === 'user' ? 'You' : (_vmiSession?.personaName || 'Interviewer');
  const speakBtn = role === 'assistant' ? `<button class="speak-btn" onclick="_vmiSpeak(this)">🔊 Speak</button>` : '';
  el.innerHTML = `<div class="who">${esc(who)}${speakBtn}</div>${esc(text)}`;
  el.dataset.text = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  if (speak && role === 'assistant') {
    _vmiSpeakText(text);
  }
  return el;
}

function _vmiSpeak(btn) {
  const el = btn.closest('.vmi-msg');
  if (el && el.dataset.text) _vmiSpeakText(el.dataset.text);
}

function _vmiSpeakText(text) {
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    // Prefer an en-US voice; fall back to default
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => /en-?US/i.test(v.lang) && /(Samantha|Alex|Google|Microsoft)/i.test(v.name))
                   || voices.find(v => /en-?US/i.test(v.lang))
                   || voices[0];
    if (preferred) u.voice = preferred;
    u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
    window.speechSynthesis.speak(u);
  } catch (_e) { /* TTS unavailable — no-op */ }
}

function toggleVmiMic(index) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const status = document.getElementById('vmiStatus');
  if (!SR) {
    if (status) status.textContent = '⚠ Mic not available — type your answer and press Send.';
    return;
  }
  const btn = document.getElementById('vmiMicBtn');
  if (_vmiIsRecording) {
    // Stop
    try { _vmiRecognition?.stop(); } catch (_e) {}
    _vmiIsRecording = false;
    btn.classList.remove('recording');
    document.getElementById('vmiMicLabel').textContent = 'Click to speak';
    if (status) { status.textContent = ''; status.className = 'vmi-status'; }
    return;
  }
  // Start
  try {
    _vmiRecognition = new SR();
    _vmiRecognition.continuous = true;
    _vmiRecognition.interimResults = true;
    _vmiRecognition.lang = 'en-US';
    let finalText = '';
    _vmiRecognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + ' ';
        else interim += t;
      }
      const ta = document.getElementById('vmiTextFallback');
      if (ta) ta.value = (finalText + interim).trim();
    };
    _vmiRecognition.onerror = (e) => {
      if (status) { status.textContent = `Speech error: ${e.error}`; status.className = 'vmi-status'; }
      _vmiIsRecording = false; btn.classList.remove('recording');
    };
    _vmiRecognition.onend = () => {
      _vmiIsRecording = false; btn.classList.remove('recording');
      document.getElementById('vmiMicLabel').textContent = 'Click to speak';
      if (status) { status.textContent = ''; status.className = 'vmi-status'; }
    };
    _vmiRecognition.start();
    _vmiIsRecording = true;
    btn.classList.add('recording');
    document.getElementById('vmiMicLabel').textContent = 'Recording… click to stop';
    if (status) { status.textContent = 'Listening…'; status.className = 'vmi-status live'; }
  } catch (e) {
    if (status) status.textContent = `Could not start mic: ${e.message}`;
  }
}

async function sendVmiTurn(index) {
  if (!_vmiSession?.active) return;
  // If the mic is still recording, stop it first so we capture the final transcript
  if (_vmiIsRecording) { try { _vmiRecognition?.stop(); } catch (_e) {} _vmiIsRecording = false; }
  const ta = document.getElementById('vmiTextFallback');
  const msg = (ta?.value || '').trim();
  if (!msg) return;
  const sendBtn = document.getElementById('vmiSendBtn');
  sendBtn.disabled = true;
  _vmiAppendMsg('user', msg);
  ta.value = '';
  document.getElementById('vmiStatus').textContent = 'Interviewer thinking…';
  try {
    const res = await fetch(`${API}/roleplay/turn`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: _vmiSession.sessionId, message: msg}),
    });
    if (!res.ok) throw new Error(`Turn failed: ${res.status}`);
    const data = await res.json();
    _vmiSession.turnCount = data.turn || (_vmiSession.turnCount + 1);
    document.getElementById('vmiTurnN').textContent = _vmiSession.turnCount;
    _vmiAppendMsg('assistant', data.reply || '', true);
    document.getElementById('vmiStatus').textContent = '';
    if (data.outcome && data.outcome !== 'continue') {
      _vmiSession.active = false;
      document.getElementById('vmiActiveRow').style.display = 'none';
      if (data.debrief) {
        showRoleplayDebrief(data.outcome, data.debrief, index);
      }
    }
  } catch (e) {
    document.getElementById('vmiStatus').textContent = `Error: ${e.message}`;
  } finally {
    sendBtn.disabled = false;
  }
}

let _incSession = null;
let _incTicker = null;

function setupIncidentConsole(step, index) {
  _incSession = {stepId: step.id, sessionId: null, started: false, startTime: null, revenuePerMin: 0, timeBudget: 600};
  const inp = document.getElementById('incShellInput');
  if (inp) {
    inp.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const cmd = inp.value.trim();
        if (!cmd) return;
        if (!_incSession.started) { appendShellLine('Start the incident first with "Acknowledge Page & Start"', 'output'); return; }
        await runIncidentCommand(cmd, index);
        inp.value = '';
      }
    });
  }
}

async function startIncident(index) {
  const btn = document.getElementById('incStartBtn');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  const step = getSteps()[index];
  try {
    const res = await fetch(`${API}/incident/start`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({step_id: step.id}),
    });
    if (!res.ok) throw new Error(`Start failed: ${res.status}`);
    const data = await res.json();
    _incSession.sessionId = data.session_id;
    _incSession.started = true;
    _incSession.startTime = Date.now();
    _incSession.revenuePerMin = data.revenue_per_min || 0;
    _incSession.timeBudget = data.time_budget_s || 600;
    // Render initial logs
    const logsEl = document.getElementById('incLogs');
    logsEl.innerHTML = '';
    (data.initial_logs || []).forEach(log => appendLog(log));
    btn.style.display = 'none';
    document.getElementById('incDeclareBtn').style.display = 'inline-block';
    document.getElementById('incShellInput').focus();
    // Start a wall-clock sim ticker (updates elapsed display; real sim time advances with each command)
    if (_incTicker) clearInterval(_incTicker);
    _incTicker = setInterval(() => updateIncidentMetrics({elapsed_sim_seconds: null}), 1000);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = `Retry (${e.message})`;
  }
}

async function runIncidentCommand(cmd, index) {
  const histEl = document.getElementById('incShellHistory');
  const runDiv = document.createElement('div');
  runDiv.innerHTML = `<div class="cmd-run">$ ${esc(cmd)}</div><div class="cmd-output">running...</div>`;
  histEl.appendChild(runDiv);
  histEl.scrollTop = histEl.scrollHeight;
  try {
    const res = await fetch(`${API}/incident/command`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: _incSession.sessionId, command: cmd}),
    });
    if (!res.ok) throw new Error(`Command failed: ${res.status}`);
    const data = await res.json();
    const outEl = runDiv.querySelector('.cmd-output');
    outEl.textContent = data.output || '(no output)';
    if (data.cost_s) {
      const costEl = document.createElement('div');
      costEl.className = 'cmd-cost';
      costEl.textContent = `(+${data.cost_s}s incident time)`;
      runDiv.appendChild(costEl);
    }
    if (data.cascade) {
      const cascadeEl = document.createElement('div');
      cascadeEl.className = 'cmd-cascade';
      cascadeEl.textContent = 'CASCADE: error rate increased!';
      runDiv.appendChild(cascadeEl);
    }
    histEl.scrollTop = histEl.scrollHeight;
    // Append new logs (with "new" animation)
    (data.new_logs || []).forEach(log => appendLog(log, true));
    // Fire Slack prompts
    (data.slack_prompts || []).forEach(prompt => appendSlackPrompt(prompt));
    updateIncidentMetrics(data);
    if (data.outcome) {
      finishIncident(data, index);
    }
  } catch (e) {
    runDiv.querySelector('.cmd-output').textContent = `Error: ${e.message}`;
  }
}

function appendLog(log, isNew) {

function appendSlackPrompt(prompt) {

  const empty = thread.querySelector('.inc-slack-empty');
  if (empty) empty.remove();

    <div class="from">${esc(prompt.from || 'unknown')}</div>

async function sendSlackReply(promptId) {
  const ta = document.getElementById('slack-reply-' + promptId);
  if (!ta) return;
  const reply = ta.value.trim();
  if (!reply) return;
  try {
    await fetch(`${API}/incident/slack_reply`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: _incSession.sessionId, prompt_id: promptId, reply}),
    });
    const msg = document.querySelector(`.inc-slack-msg[data-prompt-id="${promptId}"]`);
    if (msg) {
      msg.innerHTML = msg.innerHTML.replace(/<textarea[^]*<\/textarea>/, '').replace(/<button[^]*<\/button>/, '');
      const done = document.createElement('div');
      done.className = 'slack-replied';
      done.textContent = `You replied: "${reply}"`;

    }
  } catch (e) {
    // no-op
  }

function updateIncidentMetrics(data) {
  const elapsed = data && data.elapsed_sim_seconds != null ? data.elapsed_sim_seconds : null;
  if (elapsed != null) document.getElementById('incElapsed').textContent = elapsed + 's';
  if (data && data.error_rate != null) {
    const el = document.getElementById('incErrorRate');
    el.textContent = data.error_rate.toFixed(1) + '%';

  }

function declareRootCause(index) {

}

async function submitDeclaration(index) {
  const hyp = document.getElementById('incHypothesis').value.trim();
  const rem = document.getElementById('incRemediation').value.trim();
  if (!hyp) { alert('Please describe the root cause.'); return; }
  try {
    const res = await fetch(`${API}/incident/declare`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: _incSession.sessionId, hypothesis: hyp, remediation: rem}),
    });
    const data = await res.json();
    document.getElementById('incDeclareModal').style.display = 'none';
    finishIncident(data, index);
  } catch (e) {
    alert('Submit failed: ' + e.message);
  }

function finishIncident(data, index) {
  if (_incTicker) clearInterval(_incTicker);
  document.getElementById('incShellInput').disabled = true;
  document.getElementById('incDeclareBtn').style.display = 'none';
  const debrief = data.debrief || {};
  const score = Math.round((debrief.score || 0) * 100);
  const outcome = data.outcome || debrief.outcome || 'unknown';
  const scoreClass = score >= 60 ? 'win' : 'lose';
  const el = document.getElementById('incDebrief');
  const outcomeLabels = {
    resolved: 'Incident Resolved',
    incorrect_diagnosis: 'Incorrect Diagnosis',
    timeout: 'Time Budget Exhausted',
    unknown: 'Session Ended',
  };
  let html = `<h3 style="margin:0 0 8px; color:var(--text-primary);">${esc(outcomeLabels[outcome] || outcome)}</h3>`;
  html += `<div class="inc-debrief-score ${scoreClass}">Score: ${score}%</div>`;
  html += `<div style="color:var(--text-secondary); font-size:0.9rem;">Elapsed sim time: ${debrief.elapsed_sim_seconds||0}s / ${debrief.time_budget_s||0}s · Revenue lost: $${(debrief.revenue_lost||0).toLocaleString()} · Commands: ${debrief.commands_run_count||0} · Cascades: ${debrief.cascades_triggered||0}</div>`;
  if (data.true_root_cause) {
    html += `<div style="margin-top:10px; padding:10px; background:var(--bg-card); border-left:3px solid var(--accent); border-radius:0 6px 6px 0;"><strong style="color:var(--accent);">Actual root cause:</strong> ${esc(data.true_root_cause)}<br><span style="color:var(--text-muted); font-size:0.85rem;">Your hypothesis match: ${Math.round((data.root_cause_match_score||0)*100)}%</span></div>`;
  }
  if (debrief.breakdown) {
    html += `<div class="inc-breakdown"><strong style="color:var(--text-primary); font-size:0.9rem;">Score Breakdown</strong>`;
    for (const [k, b] of Object.entries(debrief.breakdown)) {
      const pct = Math.round(b.score * 100);
      html += `<div class="inc-breakdown-row"><span style="color:var(--text-secondary); text-transform:capitalize;">${esc(k.replace('_',' '))}</span><div class="inc-bar"><div class="inc-bar-fill" style="width:${pct}%"></div></div><span style="color:var(--text-primary); font-weight:600;">${pct}% × ${(b.weight*100).toFixed(0)}%</span></div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
  el.style.display = 'block';
  if (score >= 40 && state.currentCourse) {
    markStepComplete(state.currentCourse.id, state.currentModule, index, score);
  }
}
