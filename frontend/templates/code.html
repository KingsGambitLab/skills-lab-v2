<!--
  code template — handles code_exercise / code_read / code.
  View owns editor + Run button + test-result panel + F26 scaffold banners.
  LLM owns only JSON: language + starter_code + problem_statement + starter_files/starter_repo (optional).
-->
<div class="tmpl-code" data-template="code">
  <div class="tmpl-header">
    <!-- 2026-04-22 v6: removed <h3 data-slot="title"> — the outer
         `.step-title` already renders step.title via renderStep, so the
         template-level title was a duplicate on every step. Briefing/problem
         slot stays. -->
    <div class="tmpl-problem" data-slot="problem_statement"></div>
  </div>

  <!-- F26: clone-link banner (shown only when starter_repo is present) -->
  <div class="tmpl-scaffold-banner tmpl-clone-banner" data-role="clone-banner" style="display:none">
    <span class="tmpl-scaffold-icon">🔗</span>
    <div>
      <strong>Clone the starter:</strong>
      <a data-role="clone-url" target="_blank" rel="noopener noreferrer"></a>
      <span class="tmpl-scaffold-meta" data-role="clone-meta"></span>
    </div>
  </div>

  <!-- F26: pre-seeded files banner (when starter_files was materialized in sandbox) -->
  <div class="tmpl-scaffold-banner tmpl-files-banner" data-role="files-banner" style="display:none">
    <span class="tmpl-scaffold-icon">📦</span>
    <div>
      <strong>Pre-seeded starter files:</strong>
      <span data-role="files-count"></span> files written to <code data-role="repo-path-var">repo_path</code>
    </div>
  </div>

  <div class="tmpl-editor-wrapper">
    <div class="tmpl-editor-header">
      <span class="tmpl-lang-badge" data-slot="lang-badge">python</span>
      <div class="tmpl-editor-actions">
        <button type="button" class="tmpl-btn tmpl-btn-ghost" data-action="reset-code" title="Restore starter">Reset</button>
      </div>
    </div>
    <!-- 2026-04-22: line-number gutter (user report "Code editor does not
         have line numbers"). Gutter mirrors line count + scroll position of
         the textarea. Click-drag on gutter is disabled (pointer-events:none)
         so learner interactions remain on the textarea. -->
    <div class="tmpl-editor-shell">
      <div class="tmpl-editor-gutter" data-role="gutter" aria-hidden="true"><div>1</div></div>
      <textarea class="tmpl-editor" data-role="editor" spellcheck="false"
                autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <div class="tmpl-actions">
    <button type="button" class="tmpl-btn tmpl-btn-primary" data-action="run">▶ Run</button>
    <button type="button" class="tmpl-btn tmpl-btn-primary" data-action="submit">Submit</button>
    <span class="tmpl-hint-trigger" data-action="reveal-hint">💡 Hint</span>
  </div>

  <div class="tmpl-output-panel" data-role="output" style="display:none">
    <div class="tmpl-output-header">Output</div>
    <pre class="tmpl-output-body" data-role="output-body"></pre>
  </div>

  <div class="tmpl-test-panel" data-role="test-panel" style="display:none">
    <div class="tmpl-test-header">
      <span class="tmpl-test-verdict" data-role="test-verdict"></span>
      <span class="tmpl-test-count" data-role="test-count"></span>
    </div>
    <pre class="tmpl-test-output" data-role="test-output"></pre>
  </div>

  <div class="tmpl-feedback" data-role="feedback"></div>
</div>
