# skillslab — drop into the toolchain container with your course-repo + state
# mounted from the host.
#
# Three usage modes:
#   1) Interactive: `docker compose run --rm skillslab`
#      Drops you into bash inside /work with skillslab on PATH.
#   2) Single command:
#         docker compose run --rm skillslab skillslab login
#         docker compose run --rm skillslab skillslab check
#   3) Wrapper script (recommended — `bin/skillslab` in this repo):
#         skillslab                 # runs from any directory, $PWD becomes /work
#         skillslab status / spec / check / ...
#
# What gets mounted into /work
# ----------------------------
# /work is the learner's course-repo: where `git clone`, `pytest`, `mvn test`,
# `aider`, `claude` all run. It MUST be a clean dir containing only the
# learner's course repo — NOT the cli source.
#
# Resolution order (so this works whether the user runs `docker compose`
# directly OR via the `bin/skillslab` wrapper):
#   1. SKILLSLAB_WORK_DIR env var (the wrapper sets this to the user's $PWD)
#   2. $PWD (the directory `docker compose` was invoked from)
# 2026-04-25: a learner ran `docker compose run` from `cli/` itself and
# saw cli source files (Dockerfile, src/, tests/) shadow their kimi repo
# in /work. Adding SKILLSLAB_WORK_DIR lets `bin/skillslab` mount the
# learner's REAL working dir regardless of where the compose file lives.
#
# Other mounts (always present):
#   - ~/.skillslab    → /root/.skillslab    (token + cursor + step files)
#   - ~/.claude       → /root/.claude       (Claude Code auth + settings)
#   - ~/.aider        → /root/.aider        (Aider history)
#   - ./:/skillslab-cli                     (cli/ source, for live updates;
#                                            relative path = always cli/)
#
# Env passthrough: ANTHROPIC_API_KEY / OPENROUTER_API_KEY / GITHUB_TOKEN
# from your shell so BYO-key flows work without re-auth inside the container.

services:
  skillslab:
    build:
      context: .
      dockerfile: Dockerfile
    image: skillslab:latest
    container_name: skillslab
    working_dir: /work
    stdin_open: true
    tty: true
    environment:
      - SKILLSLAB_API_URL=${SKILLSLAB_API_URL:-http://host.docker.internal:8001}
      # SKILLSLAB_WEB_URL: the URL the LEARNER opens in their browser. Distinct
      # from API_URL because host.docker.internal only resolves INSIDE Docker.
      # Default: empty → CLI auto-derives from API_URL (host.docker.internal →
      # localhost). Override in prod/staging where API and web share an FQDN.
      - SKILLSLAB_WEB_URL=${SKILLSLAB_WEB_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-}
    extra_hosts:
      # So the in-container CLI can reach the host's LMS at localhost:8001
      - "host.docker.internal:host-gateway"
    volumes:
      # /work — the learner's course-repo (clean dir). Wrapper script sets
      # SKILLSLAB_WORK_DIR; direct compose use falls back to $PWD.
      - ${SKILLSLAB_WORK_DIR:-${PWD}}:/work
      - ${HOME}/.skillslab:/root/.skillslab
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.aider:/root/.aider
      # 2026-04-25 — bind-mount the cli source over the build-time COPY so
      # `git pull` on the host instantly updates the in-container `skillslab`
      # binary (pip-installed editable to /skillslab-cli at build time).
      # Without this, every cli code change required `docker compose build` to
      # take effect.  The path is RELATIVE to this docker-compose.yml so it
      # always resolves to cli/, regardless of where compose was invoked.
      - ./:/skillslab-cli
    command: /bin/bash
